name: VS Code Extension Quality

on:
  pull_request:
    paths:
      - 'vscode-extension/**'
      - '.github/workflows/extension-quality.yml'
  push:
    branches: [main]
    paths:
      - 'vscode-extension/**'
      - '.github/workflows/extension-quality.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Run quality gate
        working-directory: vscode-extension
        run: npm run quality
