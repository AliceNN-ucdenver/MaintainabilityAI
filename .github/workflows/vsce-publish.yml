name: Publish VS Code Extension

on:
  push:
    branches: [main]
    paths:
      - 'vscode-extension/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[vsce-publish]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Run quality gate
        working-directory: vscode-extension
        run: npm run quality

      - name: Bump patch version
        id: bump
        working-directory: vscode-extension
        run: |
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit version bump (rebase-retry to survive racing pushes)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vscode-extension/package.json vscode-extension/package-lock.json
          git commit -m "chore(vsce): bump to ${{ steps.bump.outputs.version }} [vsce-publish]"

          # The quality gate is slow, so main can advance while we're working.
          # Rebase + retry up to 5x; keeps history linear, avoids merge commits.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Push succeeded on attempt $attempt"
              break
            fi
            if [ "$attempt" = "5" ]; then
              echo "Push failed after 5 attempts"
              exit 1
            fi
            echo "Push attempt $attempt failed — rebasing on origin/main"
            git fetch origin main
            git rebase origin/main || { git rebase --abort; exit 1; }
            sleep 3
          done

      - name: Publish to Marketplace
        working-directory: vscode-extension
        run: npx vsce publish --pat "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create git tag (best-effort)
        run: |
          git tag "v${{ steps.bump.outputs.version }}"
          for attempt in 1 2 3; do
            if git push origin "v${{ steps.bump.outputs.version }}"; then
              break
            fi
            if [ "$attempt" = "3" ]; then
              echo "Tag push failed (likely already exists) — continuing"
              break
            fi
            sleep 3
          done

      - name: Package .vsix
        working-directory: vscode-extension
        run: npx vsce package -o "maintainabilityai-${{ steps.bump.outputs.version }}.vsix"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.bump.outputs.version }}"
          name: "MaintainabilityAI v${{ steps.bump.outputs.version }}"
          generate_release_notes: true
          files: "vscode-extension/maintainabilityai-${{ steps.bump.outputs.version }}.vsix"
