name: Publish npm Package — research-runner

on:
  push:
    branches: [main]
    paths:
      - 'packages/research-runner/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # The version-bump commit lands on main; skip its own re-trigger.
    if: "!contains(github.event.head_commit.message, '[research-runner-publish]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          # Node 22 expands `src/**/*.test.ts` glob in `node --test`;
          # Node 20 receives the literal string and fails.
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: packages/research-runner/package-lock.json

      - name: Install dependencies
        working-directory: packages/research-runner
        run: npm ci

      - name: Typecheck
        working-directory: packages/research-runner
        run: npm run typecheck

      - name: Tests (node:test)
        working-directory: packages/research-runner
        run: npm test

      - name: Build (produces dist/ from src/)
        working-directory: packages/research-runner
        run: npm run build

      - name: Bump patch version
        id: bump
        working-directory: packages/research-runner
        run: |
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit version bump (rebase-retry to survive racing pushes)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/research-runner/package.json
          git commit -m "chore(research-runner): bump to ${{ steps.bump.outputs.version }} [research-runner-publish]"

          # Quality gate is slow; main can advance. Rebase + retry up to 5x.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Push succeeded on attempt $attempt"
              break
            fi
            if [ "$attempt" = "5" ]; then
              echo "Push failed after 5 attempts"
              exit 1
            fi
            echo "Push attempt $attempt failed — rebasing on origin/main"
            git fetch origin main
            git rebase origin/main || { git rebase --abort; exit 1; }
            sleep 3
          done

      - name: Publish to npm
        working-directory: packages/research-runner
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create git tag (best-effort)
        run: |
          git tag "research-runner-v${{ steps.bump.outputs.version }}"
          for attempt in 1 2 3; do
            if git push origin "research-runner-v${{ steps.bump.outputs.version }}"; then
              break
            fi
            if [ "$attempt" = "3" ]; then
              echo "Tag push failed (likely already exists) — continuing"
              break
            fi
            sleep 3
          done
