name: Snyk Security Scan

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

env:
  # Required: add this in GitHub → Settings → Secrets and variables → Actions → New repository secret
  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
  # Intentional vulnerable training fixtures live under /examples — see
  # CLAUDE.md "Don't fix insecure.ts files". They are excluded from both
  # the SCA and Code scan via the .snyk policy file at repo root, AND
  # post-filtered out of summary + gate output below as a defense in
  # depth (Snyk Code's --exclude CLI flag is unreliable across versions).
  #
  # If you add a new top-level fixture directory, mirror it in .snyk
  # AND in the SNYK_EXCLUDE_PREFIXES list below.
  SNYK_CODE_EXCLUDES: examples
  # Comma-separated path prefixes the summary/gate jq filters drop from
  # results. Matched as `.uri | startswith("<prefix>/")`.
  SNYK_EXCLUDE_PREFIXES: examples
  # Optional: uncomment and set if you want to pin scans to a specific Snyk org
  # SNYK_ORG: your-snyk-org-slug

jobs:
  snyk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install jq (for summaries)
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install Snyk CLI
        run: npm i -g snyk@latest

      - name: Authenticate Snyk
        run: |
          if [ -z "${SNYK_TOKEN}" ]; then
            echo "❌ SNYK_TOKEN is not set. Add it as a GitHub secret."
            exit 1
          fi
          snyk auth "${SNYK_TOKEN}"

      # Install dependencies only if there's a package.json at repo root
      - name: Install root dependencies (if package.json present)
        if: hashFiles('package.json') != ''
        run: |
          npm ci || npm install

      - name: Install extension dependencies (if package.json present)
        if: hashFiles('vscode-extension/package.json') != ''
        working-directory: vscode-extension
        run: |
          npm ci || npm install

      - name: Install site dependencies (if package.json present)
        if: hashFiles('site-tw/package.json') != ''
        working-directory: site-tw
        run: |
          npm ci || npm install

      # --- Dependency Scan (SCA) ---
      # Only run when a supported lockfile exists; avoids the "lock file not found" error.
      - name: Run Snyk dependency scan (SCA) if lockfile exists
        id: snyk-sca
        continue-on-error: true
        if: |
          hashFiles('package-lock.json') != '' ||
          hashFiles('npm-shrinkwrap.json') != '' ||
          hashFiles('yarn.lock') != '' ||
          hashFiles('pnpm-lock.yaml') != ''
        run: |
          EXTRA_ARGS=""
          if [ -n "${SNYK_ORG}" ]; then
            EXTRA_ARGS="--org=${SNYK_ORG}"
          fi
          snyk test --all-projects --severity-threshold=medium --json $EXTRA_ARGS > snyk-deps.json || true
          echo "Snyk dependency scan completed."

      # --- Static App Security Testing (SAST) ---
      - name: Run Snyk Code scan (SAST)
        id: snyk-code
        continue-on-error: true
        run: |
          EXTRA_ARGS=""
          if [ -n "${SNYK_ORG}" ]; then
            EXTRA_ARGS="--org=${SNYK_ORG}"
          fi
          snyk code test --severity-threshold=medium --exclude="${SNYK_CODE_EXCLUDES}" --json $EXTRA_ARGS > snyk-code.json || true
          echo "Snyk code scan completed."

      # --- Optional: Upload SARIF for GitHub Code Scanning (Snyk Code only) ---
      # Uncomment these two steps if you want findings in the "Security" tab
      # - name: Generate SARIF from Snyk Code
      #   id: snyk-code-sarif
      #   continue-on-error: true
      #   run: |
      #     EXTRA_ARGS=""
      #     if [ -n "${SNYK_ORG}" ]; then
      #       EXTRA_ARGS="--org=${SNYK_ORG}"
      #     fi
      #     snyk code test --sarif --exclude="${SNYK_CODE_EXCLUDES}" $EXTRA_ARGS > snyk-code.sarif || true
      #
      # - name: Upload SARIF to GitHub Code Scanning
      #   if: always() && hashFiles('snyk-code.sarif') != ''
      #   uses: github/codeql-action/upload-sarif@v3
      #   with:
      #     sarif_file: snyk-code.sarif
      #     category: snyk-code

      # --- Human-friendly summary in job logs ---
      - name: Summarize results
        if: always()
        run: |
          echo "============================"
          echo "  SNYK SECURITY SUMMARY"
          echo "============================"

          echo ""
          echo "=== Dependency Scan (SCA) ==="
          if [ -f snyk-deps.json ]; then
            COUNT=$(jq '[if type == "array" then .[]?.vulnerabilities[]? else .vulnerabilities[]? end] | length' snyk-deps.json 2>/dev/null || echo 0)
            echo "Total dependency vulns: ${COUNT}"
            jq -r '(if type == "array" then .[]?.vulnerabilities[]? else .vulnerabilities[]? end) | ("[\(.severity|ascii_upcase)] " + .title + " in " + (.packageName // "unknown") + (if .from then " → " + (.from|join(" > ")) else "" end))' snyk-deps.json 2>/dev/null || echo "No vulnerabilities or error parsing results"
          else
            echo "No dependency results (no lockfile or scan skipped)."
          fi

          echo ""
          echo "=== Code Scan (SAST) ==="
          if [ -f snyk-code.json ]; then
            # Drop findings whose path starts with any prefix in
            # SNYK_EXCLUDE_PREFIXES (e.g. `examples/`) — the workshop
            # fixtures are intentionally insecure and would otherwise
            # dominate the SAST signal.
            EXCLUDE_FILTER=$(printf '%s\n' "${SNYK_EXCLUDE_PREFIXES}" | tr ',' '\n' | jq -R 'select(length > 0)' | jq -s '.' )
            COUNT_CODE_RAW=$(jq '[.runs[]?.results[]?] | length' snyk-code.json 2>/dev/null || echo 0)
            COUNT_CODE=$(jq --argjson excl "${EXCLUDE_FILTER}" '
              [.runs[]?.results[]?
               | select((.locations[0].physicalLocation.artifactLocation.uri // "") as $uri
                        | $excl | map(. as $p | $uri | startswith($p + "/")) | any | not)]
              | length
            ' snyk-code.json 2>/dev/null || echo 0)
            SKIPPED=$((COUNT_CODE_RAW - COUNT_CODE))
            echo "Total code issues (after fixture exclude): ${COUNT_CODE}"
            if [ "${SKIPPED}" -gt 0 ]; then
              echo "  (skipped ${SKIPPED} finding(s) under: ${SNYK_EXCLUDE_PREFIXES})"
            fi
            jq -r --argjson excl "${EXCLUDE_FILTER}" '
              .runs[]?.results[]?
              | select((.locations[0].physicalLocation.artifactLocation.uri // "") as $uri
                       | $excl | map(. as $p | $uri | startswith($p + "/")) | any | not)
              | "[\(.level|ascii_upcase)] \(.message.text) at \(.locations[0].physicalLocation.artifactLocation.uri // "<unknown>"):\(.locations[0].physicalLocation.region.startLine // 0)"
            ' snyk-code.json 2>/dev/null || echo "No code issues or error parsing results"
          else
            echo "No code results file."
          fi

      # --- Upload artifacts for PR reviewers ---
      - name: Upload Snyk artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-artifacts
          path: |
            snyk-deps.json
            snyk-code.json
            snyk-code.sarif
          if-no-files-found: ignore

      # --- Hard gate: fail on high/critical findings ---
      - name: Fail on high/critical issues
        if: always()
        run: |
          HIGH_VULNS=0
          if [ -f snyk-deps.json ]; then
            HIGH_VULNS=$(jq '[if type == "array" then .[]?.vulnerabilities[]? else .vulnerabilities[]? end | select(.severity == "high" or .severity == "critical")] | length' snyk-deps.json 2>/dev/null || echo 0)
          fi

          HIGH_CODE=0
          if [ -f snyk-code.json ]; then
            # Treat SARIF "error" as high/critical. Adjust if you prefer "warning" too.
            # Excludes findings under SNYK_EXCLUDE_PREFIXES (intentionally
            # vulnerable workshop fixtures); they're flagged in the summary
            # for visibility but do not block the gate.
            EXCLUDE_FILTER=$(printf '%s\n' "${SNYK_EXCLUDE_PREFIXES}" | tr ',' '\n' | jq -R 'select(length > 0)' | jq -s '.')
            HIGH_CODE=$(jq --argjson excl "${EXCLUDE_FILTER}" '
              [.runs[]?.results[]?
               | select(.level == "error")
               | select((.locations[0].physicalLocation.artifactLocation.uri // "") as $uri
                        | $excl | map(. as $p | $uri | startswith($p + "/")) | any | not)]
              | length
            ' snyk-code.json 2>/dev/null || echo 0)
          fi

          echo "High/Critical dependency issues: ${HIGH_VULNS}"
          echo "High-severity code issues (errors): ${HIGH_CODE}"

          if [ "$HIGH_VULNS" -gt 0 ] || [ "$HIGH_CODE" -gt 0 ]; then
            echo "❌ High/critical issues detected. See artifacts and logs for details."
            exit 1
          else
            echo "✅ No high/critical issues detected."
          fi

      # --- Optional: Monitor on default branch to show trends in Snyk UI ---
      # Runs only on push to main; requires lockfile
      - name: Snyk monitor (dependency trends)
        if: github.ref == 'refs/heads/main' && (hashFiles('package-lock.json') != '' || hashFiles('npm-shrinkwrap.json') != '' || hashFiles('yarn.lock') != '' || hashFiles('pnpm-lock.yaml') != '')
        continue-on-error: true
        run: |
          EXTRA_ARGS=""
          if [ -n "${SNYK_ORG}" ]; then
            EXTRA_ARGS="--org=${SNYK_ORG}"
          fi
          snyk monitor $EXTRA_ARGS || true
