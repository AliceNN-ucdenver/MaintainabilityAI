<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Indiana Jones fedora — just the hat. Sable-brown felt, snap brim, teardrop crown. -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#90633a"/>
      <stop offset=".55" stop-color="#6e4a28"/>
      <stop offset="1" stop-color="#4f3417"/>
    </linearGradient>
    <linearGradient id="b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2613"/>
      <stop offset="1" stop-color="#2a1b0d"/>
    </linearGradient>
  </defs>
  <!-- crown with teardrop pinch -->
  <path fill="url(#g)" d="M20 40 C 18.5 27, 21 15, 26 13 C 28.6 11.7, 29 16.8, 31.7 16.8 C 34.4 16.8, 34.8 11.7, 37.4 13 C 43 15, 45.5 27, 44 40 Z"/>
  <!-- soft crown highlight -->
  <path fill="#a9794a" opacity=".42" d="M26.5 14.5 C 24.5 21, 24 30, 24.5 39 L 27.5 39 C 27.5 30, 27.8 21, 29 15 C 28 16, 27 16, 26.5 14.5 Z"/>
  <!-- brim: snap (tips up, front-center down) -->
  <path fill="url(#g)" d="M5 39 C 16 34.5, 48 34.5, 59 39 C 51 48, 41 49.2, 32 49.6 C 23 49.2, 13 48, 5 39 Z"/>
  <!-- band -->
  <path fill="url(#b)" d="M19.6 35.5 C 27 38.6, 37 38.6, 44.4 35.5 L 45 40.5 L 19 40.5 Z"/>
</svg>
