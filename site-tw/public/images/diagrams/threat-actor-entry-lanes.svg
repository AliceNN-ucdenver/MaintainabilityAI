<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Five threat actors and where they enter the governed SDLC: external attacker, compromised agent, malicious insider, careless insider, and supply-chain attacker. Each lane shows the entry path, attempted damage, and first control before the governed evidence chain.">
  <defs>
    <linearGradient id="actorBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#182235"/>
    </linearGradient>
    <linearGradient id="actorChain" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(134,239,172,0.10)"/>
      <stop offset="50%" stop-color="rgba(134,239,172,0.28)"/>
      <stop offset="100%" stop-color="rgba(134,239,172,0.10)"/>
    </linearGradient>
    <marker id="actorArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <filter id="actorGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="460" rx="12" fill="url(#actorBg)"/>
  <text x="400" y="30" text-anchor="middle" fill="#cbd5e1" font-size="11" font-weight="700" letter-spacing="3" font-family="system-ui, sans-serif">THREAT ACTORS · WHERE THEY ENTER THE GOVERNED SDLC</text>
  <text x="400" y="49" text-anchor="middle" fill="#94a3b8" font-size="9.5" letter-spacing="1.1" font-family="system-ui, sans-serif">Actor → entry point → attempted damage → first control</text>
  <text x="38" y="78" fill="#64748b" font-size="8.5" font-weight="700" letter-spacing="1.6" font-family="system-ui, sans-serif">ACTOR</text>
  <text x="188" y="78" fill="#64748b" font-size="8.5" font-weight="700" letter-spacing="1.6" font-family="system-ui, sans-serif">ENTRY PATH</text>
  <text x="395" y="78" fill="#64748b" font-size="8.5" font-weight="700" letter-spacing="1.6" font-family="system-ui, sans-serif">TRIES TO</text>
  <text x="590" y="78" fill="#64748b" font-size="8.5" font-weight="700" letter-spacing="1.6" font-family="system-ui, sans-serif">CHECK THAT MEETS IT</text>
  <g transform="translate(26,94)">
    <rect x="0" y="0" width="748" height="46" rx="9" fill="rgba(248,113,113,0.08)" stroke="rgba(248,113,113,0.38)"/>
    <rect x="12" y="10" width="118" height="26" rx="13" fill="rgba(248,113,113,0.16)" stroke="rgba(248,113,113,0.55)"/>
    <text x="71" y="27" text-anchor="middle" fill="#fecdd3" font-size="9.5" font-weight="800" letter-spacing="0.7" font-family="system-ui, sans-serif">External attacker</text>
    <text x="158" y="20" fill="#fca5a5" font-size="9" font-weight="700" font-family="system-ui, sans-serif">stolen auth · public PR · app edge</text>
    <text x="158" y="34" fill="#94a3b8" font-size="8.2" font-family="system-ui, sans-serif">no legitimate access</text>
    <path d="M 338 23 L 364 23" stroke="#64748b" stroke-width="1.2" marker-end="url(#actorArrow)"/>
    <text x="392" y="20" fill="#e2e8f0" font-size="9" font-weight="700" font-family="system-ui, sans-serif">exfiltrate artifacts</text>
    <text x="392" y="34" fill="#94a3b8" font-size="8.2" font-family="system-ui, sans-serif">poison chain · DoS pipeline</text>
    <path d="M 546 23 L 572 23" stroke="#64748b" stroke-width="1.2" marker-end="url(#actorArrow)"/>
    <text x="594" y="20" fill="#86efac" font-size="9" font-weight="700" font-family="system-ui, sans-serif">auth scope · branch guard</text>
    <text x="594" y="34" fill="#94a3b8" font-size="8.2" font-family="system-ui, sans-serif">chain replay · rate limits</text>
  </g>
  <g transform="translate(26,150)">
    <rect x="0" y="0" width="748" height="46" rx="9" fill="rgba(251,191,36,0.08)" stroke="rgba(251,191,36,0.38)"/>
    <rect x="12" y="10" width="118" height="26" rx="13" fill="rgba(251,191,36,0.16)" stroke="rgba(251,191,36,0.55)"/>
    <text x="71" y="27" text-anchor="middle" fill="#fde68a" font-size="9.5" font-weight="800" letter-spacing="0.7" font-family="system-ui, sans-serif">Compromised agent</text>
    <text x="158" y="20" fill="#fcd34d" font-size="9" font-weight="700" font-family="system-ui, sans-serif">research source · prompt context</text>
    <text x="158" y="34" fill="#94a3b8" font-size="8.2" font-family="system-ui, sans-serif">legitimate session, poisoned input</text>
    <path d="M 338 23 L 364 23" stroke="#64748b" stroke-width="1.2" marker-end="url(#actorArrow)"/>
    <text x="392" y="20" fill="#e2e8f0" font-size="9" font-weight="700" font-family="system-ui, sans-serif">make bad work look governed</text>
    <text x="392" y="34" fill="#94a3b8" font-size="8.2" font-family="system-ui, sans-serif">drift intent · invent evidence</text>
    <path d="M 546 23 L 572 23" stroke="#64748b" stroke-width="1.2" marker-end="url(#actorArrow)"/>
    <text x="594" y="20" fill="#86efac" font-size="9" font-weight="700" font-family="system-ui, sans-serif">injection rail · groundedness</text>
    <text x="594" y="34" fill="#94a3b8" font-size="8.2" font-family="system-ui, sans-serif">source registry · Pocket Watch</text>
  </g>
  <g transform="translate(26,206)">
    <rect x="0" y="0" width="748" height="46" rx="9" fill="rgba(129,140,248,0.08)" stroke="rgba(129,140,248,0.38)"/>
    <rect x="12" y="10" width="118" height="26" rx="13" fill="rgba(129,140,248,0.16)" stroke="rgba(129,140,248,0.55)"/>
    <text x="71" y="27" text-anchor="middle" fill="#c7d2fe" font-size="9.5" font-weight="800" letter-spacing="0.7" font-family="system-ui, sans-serif">Malicious insider</text>
    <text x="158" y="20" fill="#a5b4fc" font-size="9" font-weight="700" font-family="system-ui, sans-serif">OKR edits · overrides · BAR pressure</text>
    <text x="158" y="34" fill="#94a3b8" font-size="8.2" font-family="system-ui, sans-serif">legitimate GitHub access</text>
    <path d="M 338 23 L 364 23" stroke="#64748b" stroke-width="1.2" marker-end="url(#actorArrow)"/>
    <text x="392" y="20" fill="#e2e8f0" font-size="9" font-weight="700" font-family="system-ui, sans-serif">bypass governance</text>
    <text x="392" y="34" fill="#94a3b8" font-size="8.2" font-family="system-ui, sans-serif">push restricted work</text>
    <path d="M 546 23 L 572 23" stroke="#64748b" stroke-width="1.2" marker-end="url(#actorArrow)"/>
    <text x="594" y="20" fill="#86efac" font-size="9" font-weight="700" font-family="system-ui, sans-serif">tier freeze · dual approval</text>
    <text x="594" y="34" fill="#94a3b8" font-size="8.2" font-family="system-ui, sans-serif">signed override trail</text>
  </g>
  <g transform="translate(26,262)">
    <rect x="0" y="0" width="748" height="46" rx="9" fill="rgba(125,211,252,0.08)" stroke="rgba(125,211,252,0.38)"/>
    <rect x="12" y="10" width="118" height="26" rx="13" fill="rgba(125,211,252,0.16)" stroke="rgba(125,211,252,0.55)"/>
    <text x="71" y="27" text-anchor="middle" fill="#bae6fd" font-size="9.5" font-weight="800" letter-spacing="0.7" font-family="system-ui, sans-serif">Careless insider</text>
    <text x="158" y="20" fill="#7dd3fc" font-size="9" font-weight="700" font-family="system-ui, sans-serif">pasted secrets · rushed approval</text>
    <text x="158" y="34" fill="#94a3b8" font-size="8.2" font-family="system-ui, sans-serif">well-intentioned, risky action</text>
    <path d="M 338 23 L 364 23" stroke="#64748b" stroke-width="1.2" marker-end="url(#actorArrow)"/>
    <text x="392" y="20" fill="#e2e8f0" font-size="9" font-weight="700" font-family="system-ui, sans-serif">leak sensitive context</text>
    <text x="392" y="34" fill="#94a3b8" font-size="8.2" font-family="system-ui, sans-serif">overshare audit exports</text>
    <path d="M 546 23 L 572 23" stroke="#64748b" stroke-width="1.2" marker-end="url(#actorArrow)"/>
    <text x="594" y="20" fill="#86efac" font-size="9" font-weight="700" font-family="system-ui, sans-serif">PII rail · human gate</text>
    <text x="594" y="34" fill="#94a3b8" font-size="8.2" font-family="system-ui, sans-serif">export redaction queued</text>
  </g>
  <g transform="translate(26,318)">
    <rect x="0" y="0" width="748" height="46" rx="9" fill="rgba(196,181,253,0.08)" stroke="rgba(196,181,253,0.38)"/>
    <rect x="12" y="10" width="118" height="26" rx="13" fill="rgba(196,181,253,0.16)" stroke="rgba(196,181,253,0.55)"/>
    <text x="71" y="27" text-anchor="middle" fill="#ddd6fe" font-size="9.5" font-weight="800" letter-spacing="0.7" font-family="system-ui, sans-serif">Supply chain</text>
    <text x="158" y="20" fill="#c4b5fd" font-size="9" font-weight="700" font-family="system-ui, sans-serif">prompt packs · skills · app token</text>
    <text x="158" y="34" fill="#94a3b8" font-size="8.2" font-family="system-ui, sans-serif">upstream system every mesh trusts</text>
    <path d="M 338 23 L 364 23" stroke="#64748b" stroke-width="1.2" marker-end="url(#actorArrow)"/>
    <text x="392" y="20" fill="#e2e8f0" font-size="9" font-weight="700" font-family="system-ui, sans-serif">compromise the machinery</text>
    <text x="392" y="34" fill="#94a3b8" font-size="8.2" font-family="system-ui, sans-serif">propagate bad policy widely</text>
    <path d="M 546 23 L 572 23" stroke="#64748b" stroke-width="1.2" marker-end="url(#actorArrow)"/>
    <text x="594" y="20" fill="#86efac" font-size="9" font-weight="700" font-family="system-ui, sans-serif">prompt SHA · skill allowlist</text>
    <text x="594" y="34" fill="#94a3b8" font-size="8.2" font-family="system-ui, sans-serif">provenance now · cosign queued</text>
  </g>
  <g transform="translate(26,388)">
    <rect x="0" y="0" width="748" height="48" rx="10" fill="url(#actorChain)" stroke="rgba(134,239,172,0.58)" filter="url(#actorGlow)"/>
    <text x="374" y="20" text-anchor="middle" fill="#dcfce7" font-size="11.5" font-weight="800" letter-spacing="1.6" font-family="system-ui, sans-serif">GOVERNED EVIDENCE CHAIN</text>
    <text x="374" y="36" text-anchor="middle" fill="#86efac" font-size="9.5" font-family="system-ui, sans-serif">WHY sources · HOW requirements · WHAT paths · BUILD merge SHA · every pass label has a check behind it</text>
  </g>
