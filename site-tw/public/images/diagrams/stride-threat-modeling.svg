<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="t d">
  <title id="t">STRIDE threat modeling</title>
  <desc id="d">Six STRIDE letter blocks arranged across the top — Spoofing, Tampering, Repudiation, Information disclosure, Denial of service, Elevation of privilege — each with an example attack and a mapped OWASP control. A flow runs from the feature description on the left to a prioritized mitigations list on the right.</desc>
  <defs>
    <radialGradient id="stBg" cx="50%" cy="30%" r="60%">
      <stop offset="0" stop-color="#1a1408" stop-opacity=".5"/>
      <stop offset="1" stop-color="#070a18" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="letterG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(251,191,36,0.25)"/>
      <stop offset="1" stop-color="rgba(251,191,36,0.05)"/>
    </linearGradient>
    <style>
      .eyebrow{font:800 11px -apple-system,system-ui,sans-serif;letter-spacing:3.5px;text-transform:uppercase;fill:#fcd34d}
      .heroTitle{font:900 38px -apple-system,system-ui,sans-serif;fill:#f8fafc}
      .heroSub{font:500 18px -apple-system,system-ui,sans-serif;fill:#94a3b8}
      .letter{font:900 38px -apple-system,system-ui,sans-serif;fill:#fcd34d;text-anchor:middle}
      .letterName{font:800 13px -apple-system,system-ui,sans-serif;fill:#f8fafc;text-anchor:middle}
      .letterEx{font:500 11px -apple-system,system-ui,sans-serif;fill:#cbd5e1;text-anchor:middle}
      .letterMap{font:700 11px -apple-system,system-ui,sans-serif;fill:#fda4af;text-anchor:middle}
      .colHdr{font:800 12px -apple-system,system-ui,sans-serif;letter-spacing:2.5px;text-transform:uppercase;fill:#cbd5e1}
      .featTitle{font:900 16px -apple-system,system-ui,sans-serif;fill:#f8fafc}
      .featBody{font:500 12px -apple-system,system-ui,sans-serif;fill:#94a3b8}
      .mitName{font:800 13px -apple-system,system-ui,sans-serif;fill:#f8fafc}
      .mitSev{font:700 10px -apple-system,system-ui,sans-serif;letter-spacing:1.5px;text-transform:uppercase}
      .mitBody{font:500 12px -apple-system,system-ui,sans-serif;fill:#94a3b8}
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="url(#stBg)"/>

  <text x="64" y="74" class="eyebrow">STRIDE</text>
  <text x="64" y="118" class="heroTitle">Threat modeling path</text>
  <text x="64" y="148" class="heroSub">Six categories, each with example attacks and OWASP control mappings. Design prompts that name them.</text>

  <!-- 6 letter blocks across the top -->
  <g transform="translate(0,210)">
    <!-- block size 168 x 168, gap 20, total 6 * 188 = 1128, start x = (1280-1128)/2 = 76 -->
    <g transform="translate(76,0)">
      <rect width="168" height="168" rx="14" fill="url(#letterG)" stroke="#fbbf24"/>
      <text x="84" y="58" class="letter">S</text>
      <text x="84" y="92" class="letterName">Spoofing</text>
      <text x="84" y="116" class="letterEx">Fake session token</text>
      <text x="84" y="146" class="letterMap">→ OWASP A07</text>
    </g>
    <g transform="translate(264,0)">
      <rect width="168" height="168" rx="14" fill="url(#letterG)" stroke="#fbbf24"/>
      <text x="84" y="58" class="letter">T</text>
      <text x="84" y="92" class="letterName">Tampering</text>
      <text x="84" y="116" class="letterEx">Modify request body</text>
      <text x="84" y="146" class="letterMap">→ OWASP A08</text>
    </g>
    <g transform="translate(452,0)">
      <rect width="168" height="168" rx="14" fill="url(#letterG)" stroke="#fbbf24"/>
      <text x="84" y="58" class="letter">R</text>
      <text x="84" y="92" class="letterName">Repudiation</text>
      <text x="84" y="116" class="letterEx">Delete with no audit</text>
      <text x="84" y="146" class="letterMap">→ OWASP A09</text>
    </g>
    <g transform="translate(640,0)">
      <rect width="168" height="168" rx="14" fill="url(#letterG)" stroke="#fbbf24"/>
      <text x="84" y="58" class="letter">I</text>
      <text x="84" y="92" class="letterName">Info disclosure</text>
      <text x="84" y="116" class="letterEx">IDOR · error leak</text>
      <text x="84" y="146" class="letterMap">→ OWASP A01 + A04</text>
    </g>
    <g transform="translate(828,0)">
      <rect width="168" height="168" rx="14" fill="url(#letterG)" stroke="#fbbf24"/>
      <text x="84" y="58" class="letter">D</text>
      <text x="84" y="92" class="letterName">Denial of service</text>
      <text x="84" y="116" class="letterEx">Unbounded queries</text>
      <text x="84" y="146" class="letterMap">→ OWASP A04</text>
    </g>
    <g transform="translate(1016,0)">
      <rect width="168" height="168" rx="14" fill="url(#letterG)" stroke="#fbbf24"/>
      <text x="84" y="58" class="letter">E</text>
      <text x="84" y="92" class="letterName">Elevation</text>
      <text x="84" y="116" class="letterEx">Bypass authz check</text>
      <text x="84" y="146" class="letterMap">→ OWASP A01</text>
    </g>
  </g>

  <!-- Feature → mitigations row -->
  <g transform="translate(76,420)">
    <text class="colHdr">Feature under analysis</text>
    <g transform="translate(0,22)">
      <rect width="380" height="210" rx="14" fill="rgba(15,23,42,0.7)" stroke="rgba(96,165,250,0.35)"/>
      <text x="20" y="32" class="featTitle">Document sharing API</text>
      <text x="20" y="58" class="featBody">POST /docs/{id}/share { email, role }</text>
      <text x="20" y="84" class="featBody">Assets:</text>
      <text x="36" y="106" class="featBody">• confidential docs (crown jewel)</text>
      <text x="36" y="126" class="featBody">• share grants (audit-sensitive)</text>
      <text x="20" y="156" class="featBody">Actors:</text>
      <text x="36" y="178" class="featBody">• signed-in user, trusted browser</text>
      <text x="36" y="198" class="featBody">• Authz service, untrusted CDN</text>
    </g>
  </g>

  <!-- Prioritized mitigations on the right -->
  <g transform="translate(540,420)">
    <text class="colHdr">Prioritised mitigations · feed into Phase 2 prompt</text>
    <g transform="translate(0,22)">
      <rect width="664" height="46" rx="10" fill="rgba(251,113,133,0.1)" stroke="rgba(251,113,133,0.4)"/>
      <text x="20" y="20" class="mitSev" fill="#fda4af">High</text>
      <text x="20" y="38" class="mitName">Verify resource ownership before share — A01 + I</text>
      <text x="650" y="30" text-anchor="end" class="mitBody">Authz service</text>
    </g>
    <g transform="translate(0,76)">
      <rect width="664" height="46" rx="10" fill="rgba(251,113,133,0.1)" stroke="rgba(251,113,133,0.4)"/>
      <text x="20" y="20" class="mitSev" fill="#fda4af">High</text>
      <text x="20" y="38" class="mitName">Parameterised query for share lookup — A03 + T</text>
      <text x="650" y="30" text-anchor="end" class="mitBody">Share API</text>
    </g>
    <g transform="translate(0,130)">
      <rect width="664" height="46" rx="10" fill="rgba(251,191,36,0.1)" stroke="rgba(251,191,36,0.4)"/>
      <text x="20" y="20" class="mitSev" fill="#fcd34d">Med</text>
      <text x="20" y="38" class="mitName">Append-only audit log on share/unshare — A09 + R</text>
      <text x="650" y="30" text-anchor="end" class="mitBody">Audit pipeline</text>
    </g>
    <g transform="translate(0,184)">
      <rect width="664" height="46" rx="10" fill="rgba(251,191,36,0.1)" stroke="rgba(251,191,36,0.4)"/>
      <text x="20" y="20" class="mitSev" fill="#fcd34d">Med</text>
      <text x="20" y="38" class="mitName">Rate-limit + max-recipients — A04 + D</text>
      <text x="650" y="30" text-anchor="end" class="mitBody">API gateway</text>
    </g>
  </g>

  <text x="640" y="690" text-anchor="middle" class="heroSub" font-size="14">STRIDE → OWASP → prompt pack. The design phase produces a list, not a maybe.</text>
</svg>
