<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="t d">
  <title id="t">Phase 4 — Governance review</title>
  <desc id="d">A mock pull-request panel sits at the center with attached evidence, Golden Rules checklist, security review badge, and CODEOWNER approval. Automated evidence supports deliberate human judgment before merge.</desc>
  <defs>
    <radialGradient id="p4bg" cx="50%" cy="40%" r="60%">
      <stop offset="0" stop-color="#10122a" stop-opacity=".65"/>
      <stop offset="1" stop-color="#070a18" stop-opacity="0"/>
    </radialGradient>
    <style>
      .eyebrow{font:800 11px -apple-system,system-ui,sans-serif;letter-spacing:3.5px;text-transform:uppercase;fill:#a5b4fc}
      .heroTitle{font:900 38px -apple-system,system-ui,sans-serif;fill:#f8fafc}
      .heroSub{font:500 18px -apple-system,system-ui,sans-serif;fill:#94a3b8}
      .prTitle{font:900 20px -apple-system,system-ui,sans-serif;fill:#f8fafc}
      .prMeta{font:600 13px -apple-system,system-ui,sans-serif;fill:#94a3b8}
      .prLabel{font:700 11px -apple-system,system-ui,sans-serif;fill:#0b1224}
      .secHdr{font:800 12px -apple-system,system-ui,sans-serif;letter-spacing:2.5px;text-transform:uppercase;fill:#cbd5e1}
      .ruleTxt{font:600 13px -apple-system,system-ui,sans-serif;fill:#cbd5e1}
      .ruleOk{fill:#34d399;stroke:#34d399}
      .badgeName{font:800 14px -apple-system,system-ui,sans-serif;fill:#f8fafc}
      .badgeSub{font:500 11px -apple-system,system-ui,sans-serif;fill:#94a3b8}
      .checkVal{font:700 12px -apple-system,system-ui,sans-serif;fill:#6ee7b7}
      .checkLbl{font:600 12px -apple-system,system-ui,sans-serif;fill:#cbd5e1}
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="url(#p4bg)"/>

  <text x="64" y="74" class="eyebrow">Phase 4</text>
  <text x="64" y="118" class="heroTitle">Governance review</text>
  <text x="64" y="148" class="heroSub">Automated evidence supports deliberate human judgment before merge.</text>

  <!-- PR window -->
  <g transform="translate(96,200)">
    <rect width="780" height="460" rx="16" fill="rgba(15,23,42,0.92)" stroke="rgba(129,140,248,0.45)" stroke-width="1.5"/>
    <!-- title bar -->
    <rect width="780" height="56" rx="16" fill="rgba(129,140,248,0.15)"/>
    <rect width="780" height="56" rx="16" fill="rgba(15,23,42,0.0)"/>
    <circle cx="22" cy="28" r="6" fill="#fb7185"/>
    <circle cx="42" cy="28" r="6" fill="#fbbf24"/>
    <circle cx="62" cy="28" r="6" fill="#34d399"/>
    <text x="92" y="33" class="prTitle">#247 · Add document sharing with audit trail</text>
    <text x="92" y="78" class="prMeta">alice opened · 6 commits · +312 / -84 · base: main</text>

    <!-- labels row -->
    <g transform="translate(92,100)">
      <rect width="120" height="22" rx="11" fill="#fb7185"/><text x="60" y="16" text-anchor="middle" class="prLabel">A01 · Access</text>
      <g transform="translate(132,0)"><rect width="120" height="22" rx="11" fill="#fb7185"/><text x="60" y="16" text-anchor="middle" class="prLabel">A03 · Injection</text></g>
      <g transform="translate(264,0)"><rect width="120" height="22" rx="11" fill="#fbbf24"/><text x="60" y="16" text-anchor="middle" class="prLabel">AI-assisted</text></g>
      <g transform="translate(396,0)"><rect width="100" height="22" rx="11" fill="#818cf8"/><text x="50" y="16" text-anchor="middle" class="prLabel">needs review</text></g>
    </g>

    <!-- Evidence section -->
    <g transform="translate(22,150)">
      <text class="secHdr">Evidence attached</text>
      <g transform="translate(0,18)">
        <rect width="230" height="80" rx="10" fill="rgba(96,165,250,0.1)" stroke="rgba(96,165,250,0.35)"/>
        <text x="14" y="26" class="badgeName">Tests</text>
        <text x="14" y="46" class="badgeSub">jest · 12 attack vectors</text>
        <text x="14" y="68" class="checkVal">✓ 38 / 38 passed</text>
      </g>
      <g transform="translate(244,18)">
        <rect width="230" height="80" rx="10" fill="rgba(129,140,248,0.1)" stroke="rgba(129,140,248,0.35)"/>
        <text x="14" y="26" class="badgeName">CodeQL + Snyk</text>
        <text x="14" y="46" class="badgeSub">security-extended queries</text>
        <text x="14" y="68" class="checkVal">✓ 0 high · 0 critical</text>
      </g>
      <g transform="translate(488,18)">
        <rect width="230" height="80" rx="10" fill="rgba(52,211,153,0.1)" stroke="rgba(52,211,153,0.35)"/>
        <text x="14" y="26" class="badgeName">Fitness</text>
        <text x="14" y="46" class="badgeSub">complexity · coverage · perf</text>
        <text x="14" y="68" class="checkVal">✓ all gates pass</text>
      </g>
    </g>

    <!-- Golden rules checklist -->
    <g transform="translate(22,266)">
      <text class="secHdr">Golden Rules · human review</text>
      <g transform="translate(0,20)">
        <circle cx="10" cy="10" r="7" class="ruleOk" fill-opacity=".2"/>
        <text x="10" y="14" text-anchor="middle" class="checkVal">✓</text>
        <text x="28" y="14" class="ruleTxt">Be specific — RCTRO contract referenced in PR description</text>
      </g>
      <g transform="translate(0,46)">
        <circle cx="10" cy="10" r="7" class="ruleOk" fill-opacity=".2"/>
        <text x="10" y="14" text-anchor="middle" class="checkVal">✓</text>
        <text x="28" y="14" class="ruleTxt">Trust but verify — reviewer read every changed line</text>
      </g>
      <g transform="translate(0,72)">
        <circle cx="10" cy="10" r="7" class="ruleOk" fill-opacity=".2"/>
        <text x="10" y="14" text-anchor="middle" class="checkVal">✓</text>
        <text x="28" y="14" class="ruleTxt">Junior dev mindset — security controls inspected, edge cases questioned</text>
      </g>
      <g transform="translate(0,98)">
        <circle cx="10" cy="10" r="7" class="ruleOk" fill-opacity=".2"/>
        <text x="10" y="14" text-anchor="middle" class="checkVal">✓</text>
        <text x="28" y="14" class="ruleTxt">Isolated AI commits — AI-authored diffs separated from human edits</text>
      </g>
      <g transform="translate(0,124)">
        <circle cx="10" cy="10" r="7" class="ruleOk" fill-opacity=".2"/>
        <text x="10" y="14" text-anchor="middle" class="checkVal">✓</text>
        <text x="28" y="14" class="ruleTxt">Document the why — ADR linked, prompt pack referenced in commit</text>
      </g>
    </g>
  </g>

  <!-- Right column: approval stack -->
  <g transform="translate(910,200)">
    <!-- Security review card -->
    <g>
      <rect width="280" height="140" rx="14" fill="rgba(251,113,133,0.1)" stroke="rgba(251,113,133,0.4)"/>
      <rect width="280" height="3" rx="14" fill="#fb7185"/>
      <text x="22" y="34" class="secHdr" fill="#fda4af">Security review</text>
      <text x="22" y="68" class="prTitle">Threats covered</text>
      <g transform="translate(22,88)">
        <text class="checkLbl">A01 IDOR</text><text x="200" class="checkVal">✓ tested</text>
      </g>
      <g transform="translate(22,108)">
        <text class="checkLbl">A03 SQLi</text><text x="200" class="checkVal">✓ parameterized</text>
      </g>
      <g transform="translate(22,128)">
        <text class="checkLbl">A09 audit log</text><text x="200" class="checkVal">✓ present</text>
      </g>
    </g>

    <!-- Approval seal -->
    <g transform="translate(0,160)">
      <rect width="280" height="160" rx="14" fill="rgba(52,211,153,0.1)" stroke="rgba(52,211,153,0.5)"/>
      <rect width="280" height="3" rx="14" fill="#34d399"/>
      <text x="22" y="34" class="secHdr" fill="#6ee7b7">CODEOWNER approval</text>
      <circle cx="140" cy="90" r="34" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="2"/>
      <text x="140" y="98" text-anchor="middle" font="900 28px -apple-system,system-ui,sans-serif" font-size="28" font-weight="900" font-family="-apple-system,system-ui,sans-serif" fill="#6ee7b7">✓</text>
      <text x="140" y="142" text-anchor="middle" class="prMeta">Approved with rationale</text>
    </g>

    <!-- Merge button -->
    <g transform="translate(0,340)">
      <rect width="280" height="60" rx="14" fill="#34d399"/>
      <text x="140" y="38" text-anchor="middle" font="900 18px -apple-system,system-ui,sans-serif" font-size="18" font-weight="900" font-family="-apple-system,system-ui,sans-serif" fill="#0b1224">Merge to main →</text>
    </g>
  </g>

  <text x="640" y="690" text-anchor="middle" class="heroSub" font-size="14">Merge only with evidence. Override only with rationale. The human is the last gate.</text>
</svg>
