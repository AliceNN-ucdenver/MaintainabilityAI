<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="t d">
  <title id="t">Phase 5 — Deploy with rollback</title>
  <desc id="d">A merged change moves left to right through build, rescan, stage smoke tests, canary, and release, with a top-side rollback arc that returns instantly to the last known good build if any post-release signal trips.</desc>
  <defs>
    <radialGradient id="p5bg" cx="50%" cy="60%" r="60%">
      <stop offset="0" stop-color="#0c2018" stop-opacity=".55"/>
      <stop offset="1" stop-color="#070a18" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="trackG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset=".4" stop-color="#22d3ee"/>
      <stop offset=".7" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <marker id="goArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#34d399"/>
    </marker>
    <marker id="backArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#fb7185"/>
    </marker>
    <style>
      .eyebrow{font:800 11px -apple-system,system-ui,sans-serif;letter-spacing:3.5px;text-transform:uppercase;fill:#6ee7b7}
      .heroTitle{font:900 38px -apple-system,system-ui,sans-serif;fill:#f8fafc}
      .heroSub{font:500 18px -apple-system,system-ui,sans-serif;fill:#94a3b8}
      .stName{font:900 16px -apple-system,system-ui,sans-serif;fill:#f8fafc;text-anchor:middle}
      .stMeta{font:600 11px -apple-system,system-ui,sans-serif;fill:#94a3b8;text-anchor:middle}
      .stCheck{font:700 11px -apple-system,system-ui,sans-serif;fill:#6ee7b7;text-anchor:middle}
      .arcLbl{font:800 11px -apple-system,system-ui,sans-serif;letter-spacing:2.5px;text-transform:uppercase;fill:#fda4af}
      .telemHdr{font:800 12px -apple-system,system-ui,sans-serif;letter-spacing:2.5px;text-transform:uppercase;fill:#94a3b8}
      .telemVal{font:900 18px -apple-system,system-ui,sans-serif;fill:#f8fafc}
      .telemLbl{font:500 11px -apple-system,system-ui,sans-serif;fill:#94a3b8}
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="url(#p5bg)"/>

  <text x="64" y="74" class="eyebrow">Phase 5</text>
  <text x="64" y="118" class="heroTitle">Deploy with a rollback path</text>
  <text x="64" y="148" class="heroSub">Forward motion through 5 stages. Reverse motion is one click away — every step.</text>

  <!-- Forward track -->
  <g>
    <rect x="120" y="402" width="1040" height="4" rx="2" fill="url(#trackG)" opacity=".85"/>
    <!-- 5 stations evenly spaced: 168, 396, 624, 852, 1080 -->
    <g>
      <g transform="translate(168,404)">
        <circle r="38" fill="rgba(15,23,42,0.95)" stroke="#34d399" stroke-width="3"/>
        <text class="stName" y="6" fill="#6ee7b7">Merge</text>
        <text class="stMeta" y="68">approved evidence</text>
        <text class="stCheck" y="86">main · sha 3c2a1f</text>
      </g>
      <g transform="translate(396,404)">
        <circle r="38" fill="rgba(15,23,42,0.95)" stroke="#22d3ee" stroke-width="3"/>
        <text class="stName" y="6" fill="#67e8f9">Build</text>
        <text class="stMeta" y="68">recreate artifact</text>
        <text class="stCheck" y="86">SBOM + signed</text>
      </g>
      <g transform="translate(624,404)">
        <circle r="38" fill="rgba(15,23,42,0.95)" stroke="#a78bfa" stroke-width="3"/>
        <text class="stName" y="6" fill="#c4b5fd">Rescan</text>
        <text class="stMeta" y="68">SAST + deps replay</text>
        <text class="stCheck" y="86">0 new findings</text>
      </g>
      <g transform="translate(852,404)">
        <circle r="38" fill="rgba(15,23,42,0.95)" stroke="#818cf8" stroke-width="3"/>
        <text class="stName" y="6" fill="#a5b4fc">Stage</text>
        <text class="stMeta" y="68">smoke + healthchecks</text>
        <text class="stCheck" y="86">latency in budget</text>
      </g>
      <g transform="translate(1080,404)">
        <circle r="38" fill="rgba(15,23,42,0.95)" stroke="#fbbf24" stroke-width="3"/>
        <text class="stName" y="6" fill="#fcd34d">Release</text>
        <text class="stMeta" y="68">canary 5% → 100%</text>
        <text class="stCheck" y="86">observe + alert</text>
      </g>
    </g>
    <!-- direction arrows -->
    <g fill="none" stroke="#34d399" stroke-width="1.6" opacity=".8">
      <path d="M210 404 L356 404" marker-end="url(#goArr)"/>
      <path d="M438 404 L584 404" marker-end="url(#goArr)"/>
      <path d="M666 404 L812 404" marker-end="url(#goArr)"/>
      <path d="M894 404 L1040 404" marker-end="url(#goArr)"/>
    </g>
  </g>

  <!-- Rollback arc (top, dashed rose) -->
  <g>
    <path d="M 1080 366 C 1080 250, 168 250, 168 366" fill="none" stroke="rgba(251,113,133,0.6)" stroke-width="2" stroke-dasharray="5 6" marker-end="url(#backArr)"/>
    <g transform="translate(624,232)">
      <rect x="-110" y="-22" width="220" height="44" rx="22" fill="rgba(251,113,133,0.18)" stroke="#fb7185"/>
      <text x="0" y="6" text-anchor="middle" class="arcLbl">Rollback path · one click</text>
    </g>
  </g>

  <!-- Post-release telemetry strip -->
  <g transform="translate(96,520)">
    <rect width="1088" height="120" rx="14" fill="rgba(15,23,42,0.7)" stroke="rgba(251,191,36,0.3)"/>
    <rect width="1088" height="3" rx="14" fill="#fbbf24"/>
    <text x="20" y="32" class="telemHdr">Post-release telemetry · trips that auto-roll-back</text>
    <g transform="translate(20,52)">
      <text class="telemVal">p95 latency</text>
      <text class="telemLbl" y="22">trigger if &gt; 250 ms for 3 min</text>
    </g>
    <g transform="translate(220,52)">
      <text class="telemVal">error rate</text>
      <text class="telemLbl" y="22">trigger if &gt; 1% above baseline</text>
    </g>
    <g transform="translate(420,52)">
      <text class="telemVal">5xx burst</text>
      <text class="telemLbl" y="22">trigger if &gt; 10 / min sustained</text>
    </g>
    <g transform="translate(620,52)">
      <text class="telemVal">security signal</text>
      <text class="telemLbl" y="22">trigger if new SAST finding in prod</text>
    </g>
    <g transform="translate(860,52)">
      <text class="telemVal">manual flag</text>
      <text class="telemLbl" y="22">on-call can roll back at any time</text>
    </g>
  </g>

  <text x="640" y="690" text-anchor="middle" class="heroSub" font-size="14">Release automation keeps scanning after merge. A safe deploy is one with a safe undo.</text>
</svg>
