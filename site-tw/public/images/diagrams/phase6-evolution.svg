<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="t d">
  <title id="t">Phase 6 — Evolution loop</title>
  <desc id="d">Production signals on the left — metrics, incidents, drift — feed back into prompts, fitness gates, and the design phase on the right. An upward-rising spiral shows architecture improving over each cycle rather than just oscillating.</desc>
  <defs>
    <radialGradient id="p6bg" cx="50%" cy="40%" r="60%">
      <stop offset="0" stop-color="#0a1c24" stop-opacity=".55"/>
      <stop offset="1" stop-color="#070a18" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="spiralStroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee" stop-opacity=".55"/>
      <stop offset=".5" stop-color="#22d3ee" stop-opacity=".75"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity=".95"/>
    </linearGradient>
    <marker id="upArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#22d3ee"/>
    </marker>
    <style>
      .eyebrow{font:800 11px -apple-system,system-ui,sans-serif;letter-spacing:3.5px;text-transform:uppercase;fill:#67e8f9}
      .heroTitle{font:900 38px -apple-system,system-ui,sans-serif;fill:#f8fafc}
      .heroSub{font:500 18px -apple-system,system-ui,sans-serif;fill:#94a3b8}
      .sigName{font:800 14px -apple-system,system-ui,sans-serif;fill:#f8fafc}
      .sigBody{font:500 12px -apple-system,system-ui,sans-serif;fill:#94a3b8}
      .colHdr{font:800 12px -apple-system,system-ui,sans-serif;letter-spacing:2.5px;text-transform:uppercase;fill:#cbd5e1}
      .turnLbl{font:900 12px -apple-system,system-ui,sans-serif;fill:#0b1224;text-anchor:middle}
      .turnCap{font:600 11px -apple-system,system-ui,sans-serif;fill:#67e8f9;text-anchor:middle}
      .deltaName{font:800 13px -apple-system,system-ui,sans-serif;fill:#6ee7b7}
      .deltaBody{font:500 11px -apple-system,system-ui,sans-serif;fill:#cbd5e1}
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="url(#p6bg)"/>

  <text x="64" y="74" class="eyebrow">Phase 6</text>
  <text x="64" y="118" class="heroTitle">Architecture learns</text>
  <text x="64" y="148" class="heroSub">Production evidence updates prompts, gates, and design practice — every cycle.</text>

  <!-- LEFT COLUMN — production signals -->
  <g transform="translate(64,210)">
    <text class="colHdr">Production signals</text>
    <g transform="translate(0,22)">
      <rect width="280" height="76" rx="12" fill="rgba(96,165,250,0.1)" stroke="rgba(96,165,250,0.35)"/>
      <text x="16" y="28" class="sigName">Latency · throughput · errors</text>
      <text x="16" y="52" class="sigBody">SLO dashboards, alert history, on-call notes</text>
    </g>
    <g transform="translate(0,114)">
      <rect width="280" height="76" rx="12" fill="rgba(251,113,133,0.1)" stroke="rgba(251,113,133,0.35)"/>
      <text x="16" y="28" class="sigName">Security incidents</text>
      <text x="16" y="52" class="sigBody">SARIF triage, vulnerability hits, abuse logs</text>
    </g>
    <g transform="translate(0,206)">
      <rect width="280" height="76" rx="12" fill="rgba(251,191,36,0.1)" stroke="rgba(251,191,36,0.35)"/>
      <text x="16" y="28" class="sigName">Drift &amp; debt</text>
      <text x="16" y="52" class="sigBody">CALM vs reality diff, complexity creep, stale deps</text>
    </g>
    <g transform="translate(0,298)">
      <rect width="280" height="76" rx="12" fill="rgba(129,140,248,0.1)" stroke="rgba(129,140,248,0.35)"/>
      <text x="16" y="28" class="sigName">Prompt outcomes</text>
      <text x="16" y="52" class="sigBody">Which RCTRO prompts produced clean PRs</text>
    </g>
  </g>

  <!-- CENTER — spiral rising -->
  <g transform="translate(640,440)">
    <!-- 3 spiral turns shown as elliptical arcs spiralling outward + upward -->
    <g fill="none" stroke="url(#spiralStroke)" stroke-width="2.4">
      <ellipse cx="0" cy="60" rx="80" ry="32" opacity=".4"/>
      <ellipse cx="0" cy="0" rx="120" ry="40" opacity=".65"/>
      <ellipse cx="0" cy="-60" rx="160" ry="48" opacity=".9"/>
    </g>
    <!-- arrow continuing upward -->
    <path d="M 160 -60 Q 200 -60, 200 -130" fill="none" stroke="#22d3ee" stroke-width="2.4" marker-end="url(#upArr)"/>

    <!-- Turn markers with version labels -->
    <g transform="translate(-80,60)"><circle r="14" fill="#67e8f9"/><text class="turnLbl" y="4">v1</text><text class="turnCap" y="34">baseline</text></g>
    <g transform="translate(-120,0)"><circle r="14" fill="#67e8f9"/><text class="turnLbl" y="4">v2</text><text class="turnCap" y="34">tuned gates</text></g>
    <g transform="translate(-160,-60)"><circle r="14" fill="#67e8f9"/><text class="turnLbl" y="4">v3</text><text class="turnCap" y="34">better prompts</text></g>
    <g transform="translate(200,-160)"><circle r="18" fill="#22d3ee" stroke="#0b1224" stroke-width="3"/><text y="6" class="turnLbl">v4</text><text y="38" class="turnCap">→ next design</text></g>

    <!-- caption -->
    <text x="0" y="170" text-anchor="middle" class="sigBody">Each cycle reuses what worked and discards what didn't — architecture rises.</text>
  </g>

  <!-- RIGHT COLUMN — applied improvements -->
  <g transform="translate(936,210)">
    <text class="colHdr">Applied to Phase 1</text>

    <g transform="translate(0,22)">
      <rect width="280" height="76" rx="12" fill="rgba(52,211,153,0.1)" stroke="rgba(52,211,153,0.4)"/>
      <text x="16" y="28" class="deltaName">Prompt pack v2</text>
      <text x="16" y="52" class="deltaBody">add IDOR test for share endpoints</text>
    </g>
    <g transform="translate(0,114)">
      <rect width="280" height="76" rx="12" fill="rgba(52,211,153,0.1)" stroke="rgba(52,211,153,0.4)"/>
      <text x="16" y="28" class="deltaName">Fitness gate tightened</text>
      <text x="16" y="52" class="deltaBody">complexity ≤ 10 → ≤ 8 in shared module</text>
    </g>
    <g transform="translate(0,206)">
      <rect width="280" height="76" rx="12" fill="rgba(52,211,153,0.1)" stroke="rgba(52,211,153,0.4)"/>
      <text x="16" y="28" class="deltaName">Threat model updated</text>
      <text x="16" y="52" class="deltaBody">new flow added to CALM after incident</text>
    </g>
    <g transform="translate(0,298)">
      <rect width="280" height="76" rx="12" fill="rgba(52,211,153,0.1)" stroke="rgba(52,211,153,0.4)"/>
      <text x="16" y="28" class="deltaName">Debt ticket created</text>
      <text x="16" y="52" class="deltaBody">strangler plan for legacy validator</text>
    </g>
  </g>

  <text x="640" y="690" text-anchor="middle" class="heroSub" font-size="14">Architecture is treated as a living product. Phase 6 is what makes Phase 1 sharper next time.</text>
</svg>
