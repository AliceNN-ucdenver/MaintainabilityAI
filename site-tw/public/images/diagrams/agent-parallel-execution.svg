<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="t d">
  <title id="t">Parallel agent workstreams</title>
  <desc id="d">Three independent slices — Auth, Data, API — execute in parallel lanes from feature kickoff through their own tests, converging into a single integration gate that produces one reviewable pull request.</desc>
  <defs>
    <radialGradient id="pBg" cx="50%" cy="40%" r="60%">
      <stop offset="0" stop-color="#0a1428" stop-opacity=".55"/>
      <stop offset="1" stop-color="#070a18" stop-opacity="0"/>
    </radialGradient>
    <marker id="downArr" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0 0 5 10 10 0z" fill="#94a3b8"/>
    </marker>
    <marker id="convArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#67e8f9"/>
    </marker>
    <style>
      .eyebrow{font:800 11px -apple-system,system-ui,sans-serif;letter-spacing:3.5px;text-transform:uppercase;fill:#93c5fd}
      .heroTitle{font:900 38px -apple-system,system-ui,sans-serif;fill:#f8fafc}
      .heroSub{font:500 18px -apple-system,system-ui,sans-serif;fill:#94a3b8}
      .laneHdr{font:800 13px -apple-system,system-ui,sans-serif;letter-spacing:2.5px;text-transform:uppercase;text-anchor:middle}
      .laneRole{font:600 11px -apple-system,system-ui,sans-serif;fill:#94a3b8;text-anchor:middle}
      .stepName{font:800 13px -apple-system,system-ui,sans-serif;fill:#f8fafc;text-anchor:middle}
      .stepMeta{font:500 11px -apple-system,system-ui,sans-serif;fill:#94a3b8;text-anchor:middle}
      .startLbl{font:800 14px -apple-system,system-ui,sans-serif;letter-spacing:2px;text-transform:uppercase;fill:#fcd34d;text-anchor:middle}
      .gateLbl{font:800 14px -apple-system,system-ui,sans-serif;letter-spacing:2px;text-transform:uppercase;fill:#67e8f9;text-anchor:middle}
      .gateBody{font:500 12px -apple-system,system-ui,sans-serif;fill:#cbd5e1;text-anchor:middle}
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="url(#pBg)"/>

  <text x="64" y="74" class="eyebrow">Agent orchestration</text>
  <text x="64" y="118" class="heroTitle">Parallel workstreams</text>
  <text x="64" y="148" class="heroSub">Independent slices move quickly. The integration gate keeps them honest with each other.</text>

  <!-- KICKOFF (top center) -->
  <g transform="translate(640,200)">
    <rect x="-170" y="-30" width="340" height="60" rx="14" fill="rgba(251,191,36,0.12)" stroke="#fbbf24"/>
    <text y="6" class="startLbl">Feature kickoff · design packet</text>
  </g>
  <g fill="none" stroke="rgba(148,163,184,0.5)" stroke-width="1.5">
    <path d="M520 232 L268 290" marker-end="url(#downArr)"/>
    <path d="M640 232 L640 290" marker-end="url(#downArr)"/>
    <path d="M760 232 L1012 290" marker-end="url(#downArr)"/>
  </g>

  <!-- THREE LANES -->
  <g>
    <!-- Lane 1: Auth (blue) -->
    <g transform="translate(106,310)">
      <rect width="320" height="240" rx="16" fill="rgba(96,165,250,0.06)" stroke="rgba(96,165,250,0.32)"/>
      <text x="160" y="32" class="laneHdr" fill="#93c5fd">Auth slice</text>
      <text x="160" y="50" class="laneRole">identity controls + tests</text>
      <g transform="translate(20,72)"><rect width="280" height="38" rx="8" fill="rgba(96,165,250,0.12)" stroke="rgba(96,165,250,0.35)"/><text x="140" y="24" class="stepName">session middleware</text></g>
      <g transform="translate(20,120)"><rect width="280" height="38" rx="8" fill="rgba(96,165,250,0.12)" stroke="rgba(96,165,250,0.35)"/><text x="140" y="24" class="stepName">brute-force tests</text></g>
      <g transform="translate(20,168)"><rect width="280" height="38" rx="8" fill="rgba(96,165,250,0.12)" stroke="rgba(96,165,250,0.35)"/><text x="140" y="24" class="stepName">CodeQL + Snyk clean</text></g>
    </g>

    <!-- Lane 2: Data (emerald) -->
    <g transform="translate(480,310)">
      <rect width="320" height="240" rx="16" fill="rgba(52,211,153,0.06)" stroke="rgba(52,211,153,0.32)"/>
      <text x="160" y="32" class="laneHdr" fill="#6ee7b7">Data slice</text>
      <text x="160" y="50" class="laneRole">validation + persistence</text>
      <g transform="translate(20,72)"><rect width="280" height="38" rx="8" fill="rgba(52,211,153,0.12)" stroke="rgba(52,211,153,0.35)"/><text x="140" y="24" class="stepName">zod schema + repo</text></g>
      <g transform="translate(20,120)"><rect width="280" height="38" rx="8" fill="rgba(52,211,153,0.12)" stroke="rgba(52,211,153,0.35)"/><text x="140" y="24" class="stepName">SQL injection tests</text></g>
      <g transform="translate(20,168)"><rect width="280" height="38" rx="8" fill="rgba(52,211,153,0.12)" stroke="rgba(52,211,153,0.35)"/><text x="140" y="24" class="stepName">migration dry-run</text></g>
    </g>

    <!-- Lane 3: API (indigo) -->
    <g transform="translate(854,310)">
      <rect width="320" height="240" rx="16" fill="rgba(129,140,248,0.06)" stroke="rgba(129,140,248,0.32)"/>
      <text x="160" y="32" class="laneHdr" fill="#a5b4fc">API slice</text>
      <text x="160" y="50" class="laneRole">contracts + error handling</text>
      <g transform="translate(20,72)"><rect width="280" height="38" rx="8" fill="rgba(129,140,248,0.12)" stroke="rgba(129,140,248,0.35)"/><text x="140" y="24" class="stepName">OpenAPI updated</text></g>
      <g transform="translate(20,120)"><rect width="280" height="38" rx="8" fill="rgba(129,140,248,0.12)" stroke="rgba(129,140,248,0.35)"/><text x="140" y="24" class="stepName">contract diff (oasdiff)</text></g>
      <g transform="translate(20,168)"><rect width="280" height="38" rx="8" fill="rgba(129,140,248,0.12)" stroke="rgba(129,140,248,0.35)"/><text x="140" y="24" class="stepName">error envelope tests</text></g>
    </g>
  </g>

  <!-- Convergence -->
  <g fill="none" stroke="#22d3ee" stroke-width="1.8">
    <path d="M266 550 C 266 590, 640 590, 640 620" marker-end="url(#convArr)"/>
    <path d="M640 550 L640 620" marker-end="url(#convArr)"/>
    <path d="M1014 550 C 1014 590, 640 590, 640 620" marker-end="url(#convArr)"/>
  </g>

  <!-- Integration gate (bottom center) -->
  <g transform="translate(640,634)">
    <rect x="-230" y="0" width="460" height="64" rx="14" fill="rgba(34,211,238,0.12)" stroke="#22d3ee"/>
    <text y="26" class="gateLbl">Integration gate</text>
    <text y="50" class="gateBody">one reviewed PR · contracts agree · tests interlock</text>
  </g>
</svg>
