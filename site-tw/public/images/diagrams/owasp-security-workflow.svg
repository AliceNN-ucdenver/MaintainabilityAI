<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="t d">
  <title id="t">OWASP security-first workflow</title>
  <desc id="d">Ten OWASP shields on the left feed into a four-step delivery pipeline: select the pack, prompt the agent, run automated checks, and ship with attached evidence. Each shield represents one of the OWASP Top 10 (2021) categories.</desc>
  <defs>
    <radialGradient id="owBg" cx="50%" cy="50%" r="60%">
      <stop offset="0" stop-color="#1a0a15" stop-opacity=".55"/>
      <stop offset="1" stop-color="#070a18" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shieldG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(251,113,133,0.25)"/>
      <stop offset="1" stop-color="rgba(251,113,133,0.05)"/>
    </linearGradient>
    <marker id="rArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#fb7185"/>
    </marker>
    <style>
      .eyebrow{font:800 11px -apple-system,system-ui,sans-serif;letter-spacing:3.5px;text-transform:uppercase;fill:#fda4af}
      .heroTitle{font:900 38px -apple-system,system-ui,sans-serif;fill:#f8fafc}
      .heroSub{font:500 18px -apple-system,system-ui,sans-serif;fill:#94a3b8}
      .colHdr{font:800 12px -apple-system,system-ui,sans-serif;letter-spacing:2.5px;text-transform:uppercase;fill:#cbd5e1}
      .owTag{font:900 14px -apple-system,system-ui,sans-serif;fill:#fda4af;text-anchor:middle}
      .owName{font:600 11px -apple-system,system-ui,sans-serif;fill:#cbd5e1}
      .stName{font:900 17px -apple-system,system-ui,sans-serif;fill:#f8fafc}
      .stBody{font:500 12px -apple-system,system-ui,sans-serif;fill:#94a3b8}
      .stHint{font:600 11px -apple-system,system-ui,sans-serif;fill:#fcd34d}
      .stHintBlue{font:600 11px -apple-system,system-ui,sans-serif;fill:#67e8f9}
      .stHintGreen{font:600 11px -apple-system,system-ui,sans-serif;fill:#6ee7b7}
      .stHintIndigo{font:600 11px -apple-system,system-ui,sans-serif;fill:#a5b4fc}
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="url(#owBg)"/>

  <text x="64" y="74" class="eyebrow">OWASP prompt packs</text>
  <text x="64" y="118" class="heroTitle">Security-first workflow</text>
  <text x="64" y="148" class="heroSub">Threats select the pack, the pack shapes the prompt, automated checks prove the result, evidence ships with the PR.</text>

  <!-- LEFT: 10 shields, 2 columns x 5 rows -->
  <text x="64" y="208" class="colHdr">OWASP Top 10 (2021)</text>
  <g transform="translate(64,224)">
    <!-- shield path: 80w x 84h, point at bottom -->
    <g>
      <g transform="translate(0,0)"><path d="M0 0 L80 0 L80 50 Q80 70 40 84 Q0 70 0 50 Z" fill="url(#shieldG)" stroke="#fb7185"/><text x="40" y="32" class="owTag">A01</text><text x="40" y="58" class="owName" text-anchor="middle">Access ctrl</text></g>
      <g transform="translate(96,0)"><path d="M0 0 L80 0 L80 50 Q80 70 40 84 Q0 70 0 50 Z" fill="url(#shieldG)" stroke="#fb7185"/><text x="40" y="32" class="owTag">A02</text><text x="40" y="58" class="owName" text-anchor="middle">Crypto</text></g>
      <g transform="translate(192,0)"><path d="M0 0 L80 0 L80 50 Q80 70 40 84 Q0 70 0 50 Z" fill="url(#shieldG)" stroke="#fb7185"/><text x="40" y="32" class="owTag">A03</text><text x="40" y="58" class="owName" text-anchor="middle">Injection</text></g>
      <g transform="translate(288,0)"><path d="M0 0 L80 0 L80 50 Q80 70 40 84 Q0 70 0 50 Z" fill="url(#shieldG)" stroke="#fb7185"/><text x="40" y="32" class="owTag">A04</text><text x="40" y="58" class="owName" text-anchor="middle">Insecure design</text></g>
      <g transform="translate(384,0)"><path d="M0 0 L80 0 L80 50 Q80 70 40 84 Q0 70 0 50 Z" fill="url(#shieldG)" stroke="#fb7185"/><text x="40" y="32" class="owTag">A05</text><text x="40" y="58" class="owName" text-anchor="middle">Misconfig</text></g>
    </g>
    <g transform="translate(0,108)">
      <g transform="translate(0,0)"><path d="M0 0 L80 0 L80 50 Q80 70 40 84 Q0 70 0 50 Z" fill="url(#shieldG)" stroke="#fb7185"/><text x="40" y="32" class="owTag">A06</text><text x="40" y="58" class="owName" text-anchor="middle">Vuln comps</text></g>
      <g transform="translate(96,0)"><path d="M0 0 L80 0 L80 50 Q80 70 40 84 Q0 70 0 50 Z" fill="url(#shieldG)" stroke="#fb7185"/><text x="40" y="32" class="owTag">A07</text><text x="40" y="58" class="owName" text-anchor="middle">Authn</text></g>
      <g transform="translate(192,0)"><path d="M0 0 L80 0 L80 50 Q80 70 40 84 Q0 70 0 50 Z" fill="url(#shieldG)" stroke="#fb7185"/><text x="40" y="32" class="owTag">A08</text><text x="40" y="58" class="owName" text-anchor="middle">Integrity</text></g>
      <g transform="translate(288,0)"><path d="M0 0 L80 0 L80 50 Q80 70 40 84 Q0 70 0 50 Z" fill="url(#shieldG)" stroke="#fb7185"/><text x="40" y="32" class="owTag">A09</text><text x="40" y="58" class="owName" text-anchor="middle">Logging</text></g>
      <g transform="translate(384,0)"><path d="M0 0 L80 0 L80 50 Q80 70 40 84 Q0 70 0 50 Z" fill="url(#shieldG)" stroke="#fb7185"/><text x="40" y="32" class="owTag">A10</text><text x="40" y="58" class="owName" text-anchor="middle">SSRF</text></g>
    </g>
  </g>

  <!-- bracket arrow from shields to step 1 -->
  <g fill="none" stroke="#fb7185" stroke-width="2" stroke-linecap="round">
    <path d="M 540 376 L 600 376" marker-end="url(#rArr)"/>
  </g>

  <!-- RIGHT: 4-step pipeline -->
  <text x="640" y="208" class="colHdr">Delivery pipeline</text>

  <g transform="translate(600,228)">
    <rect width="600" height="380" rx="18" fill="rgba(15,23,42,0.7)" stroke="rgba(251,113,133,0.3)"/>

    <!-- step 1 -->
    <g transform="translate(20,28)">
      <circle cx="20" cy="20" r="18" fill="#fb7185"/>
      <text x="20" y="26" text-anchor="middle" font="900 14px -apple-system,system-ui,sans-serif" font-size="14" font-weight="900" font-family="-apple-system,system-ui,sans-serif" fill="#0b1224">1</text>
      <text x="56" y="20" class="stName">Select the pack</text>
      <text x="56" y="40" class="stBody">Map the feature's threats to OWASP categories → load matching prompt packs</text>
      <text x="56" y="58" class="stHint">e.g. share endpoint → A01 + A03 + A09</text>
    </g>
    <line x1="20" y1="100" x2="580" y2="100" stroke="rgba(148,163,184,0.2)"/>

    <!-- step 2 -->
    <g transform="translate(20,112)">
      <circle cx="20" cy="20" r="18" fill="#fbbf24"/>
      <text x="20" y="26" text-anchor="middle" font="900 14px -apple-system,system-ui,sans-serif" font-size="14" font-weight="900" font-family="-apple-system,system-ui,sans-serif" fill="#0b1224">2</text>
      <text x="56" y="20" class="stName">Prompt the agent</text>
      <text x="56" y="40" class="stBody">RCTRO contract — role, context, task, requirements, output. Tests requested.</text>
      <text x="56" y="58" class="stHint">claude code · copilot · coding agent</text>
    </g>
    <line x1="20" y1="184" x2="580" y2="184" stroke="rgba(148,163,184,0.2)"/>

    <!-- step 3 -->
    <g transform="translate(20,196)">
      <circle cx="20" cy="20" r="18" fill="#818cf8"/>
      <text x="20" y="26" text-anchor="middle" font="900 14px -apple-system,system-ui,sans-serif" font-size="14" font-weight="900" font-family="-apple-system,system-ui,sans-serif" fill="#0b1224">3</text>
      <text x="56" y="20" class="stName">Run automated checks</text>
      <text x="56" y="40" class="stBody">Unit tests + CodeQL + Snyk + fitness functions on every commit</text>
      <text x="56" y="58" class="stHintIndigo">attack vectors come from the pack</text>
    </g>
    <line x1="20" y1="268" x2="580" y2="268" stroke="rgba(148,163,184,0.2)"/>

    <!-- step 4 -->
    <g transform="translate(20,280)">
      <circle cx="20" cy="20" r="18" fill="#34d399"/>
      <text x="20" y="26" text-anchor="middle" font="900 14px -apple-system,system-ui,sans-serif" font-size="14" font-weight="900" font-family="-apple-system,system-ui,sans-serif" fill="#0b1224">4</text>
      <text x="56" y="20" class="stName">Ship with evidence</text>
      <text x="56" y="40" class="stBody">PR description names the categories addressed, links the prompt pack, attaches results</text>
      <text x="56" y="58" class="stHintGreen">human approval is the last gate</text>
    </g>
  </g>

  <text x="640" y="690" text-anchor="middle" class="heroSub" font-size="14">Each category has its own prompt pack at /docs/prompts/owasp/ with attack vectors, controls, and review checklist.</text>
</svg>
