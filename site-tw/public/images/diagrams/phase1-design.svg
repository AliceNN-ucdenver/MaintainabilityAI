<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="t d">
  <title id="t">Phase 1 — Design intent</title>
  <desc id="d">Design intent assembled like a blueprint: user story at the top, architecture in the middle layer with components and trust zones, STRIDE threat overlay, OWASP control mappings, and fitness gates listed at the bottom. Each piece becomes input to the agent contract.</desc>
  <defs>
    <radialGradient id="p1bg" cx="50%" cy="0%" r="70%">
      <stop offset="0" stop-color="#0e1a30" stop-opacity=".8"/>
      <stop offset="1" stop-color="#070a18" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(96,165,250,0.08)" stroke-width="1"/>
    </pattern>
    <marker id="a1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#94a3b8"/>
    </marker>
    <style>
      .eyebrow{font:800 11px -apple-system,system-ui,sans-serif;letter-spacing:3.5px;text-transform:uppercase;fill:#93c5fd}
      .heroTitle{font:900 38px -apple-system,system-ui,sans-serif;fill:#f8fafc}
      .heroSub{font:500 18px -apple-system,system-ui,sans-serif;fill:#94a3b8}
      .laneLbl{font:800 12px -apple-system,system-ui,sans-serif;letter-spacing:2.5px;text-transform:uppercase;fill:#94a3b8}
      .bpTitle{font:900 16px -apple-system,system-ui,sans-serif;fill:#f8fafc}
      .bpBody{font:500 12px -apple-system,system-ui,sans-serif;fill:#cbd5e1}
      .compName{font:800 13px -apple-system,system-ui,sans-serif;fill:#f8fafc;text-anchor:middle}
      .compRole{font:500 11px -apple-system,system-ui,sans-serif;fill:#94a3b8;text-anchor:middle}
      .stride{font:900 14px -apple-system,system-ui,sans-serif;fill:#fda4af;text-anchor:middle}
      .strideLong{font:600 11px -apple-system,system-ui,sans-serif;fill:#94a3b8}
      .pkChip{font:800 13px -apple-system,system-ui,sans-serif;fill:#fda4af;text-anchor:middle}
      .gateTitle{font:800 13px -apple-system,system-ui,sans-serif;fill:#6ee7b7}
      .gateVal{font:900 14px -apple-system,system-ui,sans-serif;fill:#f8fafc}
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="url(#p1bg)"/>
  <rect x="64" y="200" width="1152" height="460" rx="20" fill="rgba(15,23,42,0.55)" stroke="rgba(96,165,250,0.18)"/>
  <rect x="64" y="200" width="1152" height="460" rx="20" fill="url(#grid)"/>

  <g stroke="rgba(147,197,253,0.45)" stroke-width="1.5" fill="none">
    <path d="M64 220 L64 240 L84 240"/>
    <path d="M1216 220 L1216 240 L1196 240"/>
    <path d="M64 640 L64 620 L84 620"/>
    <path d="M1216 640 L1216 620 L1196 620"/>
  </g>

  <text x="64" y="74" class="eyebrow">Phase 1</text>
  <text x="64" y="118" class="heroTitle">Design intent</text>
  <text x="64" y="148" class="heroSub">Threat model, architecture, and fitness gates become the AI agent contract.</text>

  <g transform="translate(96,228)">
    <text class="laneLbl">Intent · user story</text>
    <text class="bpTitle" y="28">Authenticated users can share documents with teammates</text>
    <text class="bpBody" y="52">Asset = confidential documents · actor = signed-in user · constraint = least privilege, audit every share event</text>
  </g>

  <text x="96" y="324" class="laneLbl">Architecture · components and trust zones</text>
  <g>
    <g transform="translate(120,344)">
      <rect width="170" height="78" rx="12" fill="rgba(96,165,250,0.12)" stroke="#60a5fa"/>
      <text x="85" y="34" class="compName">Browser</text>
      <text x="85" y="56" class="compRole">untrusted zone</text>
    </g>
    <g transform="translate(370,344)">
      <rect width="170" height="78" rx="12" fill="rgba(34,211,238,0.12)" stroke="#22d3ee"/>
      <text x="85" y="34" class="compName">Share API</text>
      <text x="85" y="56" class="compRole">trust boundary</text>
    </g>
    <g transform="translate(620,344)">
      <rect width="170" height="78" rx="12" fill="rgba(129,140,248,0.12)" stroke="#818cf8"/>
      <text x="85" y="34" class="compName">Authz service</text>
      <text x="85" y="56" class="compRole">policy decision</text>
    </g>
    <g transform="translate(870,344)">
      <rect width="170" height="78" rx="12" fill="rgba(52,211,153,0.12)" stroke="#34d399"/>
      <text x="85" y="34" class="compName">Documents DB</text>
      <text x="85" y="56" class="compRole">crown jewel</text>
    </g>
    <g fill="none" stroke="rgba(148,163,184,0.5)" stroke-width="1.5">
      <path d="M290 383 L370 383" marker-end="url(#a1)"/>
      <path d="M540 383 L620 383" marker-end="url(#a1)"/>
      <path d="M790 383 L870 383" marker-end="url(#a1)"/>
    </g>
  </g>

  <text x="96" y="462" class="laneLbl">STRIDE overlay · threats per component</text>
  <g transform="translate(96,476)">
    <g><rect width="46" height="46" rx="8" fill="rgba(251,113,133,0.16)" stroke="#fb7185"/><text x="23" y="30" class="stride">S</text></g>
    <text x="56" y="22" class="strideLong">Spoofing</text>
    <text x="56" y="40" class="strideLong" fill="#cbd5e1">Fake session token</text>
    <g transform="translate(170,0)"><rect width="46" height="46" rx="8" fill="rgba(251,113,133,0.16)" stroke="#fb7185"/><text x="23" y="30" class="stride">T</text></g>
    <text x="226" y="22" class="strideLong">Tampering</text>
    <text x="226" y="40" class="strideLong" fill="#cbd5e1">Bypass authz</text>
    <g transform="translate(340,0)"><rect width="46" height="46" rx="8" fill="rgba(251,113,133,0.16)" stroke="#fb7185"/><text x="23" y="30" class="stride">R</text></g>
    <text x="396" y="22" class="strideLong">Repudiation</text>
    <text x="396" y="40" class="strideLong" fill="#cbd5e1">Share without audit</text>
    <g transform="translate(510,0)"><rect width="46" height="46" rx="8" fill="rgba(251,113,133,0.16)" stroke="#fb7185"/><text x="23" y="30" class="stride">I</text></g>
    <text x="566" y="22" class="strideLong">Info disclosure</text>
    <text x="566" y="40" class="strideLong" fill="#cbd5e1">IDOR</text>
  </g>

  <text x="96" y="556" class="laneLbl">OWASP mapping · prompt packs to load</text>
  <g transform="translate(96,572)">
    <g><rect width="140" height="40" rx="8" fill="rgba(251,113,133,0.14)" stroke="rgba(251,113,133,0.45)"/><text x="70" y="26" class="pkChip">A01 · Access</text></g>
    <g transform="translate(155,0)"><rect width="140" height="40" rx="8" fill="rgba(251,113,133,0.14)" stroke="rgba(251,113,133,0.45)"/><text x="70" y="26" class="pkChip">A03 · Injection</text></g>
    <g transform="translate(310,0)"><rect width="140" height="40" rx="8" fill="rgba(251,113,133,0.14)" stroke="rgba(251,113,133,0.45)"/><text x="70" y="26" class="pkChip">A07 · Authn</text></g>
    <g transform="translate(465,0)"><rect width="140" height="40" rx="8" fill="rgba(251,113,133,0.14)" stroke="rgba(251,113,133,0.45)"/><text x="70" y="26" class="pkChip">A09 · Logging</text></g>
  </g>

  <g transform="translate(740,455)">
    <rect width="450" height="180" rx="14" fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.4)"/>
    <text x="20" y="32" class="laneLbl" fill="#6ee7b7">Fitness gates · measurable constraints</text>
    <g transform="translate(20,62)"><text class="gateTitle">Cyclomatic complexity</text><text class="gateVal" x="240">≤ 10</text></g>
    <g transform="translate(20,92)"><text class="gateTitle">Test coverage</text><text class="gateVal" x="240">≥ 80%</text></g>
    <g transform="translate(20,122)"><text class="gateTitle">Dependency freshness</text><text class="gateVal" x="240">≤ 90 days</text></g>
    <g transform="translate(20,152)"><text class="gateTitle">Performance p95</text><text class="gateVal" x="240">&lt; 200 ms</text></g>
  </g>

  <text x="640" y="690" text-anchor="middle" class="heroSub" font-size="14">Design before generation. The blueprint is what the agent receives.</text>
</svg>
