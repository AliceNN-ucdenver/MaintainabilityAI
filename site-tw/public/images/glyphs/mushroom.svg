<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Mushroom — Absolem AI advisor">
  <title>Absolem's mushroom — AI advisor</title>
  <defs>
    <radialGradient id="msGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0" stop-color="#c4b5fd" stop-opacity=".22"/>
      <stop offset="1" stop-color="#c4b5fd" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="msCap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="46" fill="url(#msGlow)"/>
  <!-- stem -->
  <rect x="42" y="56" width="16" height="26" rx="3" fill="#0b1224" stroke="#c4b5fd" stroke-width="2"/>
  <!-- cap -->
  <path d="M22 56 Q22 30 50 30 Q78 30 78 56 Z" fill="url(#msCap)" stroke="#c4b5fd" stroke-width="2"/>
  <!-- spots -->
  <circle cx="38" cy="42" r="3.5" fill="#fde047"/>
  <circle cx="56" cy="38" r="2.5" fill="#fde047"/>
  <circle cx="64" cy="48" r="3" fill="#fde047"/>
  <circle cx="32" cy="50" r="2" fill="#fde047"/>
  <!-- ground -->
  <ellipse cx="50" cy="84" rx="20" ry="2" fill="#22d3ee" opacity=".4"/>
</svg>
