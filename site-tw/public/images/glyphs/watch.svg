<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Pocket watch — SDLC cycle">
  <title>Pocket watch — the continuous SDLC cycle</title>
  <defs>
    <radialGradient id="wcGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0" stop-color="#67e8f9" stop-opacity=".22"/>
      <stop offset="1" stop-color="#67e8f9" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="46" fill="url(#wcGlow)"/>
  <!-- chain -->
  <path d="M50 8 L46 18 L52 22 L48 30" stroke="#a5b4fc" stroke-width="2" fill="none"/>
  <!-- crown -->
  <rect x="46" y="22" width="8" height="6" rx="1" fill="#0b1224" stroke="#67e8f9" stroke-width="1.5"/>
  <!-- watch outer ring -->
  <circle cx="50" cy="58" r="28" fill="#0b1224" stroke="#a5f3fc" stroke-width="2.5"/>
  <!-- inner face -->
  <circle cx="50" cy="58" r="24" fill="#070a18"/>
  <!-- hour ticks (12, 3, 6, 9) -->
  <line x1="50" y1="36" x2="50" y2="40" stroke="#67e8f9" stroke-width="2"/>
  <line x1="74" y1="58" x2="70" y2="58" stroke="#67e8f9" stroke-width="2"/>
  <line x1="50" y1="80" x2="50" y2="76" stroke="#67e8f9" stroke-width="2"/>
  <line x1="26" y1="58" x2="30" y2="58" stroke="#67e8f9" stroke-width="2"/>
  <!-- small ticks every 30° -->
  <g stroke="#475569" stroke-width="1">
    <line x1="62" y1="38" x2="60" y2="42"/>
    <line x1="70" y1="46" x2="66" y2="48"/>
    <line x1="70" y1="70" x2="66" y2="68"/>
    <line x1="62" y1="78" x2="60" y2="74"/>
    <line x1="38" y1="78" x2="40" y2="74"/>
    <line x1="30" y1="70" x2="34" y2="68"/>
    <line x1="30" y1="46" x2="34" y2="48"/>
    <line x1="38" y1="38" x2="40" y2="42"/>
  </g>
  <!-- hands -->
  <line x1="50" y1="58" x2="50" y2="44" stroke="#fbbf24" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="50" y1="58" x2="62" y2="64" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
  <circle cx="50" cy="58" r="2.5" fill="#fbbf24"/>
</svg>
