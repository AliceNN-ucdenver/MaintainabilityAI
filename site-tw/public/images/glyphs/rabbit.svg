<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="White Rabbit — workshop journey">
  <title>White Rabbit — down the rabbit hole</title>
  <defs>
    <radialGradient id="rbGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0" stop-color="#fcd34d" stop-opacity=".22"/>
      <stop offset="1" stop-color="#fcd34d" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="46" fill="url(#rbGlow)"/>
  <!-- ears -->
  <ellipse cx="40" cy="28" rx="5" ry="14" fill="#0b1224" stroke="#fde047" stroke-width="2" transform="rotate(-12 40 28)"/>
  <ellipse cx="60" cy="28" rx="5" ry="14" fill="#0b1224" stroke="#fde047" stroke-width="2" transform="rotate(12 60 28)"/>
  <ellipse cx="40" cy="30" rx="2.5" ry="8" fill="#fb7185" opacity=".55" transform="rotate(-12 40 30)"/>
  <ellipse cx="60" cy="30" rx="2.5" ry="8" fill="#fb7185" opacity=".55" transform="rotate(12 60 30)"/>
  <!-- head -->
  <ellipse cx="50" cy="56" rx="22" ry="20" fill="#0b1224" stroke="#fde047" stroke-width="2"/>
  <!-- eyes -->
  <circle cx="42" cy="54" r="2.6" fill="#fde047"/>
  <circle cx="58" cy="54" r="2.6" fill="#fde047"/>
  <!-- nose -->
  <ellipse cx="50" cy="64" rx="2" ry="1.5" fill="#fb7185"/>
  <!-- whiskers -->
  <line x1="32" y1="65" x2="42" y2="66" stroke="#cbd5e1" stroke-width="1" opacity=".6"/>
  <line x1="58" y1="66" x2="68" y2="65" stroke="#cbd5e1" stroke-width="1" opacity=".6"/>
  <!-- pocket-watch hint at the corner -->
  <circle cx="78" cy="78" r="7" fill="#fde047" stroke="#fbbf24" stroke-width="1.5"/>
  <line x1="78" y1="78" x2="78" y2="74" stroke="#0b1224" stroke-width="1.5"/>
  <line x1="78" y1="78" x2="81" y2="79" stroke="#0b1224" stroke-width="1.5"/>
</svg>
