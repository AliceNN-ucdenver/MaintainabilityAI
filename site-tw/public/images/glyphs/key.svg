<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Key — unlock the quickstart">
  <title>Tiny golden key — the Red Queen quickstart</title>
  <defs>
    <radialGradient id="kyGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0" stop-color="#fcd34d" stop-opacity=".22"/>
      <stop offset="1" stop-color="#fcd34d" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="46" fill="url(#kyGlow)"/>
  <!-- bow (head ring) -->
  <circle cx="32" cy="50" r="14" fill="none" stroke="#fde047" stroke-width="4.5"/>
  <circle cx="32" cy="50" r="4" fill="#0b1224" stroke="#fde047" stroke-width="1.5"/>
  <!-- shank -->
  <rect x="44" y="46" width="38" height="8" fill="#fde047" rx="1"/>
  <!-- teeth -->
  <rect x="64" y="54" width="6" height="10" fill="#fde047"/>
  <rect x="74" y="54" width="6" height="6" fill="#fde047"/>
  <!-- shine -->
  <line x1="28" y1="44" x2="34" y2="44" stroke="#fffbeb" stroke-width="1.5" opacity=".8"/>
</svg>
