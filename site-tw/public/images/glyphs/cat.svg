<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Cheshire smile — security">
  <title>Cheshire Cat smile — security scaffolding</title>
  <defs>
    <radialGradient id="catGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0" stop-color="#6ee7b7" stop-opacity=".25"/>
      <stop offset="1" stop-color="#6ee7b7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="46" fill="url(#catGlow)"/>
  <!-- floating ears -->
  <path d="M28 30 L36 18 L38 32 Z" fill="#0b1224" stroke="#6ee7b7" stroke-width="2"/>
  <path d="M72 30 L64 18 L62 32 Z" fill="#0b1224" stroke="#6ee7b7" stroke-width="2"/>
  <!-- glowing eyes -->
  <circle cx="40" cy="44" r="3.5" fill="#34d399"/>
  <circle cx="60" cy="44" r="3.5" fill="#34d399"/>
  <circle cx="40" cy="44" r="1.2" fill="#0b1224"/>
  <circle cx="60" cy="44" r="1.2" fill="#0b1224"/>
  <!-- big smile -->
  <path d="M28 56 Q50 84 72 56" fill="none" stroke="#34d399" stroke-width="3.5" stroke-linecap="round"/>
  <!-- teeth lines -->
  <line x1="36" y1="62" x2="36" y2="70" stroke="#34d399" stroke-width="1.5"/>
  <line x1="42" y1="65" x2="42" y2="74" stroke="#34d399" stroke-width="1.5"/>
  <line x1="50" y1="66" x2="50" y2="76" stroke="#34d399" stroke-width="1.5"/>
  <line x1="58" y1="65" x2="58" y2="74" stroke="#34d399" stroke-width="1.5"/>
  <line x1="64" y1="62" x2="64" y2="70" stroke="#34d399" stroke-width="1.5"/>
</svg>
