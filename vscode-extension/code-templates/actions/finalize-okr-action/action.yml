name: "Finalize OKR phase action (canonical — used by all per-agent finalize jobs)"
description: |
  Canonical finalize body — eliminates the "5 ways to finalize" smell
  by consolidating the three per-agent workflows' finalize steps into
  one composite. Refactor 3c (post D-PR1.v1.6).

  Reads the OKR card on the default branch, flips the action's
  status to complete + writes completedAt + writes hatterChainRoot,
  rolls meta.status forward (gated on the current-meta-status input
  to prevent downgrade on re-runs), appends a chain-ladder.yaml
  entry stitching this phase to its parent intent thread, then
  commits + pushes back to main with a retry loop.

  Two hard guards inherited from the prior per-agent implementations:
    1. **Fail loudly on runId mismatch.** The yq selector matching 0
       actions was the silent-no-op bug behind PR #97 (dispatch-time
       commit not pushed before merge → finalize couldn't find the
       action → run reported success without flipping anything).
       Action exits 1 + lists current action runIds for triage.
    2. **Guard meta.status forward-roll.** A re-run of an earlier
       phase after a later one shipped MUST NOT downgrade the
       master status; the bash conditional checks
       current-meta-status before writing next-meta-status.

  Pre-condition: workflow MUST have checked out main with write
  credentials BEFORE calling this action.

inputs:
  phase:
    description: "Phase id — why | how | what."
    required: true
  okr-id:
    description: "OKR id (e.g. OKR-2026Q2-IMDB-001-celeb-api)."
    required: true
  run-id:
    description: "Run id of the action being finalized (e.g. HOW-2026-05-21-5pvl2x)."
    required: true
  chain-root-hash:
    description: "Chain-root SHA-256 extracted from artifact Hatter Tag. Empty string disables hatterChainRoot write + UI seal badge."
    required: false
    default: ""
  current-meta-status:
    description: "OKR meta.status MUST equal this for the forward-roll to fire. Acts as a downgrade guard."
    required: true
  next-meta-status:
    description: "OKR meta.status will be set to this on successful finalize."
    required: true
  prior-phase:
    description: "Phase id of the parent for chain-ladder.parent_intent_thread resolution (empty for WHY)."
    required: false
    default: ""
  pr-number:
    description: "GitHub PR number (for chain-ladder + commit message)."
    required: true
  pr-merge-commit-sha:
    description: "github.event.pull_request.merge_commit_sha — recorded in chain-ladder for cross-ref."
    required: true
  artifact-path:
    description: |
      Path to the phase artifact (research-doc.md / prd.md / code-design.md)
      relative to repo root. Finalize hashes this file and appends a
      durable artifact_written event to the per-run JSONL with idempotency
      semantics (path + sha + bytes + merge_sha). Bug Z contract: PR audit
      verifies; finalize records. Required for the cross-phase trust
      contract.
    required: true
  rail-report-path:
    description: |
      OPTIONAL. Path (repo-relative) to a durable Oracle & Privacy Rails
      report a phase finalize job already produced + committed (today: the WHY
      finalize job). When set + present, finalize emits an unsigned, workflow-
      origin `rail_decision` event pointing at it (re-derivable; the rollup
      replays the report). Empty/absent → no-op. This action is a generic
      RECORDER — it never runs a rail.
    required: false
    default: ""
  rail-report-paths:
    description: |
      OPTIONAL (Phase 3+). Newline-separated list of durable rail report paths
      when a phase produced MORE THAN ONE rail (e.g. WHY: pii + injection). Each
      becomes its own rail_decision, idempotency-keyed on report_path. Combined
      with rail-report-path (both honored + de-duplicated). Empty means no-op.
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Finalize phase action — flip status + roll meta.status + append chain-ladder
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        OKR_FILE="okrs/${{ inputs.okr-id }}/okr.yaml"
        if [ ! -f "$OKR_FILE" ]; then
          echo "::warning::okr.yaml missing at $OKR_FILE — skipping status flip"
          exit 0
        fi

        # ── Guard 1: runId mismatch → fail loudly. ──────────────────
        # PR #97 silent-no-op forensic: if the dispatch-time commit
        # was never pushed to remote before the agent's PR merged,
        # finalize would run against a remote that lacked the action,
        # yq selector matched 0, no flip happened, workflow reported
        # success — but the OKR stayed in_progress forever.
        RUN_ID='${{ inputs.run-id }}'
        MATCHED=$(yq -r ".actions[] | select(.runId == \"$RUN_ID\") | .runId" "$OKR_FILE" | wc -l | tr -d ' ')
        if [ "$MATCHED" -eq 0 ]; then
          echo "::error title=Action runId not found::yq select(.runId == \"$RUN_ID\") matched 0 actions in $OKR_FILE. The dispatch-time commit may not have been pushed to remote before this merge. Push the missing commit (or add the action manually) and re-run this workflow. Listing current action runIds for triage:"
          yq -r '.actions[] | "  - " + .id + " runId=" + .runId + " status=" + .status' "$OKR_FILE"
          exit 1
        fi

        # ── 1. Flip action: status complete + completedAt + hatterChainRoot. ──
        NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        yq -i "(.actions[] | select(.runId == \"$RUN_ID\") | .status) = \"complete\"" "$OKR_FILE"
        yq -i "(.actions[] | select(.runId == \"$RUN_ID\") | .completedAt) = \"$NOW\"" "$OKR_FILE"
        CHAIN_ROOT_HASH='${{ inputs.chain-root-hash }}'
        if [ -n "$CHAIN_ROOT_HASH" ]; then
          yq -i "(.actions[] | select(.runId == \"$RUN_ID\") | .hatterChainRoot) = \"$CHAIN_ROOT_HASH\"" "$OKR_FILE"
        else
          echo "::warning::No chain_root_hash extracted from Hatter Tag — actions[].hatterChainRoot left empty; UI seal badge will not render for this run. The agent's artifact frontmatter likely still says \`chain_root_hash: <write at finalize>\` placeholder — extract-okr-context can't resolve from a placeholder."
        fi

        # ── 1b. Aggregate self_review events from chain → okr.yaml. ──
        # Bug RR (2026-05-25) — pre-this-fix, okr.yaml ACT-N showed
        # `rounds: 0` and `reviewerScores: {}` even when the run's
        # JSONL chain had 4 signed self_review events across 2
        # rounds. The chain is the source of truth and the UI reads
        # from it for live display (correct), but consumers reading
        # okr.yaml fields (e.g. portfolio queries, exports) saw
        # under-reported state.
        #
        # Walk the chain, count rounds + extract final-round scores
        # per persona (Bug-W legitimacy gate: only signed self_review
        # events count, matching what audit-verify-chain accepts).
        # Idempotent — re-running finalize re-derives the same
        # aggregates from the same chain.
        JSONL_FOR_AGG="okrs/${{ inputs.okr-id }}/audit/events/$RUN_ID.jsonl"
        if [ -f "$JSONL_FOR_AGG" ]; then
          AGG_OUT=$(JSONL="$JSONL_FOR_AGG" python3 <<'PYEOF'
        import json, os
        jsonl = os.environ['JSONL']
        # Track per-persona max round + the score at that max round.
        # The chain may have multiple rounds; we want the FINAL one.
        per_persona = {}  # persona -> (max_round, score_at_max)
        max_round_any = 0
        with open(jsonl, 'r', encoding='utf-8') as f:
            for line in f:
                line = line.strip()
                if not line: continue
                try:
                    e = json.loads(line)
                except Exception:
                    continue
                if e.get('event_kind') != 'self_review': continue
                # Bug W gate: only signed self_review events are legitimate.
                # Unsigned + workflow-emitted self_review was rejected post-V/X.
                if not e.get('signature'): continue
                payload = e.get('payload') or {}
                persona = payload.get('persona')
                round_n = payload.get('round')
                score   = payload.get('score')
                if not persona or round_n is None: continue
                cur = per_persona.get(persona)
                if cur is None or round_n > cur[0]:
                    per_persona[persona] = (round_n, score)
                if round_n > max_round_any:
                    max_round_any = round_n
        # Emit shell-readable aggregates. Use lines like KEY=VALUE so
        # bash can `eval` cleanly. Skip if no signed self_review found
        # (WHY phase has none — that's correct, not a failure).
        out = []
        out.append(f'MAX_ROUND={max_round_any}')
        for persona, (_round, score) in sorted(per_persona.items()):
            # YAML-safe persona key (alphanumeric + underscore in practice).
            safe = ''.join(c if c.isalnum() else '_' for c in persona)
            out.append(f'SCORE_{safe}={score if score is not None else "null"}')
        print('\n'.join(out))
        PYEOF
          )
          # Parse the AGG_OUT lines into yq -i mutations on okr.yaml.
          MAX_ROUND=$(echo "$AGG_OUT" | grep -E '^MAX_ROUND=' | cut -d= -f2)
          if [ -n "$MAX_ROUND" ] && [ "$MAX_ROUND" -gt 0 ]; then
            yq -i "(.actions[] | select(.runId == \"$RUN_ID\") | .rounds) = $MAX_ROUND" "$OKR_FILE"
            # Build the reviewerScores mapping from SCORE_<persona>=N lines.
            # yq merge instead of overwrite so re-running doesn't clobber
            # any future per-persona fields we might add.
            echo "$AGG_OUT" | grep -E '^SCORE_' | while IFS='=' read -r key val; do
              persona="${key#SCORE_}"
              # Convert underscore back to hyphen for common persona names
              # (code-architect, code-security). One-way isn't perfect but
              # we don't currently have personas with both - and _ in names.
              persona_yaml=$(echo "$persona" | tr '_' '-')
              if [ "$val" = "null" ]; then
                yq -i "(.actions[] | select(.runId == \"$RUN_ID\") | .reviewerScores.\"$persona_yaml\") = null" "$OKR_FILE"
              else
                yq -i "(.actions[] | select(.runId == \"$RUN_ID\") | .reviewerScores.\"$persona_yaml\") = $val" "$OKR_FILE"
              fi
            done
            echo "::notice::Aggregated $MAX_ROUND self_review round(s) into okr.yaml ACT for runId=$RUN_ID"
          else
            echo "::notice::No signed self_review events in chain for $RUN_ID (expected for WHY phase) — leaving rounds/reviewerScores untouched"
          fi
        fi

        # ── 2. Roll meta.status forward (guarded — no downgrade). ──
        # When a re-run of an earlier phase fires after a later one
        # shipped, the master status MUST NOT downgrade.
        #
        # Cert-run bug B fix (Task #51): track whether the guard fired
        # so the trailing success notice + commit message reflect what
        # actually happened. Previously the notice always printed
        # "meta.status -> ${{ inputs.next-meta-status }}" via raw
        # template-literal substitution even when the guard skipped
        # the write — auditors reading the workflow log saw a forward
        # roll that never landed.
        CURRENT_STATUS=$(yq -r '.meta.status' "$OKR_FILE")
        META_ROLL_OUTCOME="skipped"
        META_STATUS_AFTER="$CURRENT_STATUS"
        if [ "$CURRENT_STATUS" = '${{ inputs.current-meta-status }}' ]; then
          yq -i ".meta.status = \"${{ inputs.next-meta-status }}\"" "$OKR_FILE"
          META_ROLL_OUTCOME="rolled"
          META_STATUS_AFTER='${{ inputs.next-meta-status }}'
        else
          echo "::notice::Skipping meta.status forward-roll: current='${CURRENT_STATUS}' expected='${{ inputs.current-meta-status }}' (re-run of earlier phase after forward progress — guard preserved)"
        fi
        yq -i ".meta.updatedAt = \"$NOW\"" "$OKR_FILE"

        # ── 3. Append chain-ladder entry. ────────────────────────────
        # Scaffolds an empty chain: [] if missing. Parent thread
        # resolves to the most-recent prior-phase action; fallback to
        # the OKR's master intent thread for WHY (no parent).
        LADDER="okrs/${{ inputs.okr-id }}/audit/chain-ladder.yaml"
        if [ ! -f "$LADDER" ]; then
          printf '%s\n' '# Cross-phase audit chain ladder. Written by finalize-okr-action on PR merge (post-Refactor-3c).' 'chain: []' > "$LADDER"
        else
          # Self-heal the header comment for ledgers scaffolded by an
          # older version of this action (pre-Refactor-3c the header
          # said "Written by okr-bus.yml as each phase merges" — that
          # workflow has been retired). The chain[] data underneath is
          # untouched; only the first line gets rewritten if it still
          # references the retired workflow. Idempotent: subsequent
          # runs match the canonical text and no-op.
          if head -1 "$LADDER" | grep -q "okr-bus.yml"; then
            # Bug II (2026-05) — the earlier self-heal used `sed '1c\`
            # with a multi-line continuation; the continuation lines
            # started at column 1 inside this `run: |` YAML block and
            # broke the GHA action-manifest parser at deploy time
            # ("could not find expected ':'" at line 150 col 72). The
            # whole finalize job was skipped, so okr.yaml.meta.status
            # never rolled forward post-merge. Refactored to single-
            # line `sed 1s|.*|...|` so the YAML block stays valid.
            NEW_HEADER='# Cross-phase audit chain ladder. Written by finalize-okr-action on PR merge (post-Refactor-3c).'
            sed -i.bak "1s|.*|${NEW_HEADER}|" "$LADDER"
            rm -f "${LADDER}.bak"
            echo "::notice::chain-ladder.yaml header upgraded — stale 'Written by okr-bus.yml' reference removed"
          fi
        fi
        OKR_THREAD=$(yq -r '.meta.intentThreadUuid // ""' "$OKR_FILE")
        ACTION_THREAD=$(yq -r ".actions[] | select(.runId == \"$RUN_ID\") | .intentThreadUuid // \"\"" "$OKR_FILE")
        CHAIN_ROOT=$(yq -r ".actions[] | select(.runId == \"$RUN_ID\") | .hatterChainRoot // \"\"" "$OKR_FILE")
        MERGE_SHA='${{ inputs.pr-merge-commit-sha }}'
        PHASE='${{ inputs.phase }}'
        PRIOR_PHASE='${{ inputs.prior-phase }}'
        # Resolve parent_intent_thread: most-recent action with the
        # prior phase's id. Fallback to OKR root thread (used by WHY
        # since prior-phase='').
        if [ -n "$PRIOR_PHASE" ]; then
          PARENT_THREAD=$(yq -r "[.actions[] | select(.phase == \"$PRIOR_PHASE\")] | .[-1].intentThreadUuid // \"$OKR_THREAD\"" "$OKR_FILE")
        else
          PARENT_THREAD="$OKR_THREAD"
        fi
        yq -i \
          "(.chain) += [{\"phase\": \"$PHASE\", \"run_id\": \"$RUN_ID\", \"intent_thread_uuid\": \"$ACTION_THREAD\", \"parent_intent_thread\": \"$PARENT_THREAD\", \"chain_root_hash\": \"$CHAIN_ROOT\", \"merge_commit_sha\": \"$MERGE_SHA\", \"merged_at\": \"$NOW\", \"pr_number\": ${{ inputs.pr-number }}}]" \
          "$LADDER"

        # ── 3.5 Bug Z — durable workflow events with idempotency + verify-before-commit ──
        # PR audit verifies; finalize records. This is the ONLY durable
        # workflow-event writer in the system. Pre-merge audit jobs no
        # longer mutate the chain (they ran on PR head with
        # persist-credentials:false, so their workspace appends were
        # always discarded). Finalize runs on main with write credentials,
        # so durable events must land here.
        #
        # The append-workflow-events.mjs script:
        #   1. Computes artifact_written payload (path, sha, bytes, merge_sha)
        #   2. Idempotency: match → no-op, conflict → hard fail
        #   3. Appends artifact_written via runner (chained, unsigned, re-derivable)
        #   4. Same idempotency + append for state_transition (if meta rolled)
        #   5. Runs audit-verify-chain post-append
        #   6. Non-zero exit on any failure → action aborts before commit
        #
        # Codex polish note (2026-05): workflow-emitted events here are
        # CHAINED (prev_event_hash linkage) and AUDIT-VERIFIED (the
        # verify step at step 5 walks the chain), but NOT SIGNED — the
        # per-epoch ephemeral private key was generated in the agent's
        # session and is out of scope by the time finalize runs on main
        # post-merge. They're in the Bug V workflow-allowlist and are
        # re-derivable from canonical sources (git diff for
        # artifact_written, okr.yaml diff for state_transition), so
        # absence of signature is by-design, not a trust gap.
        #
        # The runner appends to the per-run JSONL, which we git-add below.
        JSONL="okrs/${{ inputs.okr-id }}/audit/events/$RUN_ID.jsonl"
        OKR_ID='${{ inputs.okr-id }}' \
        RUN_ID="$RUN_ID" \
        PHASE="$PHASE" \
        ARTIFACT_PATH='${{ inputs.artifact-path }}' \
        MERGE_SHA="$MERGE_SHA" \
        PR_NUMBER='${{ inputs.pr-number }}' \
        ACTION_THREAD="$ACTION_THREAD" \
        FROM_STATUS='${{ inputs.current-meta-status }}' \
        TO_STATUS='${{ inputs.next-meta-status }}' \
        META_ROLLED="$([ "$META_ROLL_OUTCOME" = "rolled" ] && echo true || echo false)" \
        RAIL_REPORT_PATH='${{ inputs.rail-report-path }}' \
        RAIL_REPORT_PATHS='${{ inputs.rail-report-paths }}' \
          node "$GITHUB_ACTION_PATH/scripts/append-workflow-events.mjs"

        # ── 4. Commit + push with retry. ────────────────────────────
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        # Include $JSONL — the script appended artifact_written + (optionally)
        # state_transition + (optionally) rail_decision events into it before
        # exit 0. Verify-chain already ran in the script; chain is post-append-
        # clean. Also stage the Oracle rail report dir when a phase finalize
        # produced one (no-op for phases that ran no rail — generic recorder).
        RAILS_DIR="okrs/${{ inputs.okr-id }}/audit/rails"
        # Pocket Watch v2 alignment rail writes its durable report under
        # audit/drift/ (a SEPARATE category from the Oracle evidence rails —
        # not a rail_decision). Stage it the same way so finalize commits it
        # with the merge; no-op for phases/runs that produced no drift report.
        DRIFT_DIR="okrs/${{ inputs.okr-id }}/audit/drift"
        git add "$OKR_FILE" "$LADDER" "$JSONL"
        if [ -d "$RAILS_DIR" ]; then git add "$RAILS_DIR"; fi
        if [ -d "$DRIFT_DIR" ]; then git add "$DRIFT_DIR"; fi
        PHASE_UPPER=$(echo "$PHASE" | tr '[:lower:]' '[:upper:]')
        # Cert-run bug B fix (Task #51): commit message + success notice
        # describe the actual meta.status outcome, not the intended one.
        if [ "$META_ROLL_OUTCOME" = "rolled" ]; then
          META_FRAGMENT="meta.status ${{ inputs.current-meta-status }} -> ${{ inputs.next-meta-status }}"
        else
          META_FRAGMENT="meta.status held at ${META_STATUS_AFTER} (forward-roll guarded — expected current='${{ inputs.current-meta-status }}')"
        fi
        git commit -m "chore(okr): ${{ inputs.okr-id }} $PHASE_UPPER complete (action $RUN_ID -> complete; ${META_FRAGMENT}; chain-ladder append; PR #${{ inputs.pr-number }})" || echo "Nothing to commit"
        for i in 1 2 3; do
          if git push; then break; fi
          git fetch origin main && git rebase origin/main
        done
        echo "::notice::Finalized $PHASE_UPPER phase for ${{ inputs.okr-id }} (run=$RUN_ID, chain_root=${CHAIN_ROOT_HASH:0:12}, ${META_FRAGMENT})"

    # The synthesis PR usually merges with NO `Closes #N` (the Copilot agent
    # omits it: PR #235 -> issue #234 stayed open), so GitHub never auto-closes
    # the originating phase issue. Close it deterministically here, on merge,
    # for every phase. Non-fatal: a miss must never fail the finalize.
    - name: Close the originating phase issue on merge
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        PHASE: ${{ inputs.phase }}
        RUN_ID: ${{ inputs.run-id }}
        PR_NUMBER: ${{ inputs.pr-number }}
      run: |
        set -euo pipefail
        # Map phase -> the Looking Glass dispatch label carried by the issue.
        case "$PHASE" in
          why)  LABEL='oraculum-research' ;;
          how)  LABEL='oraculum-prd' ;;
          what) LABEL='oraculum-design' ;;
          *)    echo "::notice::Unknown phase '$PHASE' — skipping issue close."; exit 0 ;;
        esac
        REPO="$GITHUB_REPOSITORY"
        # Join key: the run_id the Looking Glass embeds in the issue body
        # (`<!-- run_id: ... -->`), scoped to this phase's dispatch label. If the
        # agent DID include `Closes #N`, GitHub already closed it and the
        # state:open search below simply finds nothing.
        ISSUES=$(gh issue list --repo "$REPO" \
          --search "\"$RUN_ID\" in:body label:$LABEL state:open" \
          --json number --jq '.[].number' 2>/dev/null || true)
        if [ -z "$ISSUES" ]; then
          echo "::notice::No open $LABEL issue carrying run $RUN_ID — nothing to close."
          exit 0
        fi
        for N in $ISSUES; do
          gh issue close "$N" --repo "$REPO" --reason completed \
            --comment "Finalized on merge of #$PR_NUMBER (run \`$RUN_ID\`)." || true
          echo "Closed issue #$N (run $RUN_ID)."
        done
