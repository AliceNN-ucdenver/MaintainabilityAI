name: "Label on Merge (Research/PRD Bus)"

# Post-merge bus handler. Maps merged PR labels to the next-stage label, which
# triggers the downstream pipeline:
#   research PR merged  -> prd-request issue created (kicks prd.yml)
#   prd      PR merged  -> spec-ready label applied  (kicks notify-code-repos.yml)
#
# Keeping handoff in a separate workflow (not in archeologist.yml / prd.yml) makes
# the bus auditable and decoupled from the agents that produce each artifact.

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  research-merged:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'research')
    runs-on: ubuntu-latest
    steps:
      - name: Create prd-request issue
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const title = pr.title.replace(/^Research:\s*/i, 'PRD: ');
            const body = [
              `Auto-created by label-on-merge bus after research PR #${pr.number} merged.`,
              '',
              `research_pr: ${pr.html_url}`,
              '',
              'Edit the fields below and add the `prd-request` label to trigger the PRD pipeline.',
              '',
              'scope: bar',
              'scope_id: <bar-id>',
              'mode: deep',
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['prd-pending', 'ai-assisted'],
            });
            core.info(`Created PRD-pending issue #${issue.data.number}: ${issue.data.html_url}`);

  prd-merged:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'prd')
    runs-on: ubuntu-latest
    steps:
      - name: Apply spec-ready label
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['spec-ready'],
            });
            core.info(`Applied spec-ready label to PR #${pr.number}; notify-code-repos.yml will pick up next.`);
