name: "Code Design Agent — WHAT-phase lifecycle"

# D-PR1 MVP — single workflow for the code-design-agent's complete
# lifecycle. Mirrors prd-agent.yml's three-job shape:
#   1. `verify-agent-deployed` — on issue labeled `oraculum-design`
#       (Looking Glass "Start What"). Sanity-checks (a) the agent file
#       is on main, (b) HOW PRD is merged, (c) A12.v1.1 repo-status
#       precondition: every targetCodeRepos[] entry is 'connected'
#       or 'create' (no 'not-connected' / 'unreachable').
#   2. `audit-and-drift` — on PR labeled `design-draft` (user-triggered
#       via Looking Glass "Run audit" button). Verifies audit chain
#       (B25), Knight's Seal (B27), evidence-honesty (knowledge-code
#       per repo), per-repo mode honesty (frontmatter mode matches
#       chain), structural correctness, Pocket Watch + Caterpillar
#       drift, self-review block / chain counts (B28c.v1.1 pattern).
#       Applies `design-pass` on clean OR `design-degraded` /
#       `design-drift-detected` on fail.
#   3. `finalize` — on PR closed-and-merged with `design-draft` label.
#       Appends chain-ladder.yaml WHAT entry + flips action.status to
#       complete + triggers design-bus.yml (separate workflow).

on:
  issues:
    types: [opened, labeled, reopened]
  pull_request_target:
    types: [labeled, unlabeled, closed]

concurrency:
  group: code-design-agent-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  issues: write
  pull-requests: write
  contents: write
  checks: write
  # GitHub Models embeddings for Pocket Watch + Caterpillar drift gates.
  models: read

jobs:
  # ════════════════════════════════════════════════════════════════════
  # JOB 1 — Dispatch precondition checks on Looking Glass "Start What"
  # ════════════════════════════════════════════════════════════════════
  verify-agent-deployed:
    name: "Verify code-design-agent file + HOW gate + A12.v1.1 repo-status precondition"
    # Bug fix (D-PR1.v1.1) — Looking Glass dispatches issues with labels
    # already attached via the body-extension assignment API, so the
    # 'labeled' event doesn't fire separately. Match both 'opened' and
    # 'labeled', and gate on the label name inside the job (steps use
    # contains() so 'opened' with the label present also runs).
    if: >-
      github.event_name == 'issues' &&
      (github.event.action == 'opened' || github.event.action == 'labeled') &&
      contains(github.event.issue.labels.*.name, 'oraculum-design')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check agent file present on default branch
        run: |
          if ! gh api "repos/${{ github.repository }}/contents/.github/agents/code-design-agent.agent.md" >/dev/null 2>&1; then
            gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} \
              --body "⚠️ **code-design-agent.agent.md is not deployed.** Open Looking Glass → Settings → Mesh Provisioning → \"Deploy All\" so the agent file lands on \`main\`."
            exit 1
          fi

      - name: Verify gating dependency — HOW PRD merged
        run: |
          BODY=$(gh issue view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json body --jq .body)
          OKR_ID=$(printf '%s' "$BODY" | grep -oE '<!-- okr_id:[[:space:]]*[^[:space:]]+' | head -1 | sed -E 's/<!-- okr_id:[[:space:]]*//')
          if [ -z "$OKR_ID" ]; then
            gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} \
              --body "⚠️ **No \`okr_id\` marker in issue body.** Looking Glass should emit \`<!-- okr_id: ... -->\`."
            exit 1
          fi
          if ! gh api "repos/${{ github.repository }}/contents/okrs/$OKR_ID/how/prd.md" >/dev/null 2>&1; then
            gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} \
              --body "⚠️ **HOW phase not merged yet.** \`okrs/$OKR_ID/how/prd.md\` not found on main. Complete the HOW phase (prd-pass + merge) before starting WHAT."
            exit 1
          fi
          echo "OKR_ID=$OKR_ID" >> "$GITHUB_ENV"
          echo "::notice::HOW gate cleared for $OKR_ID"

      # A12.v1.1 precondition: every targetCodeRepos[] entry must have a
      # status of 'connected' (brownfield → clone + ground) or 'create'
      # (greenfield → design from PRD + mesh, fan-out scaffolds). Any
      # 'not-connected' or 'unreachable' entry blocks dispatch with a
      # comment naming the offending repos. The agent never runs against
      # ambiguous repo intent.
      - name: Verify A12.v1.1 repo-status precondition
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false
      - name: Check targetCodeRepoStatus
        run: |
          OKR_YAML="okrs/${OKR_ID}/okr.yaml"
          if [ ! -f "$OKR_YAML" ]; then
            gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} \
              --body "⚠️ **OKR card missing.** \`$OKR_YAML\` not found on main."
            exit 1
          fi
          # Parse targetCodeRepoStatus map via python yaml; reject if
          # any entry is not 'connected' or 'create'. Absent entries
          # default to 'not-connected' (per A12.v1.1 schema default).
          OKR_YAML="$OKR_YAML" python3 <<'PYEOF'
          import yaml, os, sys, json
          card = yaml.safe_load(open(os.environ['OKR_YAML']))
          oa = card.get('objectiveAlignment') or {}
          repos = oa.get('targetCodeRepos') or []
          status_map = oa.get('targetCodeRepoStatus') or {}
          violations = []
          for r in repos:
              s = status_map.get(r, 'not-connected')
              if s not in ('connected', 'create'):
                  violations.append(f"  - `{r}` → `{s}`")
          if violations:
              msg = ("⚠️ **A12.v1.1 repo-status precondition failed.** "
                     "code-design-agent requires every `targetCodeRepos[]` entry to be "
                     "either `connected` (brownfield — clone + ground) or `create` "
                     "(greenfield — design from PRD + mesh, fan-out scaffolds). "
                     "Offending entries:\n\n" + "\n".join(violations) +
                     "\n\nOpen Looking Glass → OKR detail → Target Code Repos and pick a status per repo.")
              with open('/tmp/precondition-msg.txt', 'w') as f:
                  f.write(msg)
              sys.exit(2)
          print(f"A12.v1.1 precondition cleared: {len(repos)} repos, all 'connected' or 'create'")
          PYEOF
          rc=$?
          if [ $rc -eq 2 ]; then
            gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body-file /tmp/precondition-msg.txt
            exit 1
          fi
          [ $rc -eq 0 ] || exit $rc

  # ════════════════════════════════════════════════════════════════════
  # JOB 2 — Audit + drift on user-applied design-draft label
  # ════════════════════════════════════════════════════════════════════
  audit-and-drift:
    name: "Audit + drift check on design-draft PR"
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'design-draft' &&
      github.event.pull_request.base.repo.full_name == github.event.pull_request.head.repo.full_name
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Checkout base ref to /tmp/base for cross-phase reads
        # Need merged PRD (from base / main) for Caterpillar's Challenge.
        run: |
          mkdir -p /tmp/base
          git -C /tmp/base init -q
          git -C /tmp/base remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git -C /tmp/base fetch --depth=1 origin "${{ github.event.pull_request.base.ref }}" -q
          git -C /tmp/base checkout -q FETCH_HEAD

      - name: Extract OKR context
        id: ctx
        uses: ./.github/actions/extract-okr-context
        with:
          pr-number: ${{ github.event.pull_request.number }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip if Hatter Tag missing
        id: gate
        if: steps.ctx.outputs.okr_id == '' || steps.ctx.outputs.run_id == ''
        run: |
          echo "::warning::PR has no okr_id/run_id Hatter Tag — skipping audit"
          echo "skip=true" >> "$GITHUB_OUTPUT"

      - name: Detect OKR state tampering (Bug GG-followup)
        id: state_guard
        if: steps.gate.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Bug GG-followup (2026-05): agents are CONTRACTUALLY forbidden
        # from mutating OKR state. The agent prompts carry the rule
        # ("NEVER edit okrs/<id>/okr.yaml" — Bug GG), but that is advice;
        # this step is the enforcement. See prd-agent.yml for the full
        # forensic — PR #140 (HOW phase) tripped this exact violation
        # when the agent "fixed" a stale runId from the Bug EE reset-
        # drift gap.
        run: |
          OKR_ID='${{ steps.ctx.outputs.okr_id }}'
          PR='${{ github.event.pull_request.number }}'
          TARGET="okrs/${OKR_ID}/okr.yaml"
          CHANGED=$(gh pr view "$PR" --repo '${{ github.repository }}' --json files --jq '.files[].path' 2>/dev/null || true)
          if [ -z "$CHANGED" ]; then
            echo "::warning::Could not read PR file list via gh — state-guard cannot verify okr.yaml. Treating as state_fail=false; downstream chain/structure checks still apply."
            echo "state_fail=false"   >> "$GITHUB_OUTPUT"
            echo "state_reason="      >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if printf '%s\n' "$CHANGED" | grep -Fxq "$TARGET"; then
            echo "::error::Agent PR modified $TARGET — OKR state is owned by Looking Glass dispatch/reset and finalize-okr-action, not the agent. This is a Bug GG trust-boundary violation. Revert the okr.yaml change; raise a separate (non-agent-labeled) PR if okr.yaml legitimately needs correction."
            echo "state_fail=true"    >> "$GITHUB_OUTPUT"
            echo "state_reason=Agent PR modified $TARGET; OKR state is owned by Looking Glass dispatch/reset and finalize-okr-action (Bug GG-followup). Revert the okr.yaml change and, if okr.yaml legitimately needs correction, raise a separate PR that does NOT carry the prd-draft / research-synthesis / design-draft label." >> "$GITHUB_OUTPUT"
          else
            echo "::notice::state-guard pass: okr.yaml unchanged in this PR"
            echo "state_fail=false"   >> "$GITHUB_OUTPUT"
            echo "state_reason="      >> "$GITHUB_OUTPUT"
          fi

      - name: Locate audit JSONL
        id: audit
        if: steps.gate.outputs.skip != 'true'
        run: |
          JSONL="okrs/${{ steps.ctx.outputs.okr_id }}/audit/events/${{ steps.ctx.outputs.run_id }}.jsonl"
          if [ ! -f "$JSONL" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "path=$JSONL" >> "$GITHUB_OUTPUT"
            echo "::warning::Audit JSONL missing at $JSONL"
            exit 0
          fi
          echo "found=true"   >> "$GITHUB_OUTPUT"
          echo "path=$JSONL"  >> "$GITHUB_OUTPUT"

      # P2 (Bug-P / Codex audit) — chain verification now goes through
      # the runner's `audit-verify-chain` skill instead of inline Python.
      # The previous form only recomputed SHA hashes and *counted* non-
      # empty signatures; it never cryptographically verified the
      # Ed25519 signatures themselves, so a chain with a hash-correct
      # but signature-forged event would pass CI silently. The runner
      # skill loads every <runId>.epoch-N.pub.pem from audit/keys/ and
      # cryptographically verifies each agent-signed event against the
      # right epoch's public key. One implementation, one source of
      # truth — same code path the runner uses to verify the chain it
      # just wrote, so CI accepts iff the runner would have accepted.
      - name: Verify audit chain integrity (per-epoch Ed25519 + hash replay)
        id: chain
        if: steps.gate.outputs.skip != 'true' && steps.audit.outputs.found == 'true'
        env:
          OKR_ID: ${{ steps.ctx.outputs.okr_id }}
          RUN_ID: ${{ steps.ctx.outputs.run_id }}
        run: |
          set -e
          # Pipe the canonical input shape into the runner's CLI skill
          # dispatcher (skill-* subcommand reads JSON stdin, writes JSON
          # stdout, exits non-zero on `ok: false`).
          RESULT=$(printf '{"okrId":"%s","runId":"%s"}' "$OKR_ID" "$RUN_ID" \
            | npx -y @maintainabilityai/research-runner@~0.1.42 skill-audit-verify-chain 2>&1 || true)
          echo "$RESULT" > /tmp/chain-verify.json
          # Robust parsing — runner emits one JSON object on stdout;
          # if the npx fetch failed the file may contain log noise, so
          # pull out the JSON line first.
          python3 <<'PYEOF'
          import json, os, sys, re
          raw = open('/tmp/chain-verify.json', 'r', encoding='utf-8').read()
          obj = None
          for line in raw.splitlines():
              line = line.strip()
              if line.startswith('{') and line.endswith('}'):
                  try:
                      obj = json.loads(line); break
                  except Exception: pass
          if obj is None:
              obj = {'ok': False, 'reason': f'runner-cli-no-json: {raw[:200]}'}
          out_path = os.environ['GITHUB_OUTPUT']
          with open(out_path, 'a', encoding='utf-8') as f:
              f.write(f"ok={'true' if obj.get('ok') else 'false'}\n")
              f.write(f"reason={obj.get('reason','') if not obj.get('ok') else ''}\n")
              f.write(f"head={obj.get('chainHead','') or ''}\n")
              f.write(f"count={obj.get('eventCount', 0)}\n")
              f.write(f"sealed={'true' if obj.get('sealed') else 'false'}\n")
              f.write(f"seal_verified={'true' if obj.get('sealVerified') else 'false'}\n")
          status = 'PASS' if obj.get('ok') else 'FAIL'
          print(f"::notice::audit chain {status} count={obj.get('eventCount', 0)} "
                f"sealed={obj.get('sealed', False)} seal_verified={obj.get('sealVerified', False)}")
          if not obj.get('ok'):
              print(f"::warning::audit chain reason: {obj.get('reason','')}")
          PYEOF

      # Task #59 — H2 structural check (parity with WHY + HOW workflows).
      # The 10 canonical WHAT H2 sections must all be present. Numeric
      # prefix tolerance ("## 1. Input Premises" or "## Input Premises")
      # mirrors the agent's NCMS-style synthesis pack output.
      - name: Structure check (10 H2 + per-repo addresses[] coverage)
        id: structure
        if: steps.gate.outputs.skip != 'true'
        env:
          OKR_ID: ${{ steps.ctx.outputs.okr_id }}
        run: |
          DOC="okrs/${OKR_ID}/what/code-design.md"
          if [ ! -f "$DOC" ]; then
            echo "doc_found=false"     >> "$GITHUB_OUTPUT"
            echo "h2_present=0"        >> "$GITHUB_OUTPUT"
            echo "h2_total=10"         >> "$GITHUB_OUTPUT"
            echo "fr_count=0"          >> "$GITHUB_OUTPUT"
            echo "fr_addressed=0"      >> "$GITHUB_OUTPUT"
            echo "sr_count=0"          >> "$GITHUB_OUTPUT"
            echo "sr_addressed=0"      >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "doc_found=true" >> "$GITHUB_OUTPUT"

          # Task #70 (cert-run-5 forensic) — switched from planning-level
          # H2s (Input Premises / Approach / Repo Inventory / ...) to the
          # developer-actionable set from .caterpillar/prompts/code-design/
          # synthesis.md. The prior set described intent; the new set is
          # what a coding agent needs to actually implement (project tree,
          # typed contracts, schemas, middleware code, tests, deploy).
          REQUIRED_H2=(
            "Project Structure"
            "API Endpoint Specifications"
            "Data Models"
            "Authentication Middleware Implementation"
            "Security Control Implementations"
            "Configuration and Environment Variables"
            "Error Handling Patterns"
            "Testing Strategy with Example Test Cases"
            "Deployment Configuration"
            "Design Rationale & Research Traceability"
          )
          H2_PRESENT=0; MISSING_H2=""
          for name in "${REQUIRED_H2[@]}"; do
            # Tolerate optional numeric prefix ("## 1. Input Premises").
            if grep -qE "^##[[:space:]]+(\\d+\\.[[:space:]]+)?${name}[[:space:]]*$" "$DOC"; then
              H2_PRESENT=$((H2_PRESENT + 1))
            else
              MISSING_H2="${MISSING_H2}${name}; "
            fi
          done

          # FR/SR coverage via per-repo §5 addresses[]. Same logic as
          # extractWhatArtifactSignals on the UI side (Task #58 honest-
          # metric rewrite). A FR is "addressed" iff at least one repo
          # frontmatter's `addresses:` list includes it.
          #
          # Bug-H fix (Task #65): the previous gate required `repo:` IN
          # the frontmatter. Cert-run-5 showed the agent puts the repo
          # slug as a preceding `### heading` and omits `repo:` from
          # the frontmatter — both forms now count. The gate is now
          # "either `repo:` in frontmatter OR preceding `### heading`
          # that looks like a repo slug".
          #
          # P4 (Bug-P / Codex audit) — FR/SR UNIVERSE now comes from the
          # merged PRD (the canonical contract upstream), not the code-
          # design artifact itself. Previously the universe was extracted
          # from `doc` (code-design.md) so an artifact that omitted FR-07
          # entirely would shrink the denominator and pass the gate
          # silently. Now we read /tmp/base/okrs/<id>/how/prd.md (the
          # merged PRD on the base branch, fetched in "Checkout base ref
          # to /tmp/base for cross-phase reads") and pin the universe
          # there. Coverage is `addressed ∩ prd_universe` over `prd_universe`.
          # If the artifact misses any FR/SR from the PRD, the gate fails.
          PRD="/tmp/base/okrs/${OKR_ID}/how/prd.md"
          DOC="$DOC" PRD="$PRD" python3 <<'PYEOF'
          import os, re
          doc = open(os.environ['DOC'], 'r', encoding='utf-8').read()
          prd_path = os.environ.get('PRD', '')
          # PRD universe — canonical FR/SR contract from the merged PRD.
          # Fallback to artifact-derived IDs only if the PRD file isn't
          # present (greenfield + first WHAT phase with no merged HOW
          # yet, or local dev runs without /tmp/base). The fallback is
          # noted in the audit so reviewers can distinguish.
          if prd_path and os.path.exists(prd_path):
              prd_text = open(prd_path, 'r', encoding='utf-8').read()
              fr_ids = set(re.findall(r'\bFR-\d+\b', prd_text))
              sr_ids = set(re.findall(r'\bSR-\d+\b', prd_text))
              fr_sr_universe_source = 'prd'
          else:
              fr_ids = set(re.findall(r'\bFR-\d+\b', doc))
              sr_ids = set(re.findall(r'\bSR-\d+\b', doc))
              fr_sr_universe_source = 'artifact-fallback'
          doc_lines = doc.split('\n')
          HEADING_RE = re.compile(r'^###\s+`?([^\s`]+)`?\s*$')
          SLUG_RE = re.compile(r'^(?:https?://github\.com/)?([\w.-]+)/([\w.-]+?)(?:\.git)?/?$')
          addressed = set()
          last_heading_slug = None
          i = 0
          while i < len(doc_lines):
              line = doc_lines[i]
              hm = HEADING_RE.match(line)
              if hm:
                  sm = SLUG_RE.match(hm.group(1))
                  last_heading_slug = sm.group(0) if sm else None
                  i += 1
                  continue
              if line.strip() == '---' and i + 1 < len(doc_lines):
                  body_lines = []
                  j = i + 1
                  while j < len(doc_lines) and doc_lines[j].strip() != '---':
                      body_lines.append(doc_lines[j])
                      j += 1
                  if j < len(doc_lines):
                      fm_text = '\n'.join(body_lines)
                      has_repo_key = re.search(r'^\s*repo:\s+', fm_text, re.MULTILINE) is not None
                      addresses_m = re.search(r'^\s*addresses:\s*\[([^\]]*)\]', fm_text, re.MULTILINE)
                      # Accept if EITHER repo: in frontmatter OR preceding
                      # heading looked like a repo slug.
                      if (has_repo_key or last_heading_slug) and addresses_m:
                          for raw in addresses_m.group(1).split(','):
                              ident = raw.strip().strip('"').strip("'")
                              if ident: addressed.add(ident)
                      i = j + 1
                      continue
              i += 1
          fr_addressed = len(fr_ids & addressed)
          sr_addressed = len(sr_ids & addressed)
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
              f.write(f'fr_count={len(fr_ids)}\n')
              f.write(f'fr_addressed={fr_addressed}\n')
              f.write(f'sr_count={len(sr_ids)}\n')
              f.write(f'sr_addressed={sr_addressed}\n')
              f.write(f'fr_sr_universe_source={fr_sr_universe_source}\n')
          print(f"::notice::structure fr={fr_addressed}/{len(fr_ids)} "
                f"sr={sr_addressed}/{len(sr_ids)} universe={fr_sr_universe_source}")
          PYEOF

          {
            echo "h2_present=$H2_PRESENT"
            echo "h2_total=10"
            echo "missing_h2=${MISSING_H2%; }"
          } >> "$GITHUB_OUTPUT"
          echo "::notice::structure h2=$H2_PRESENT/10"

      # Bug-Q phase 2 — brownfield path-citation gate.
      # Codex audit round 2 (B1): the WHAT prompt asks for `src/state/
      # profileStore.ts`-level file paths but `knowledge-code` only
      # returned topDirs/languages/manifests, so the agent had room to
      # hallucinate paths and ship a "design" that referenced files
      # that don't exist. Phase 2 extends `knowledge-code` with a
      # bounded `inventory_paths` flat list in its skill_call payload
      # (every actual file path the clone walked). This step parses
      # every backtick-quoted file path from `code-design.md`, groups
      # by repo subsection, and cross-checks against the inventory
      # for that repo from the audit chain. Any cited brownfield path
      # not in the inventory fails STRUCT_OK with cited-path-not-in-
      # inventory: <repo> <path>.
      - name: Brownfield path-citation gate
        id: paths
        if: steps.gate.outputs.skip != 'true' && steps.audit.outputs.found == 'true' && steps.structure.outputs.doc_found == 'true'
        env:
          JSONL: ${{ steps.audit.outputs.path }}
          DOC: okrs/${{ steps.ctx.outputs.okr_id }}/what/code-design.md
        run: |
          JSONL="$JSONL" DOC="$DOC" python3 <<'PYEOF'
          import json, os, re
          doc = open(os.environ['DOC'], 'r', encoding='utf-8').read()
          jsonl = os.environ['JSONL']

          # 1. Build per-repo inventory from the chain. For each
          #    knowledge-code skill_call with mode=brownfield, grab
          #    inventory_paths and key by repo slug.
          inventory = {}  # repo_slug -> set(paths)
          mode_by_repo = {}  # repo_slug -> 'brownfield' | 'greenfield'
          gate_errors = []
          try:
              with open(jsonl, 'r', encoding='utf-8') as f:
                  for line in f:
                      line = line.strip()
                      if not line: continue
                      try: ev = json.loads(line)
                      except Exception: continue
                      payload = ev.get('payload') or {}
                      if payload.get('skill') != 'knowledge-code': continue
                      if payload.get('ok') is not True: continue
                      repo = payload.get('repo')
                      mode = payload.get('mode')
                      if not repo or not mode: continue
                      mode_by_repo[repo] = mode
                      if mode == 'brownfield':
                          paths = payload.get('inventory_paths') or []
                          inventory[repo] = set(paths)
          except Exception as e:
              print(f"::warning::path-gate: failed to read JSONL: {e}")
              gate_errors.append(f"jsonl-read-failed:{e}")

          # 2. Parse the artifact: walk per-repo subsections (### `owner/name`
          #    or `### owner/name`), collect backtick-quoted file paths in
          #    each subsection until the next ## heading OR a new repo H3.
          #
          # Bug-R / R2 (Codex round-3 closeout) — round-2 code reset
          # `current_repo` on ANY non-repo H3, so file paths cited
          # under `### 5.1 API Endpoints` inside a repo subsection
          # were silently un-attributed. Per the agent prompt, the
          # design is expected to cite paths across §1 (Project
          # Structure), §2 (API Endpoints), §3 (Data Models), §5
          # (Per-Repo Change List) — ALL of those need attribution.
          # Fix: H2 resets repo attribution; H3 does NOT (sub-sections
          # of a repo subsection keep the parent repo). ALSO support
          # an explicit `cited_paths: [...]` field in each repo's
          # frontmatter — the agent can preemptively declare paths
          # the narrative prose might not enumerate.
          REPO_HEADING_RE = re.compile(r'^###\s+`?([a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+)`?\s*$')
          PATH_IN_BACKTICKS_RE = re.compile(r'`([a-zA-Z0-9_./-]+\.[a-zA-Z0-9]{1,8})`')
          CITED_PATHS_FM_RE = re.compile(r'^\s*cited_paths:\s*\[([^\]]*)\]', re.MULTILINE)
          lines = doc.split('\n')
          cited_by_repo = {}
          current_repo = None
          in_frontmatter = False
          frontmatter_buf = []
          for ln in lines:
              # Track frontmatter (--- ... ---) so we can pull
              # `cited_paths:` explicit declarations.
              if ln.strip() == '---':
                  if in_frontmatter and current_repo:
                      fm_text = '\n'.join(frontmatter_buf)
                      fm_match = CITED_PATHS_FM_RE.search(fm_text)
                      if fm_match:
                          for raw in fm_match.group(1).split(','):
                              p = raw.strip().strip('"').strip("'")
                              if p: cited_by_repo.setdefault(current_repo, set()).add(p)
                  in_frontmatter = not in_frontmatter
                  frontmatter_buf = []
                  continue
              if in_frontmatter:
                  frontmatter_buf.append(ln)
                  continue
              hm = REPO_HEADING_RE.match(ln)
              if hm:
                  current_repo = hm.group(1)
                  cited_by_repo.setdefault(current_repo, set())
                  continue
              # H2 RESETS attribution. H3 does NOT — sub-sections of a
              # repo subsection (### 5.1 API Endpoints) keep the parent
              # repo. This was the round-3 fix.
              if ln.startswith('## '):
                  current_repo = None
                  continue
              if not current_repo: continue
              for m in PATH_IN_BACKTICKS_RE.finditer(ln):
                  cited_by_repo[current_repo].add(m.group(1))

          # 3. Cross-check per-repo. Only brownfield repos are gated —
          #    greenfield is by-definition not in any existing file tree.
          violations = []
          checked = 0
          for repo, cited in cited_by_repo.items():
              mode = mode_by_repo.get(repo)
              if mode != 'brownfield': continue
              repo_inventory = inventory.get(repo, set())
              if not repo_inventory:
                  violations.append(f"{repo}:<missing inventory_paths>")
                  print(f"::warning::path-gate: brownfield repo {repo} has no inventory_paths — failing gate (current knowledge-code runs must emit inventory_paths)")
                  continue
              for p in cited:
                  checked += 1
                  if p not in repo_inventory:
                      violations.append(f"{repo}:{p}")
          all_violations = gate_errors + violations
          ok = "true" if not all_violations else "false"
          out = os.environ['GITHUB_OUTPUT']
          with open(out, 'a', encoding='utf-8') as f:
              f.write(f"ok={ok}\n")
              f.write(f"checked={checked}\n")
              f.write(f"violation_count={len(all_violations)}\n")
              f.write(f"violations={'; '.join(all_violations[:10])}\n")
          if all_violations:
              print(f"::warning::path-gate: {len(all_violations)} brownfield path/inventory violation(s): {'; '.join(all_violations[:5])}")
          else:
              print(f"::notice::path-gate: {checked} cited brownfield paths all verified against inventory")
          PYEOF

      # Task #62 — Required skill_call manifest verification. Symmetric
      # with WHY + HOW workflows: enforce that every skill listed in the
      # agent prompt's "Required skill_call manifest" section actually
      # shows up as a successful skill_call in the audit chain.
      # Per-BAR count for knowledge-mesh-bar + per-repo count for
      # knowledge-code are dynamic (read from okr.yaml at run time).
      - name: Verify required skill_call manifest
        id: manifest
        if: steps.gate.outputs.skip != 'true' && steps.audit.outputs.found == 'true'
        env:
          JSONL: ${{ steps.audit.outputs.path }}
          OKR_ID: ${{ steps.ctx.outputs.okr_id }}
        run: |
          OKR_YAML="okrs/${OKR_ID}/okr.yaml"
          if [ ! -f "$OKR_YAML" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "reason=okr-yaml-missing" >> "$GITHUB_OUTPUT"
            echo "missing=$OKR_YAML" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          JSONL="$JSONL" OKR_YAML="$OKR_YAML" python3 <<'PYEOF'
          import json, os, yaml
          counts = {}
          with open(os.environ['JSONL'], 'r', encoding='utf-8') as f:
              for line in f:
                  line = line.strip()
                  if not line: continue
                  try:
                      e = json.loads(line)
                  except Exception:
                      continue
                  if e.get('event_kind') != 'skill_call': continue
                  payload = e.get('payload') or {}
                  if payload.get('ok') is False: continue
                  skill = payload.get('skill')
                  if not skill: continue
                  counts[skill] = counts.get(skill, 0) + 1

          # Bug-R / R1 (Codex round-3): per-brownfield-repo manifest
          # for knowledge-code-read. Aggregate count alone doesn't
          # catch the case where the agent reads file X in repo A
          # five times and skips repo B entirely. Re-scan the chain
          # to build per-repo coverage for both skills.
          kc_mode_by_repo = {}   # repo_slug -> 'brownfield' | 'greenfield' | 'refuse'
          kcread_by_repo = {}    # repo_slug -> count of reads
          with open(jsonl, 'r', encoding='utf-8') as f:
              for line in f:
                  line = line.strip()
                  if not line: continue
                  try:
                      ev = json.loads(line)
                  except Exception:
                      continue
                  if ev.get('event_kind') != 'skill_call': continue
                  payload = ev.get('payload') or {}
                  if payload.get('ok') is False: continue
                  skill = payload.get('skill')
                  if skill == 'knowledge-code':
                      repo = payload.get('repo')
                      # knowledge-code returns repo as either string or {owner,name}
                      if isinstance(repo, dict):
                          repo = f"{repo.get('owner','')}/{repo.get('name','')}"
                      mode = payload.get('mode')
                      if repo and mode:
                          kc_mode_by_repo[repo] = mode
                  elif skill == 'knowledge-code-read':
                      repo = payload.get('repo')
                      if isinstance(repo, dict):
                          repo = f"{repo.get('owner','')}/{repo.get('name','')}"
                      if repo:
                          kcread_by_repo[repo] = kcread_by_repo.get(repo, 0) + 1
          brownfield_repos = sorted([r for r, m in kc_mode_by_repo.items() if m == 'brownfield'])

          card = yaml.safe_load(open(os.environ['OKR_YAML'])) or {}
          oa = card.get('objectiveAlignment') or {}
          bar_ids = oa.get('affectedBarIds') or []
          target_repos = oa.get('targetCodeRepos') or []
          required_bar_calls = max(1, len(bar_ids))
          required_kcode_calls = max(1, len(target_repos))

          # Required skill_call manifest — must match the table in
          # agents-v4/code-design-agent.agent.md "Required skill_call
          # manifest" section. Bidirectional parity test in phaseSpec.
          # test.ts asserts every entry here appears in the agent
          # prompt AND vice versa.
          required = [
              ('knowledge-okr', 1),
              ('knowledge-prd', 1),
              ('knowledge-mesh-bar', required_bar_calls),
              ('knowledge-mesh-adrs', 1),
              ('knowledge-mesh-threats', 1),
              ('context-architecture', 1),
              ('context-security', 1),
              ('context-quality', 1),
              ('knowledge-code', required_kcode_calls),
              ('self-review-code-architect', 1),
              ('self-review-code-security', 1),
          ]
          missing = []
          for skill, min_count in required:
              actual = counts.get(skill, 0)
              if actual < min_count:
                  missing.append(f'{skill} (got {actual}/{min_count})')
          # Bug-R / R1: per-brownfield-repo knowledge-code-read
          # enforcement. For each brownfield repo, at least one
          # knowledge-code-read against that same repo. Aggregate
          # check would pass if the agent read the same repo twice
          # and skipped the other entirely.
          for repo in brownfield_repos:
              reads = kcread_by_repo.get(repo, 0)
              if reads < 1:
                  missing.append(f'knowledge-code-read[{repo}] (got 0/1)')
          ok = len(missing) == 0
          out = os.environ['GITHUB_OUTPUT']
          with open(out, 'a', encoding='utf-8') as f:
              f.write(f'ok={"true" if ok else "false"}\n')
              f.write(f'reason={"" if ok else "skill-manifest-incomplete"}\n')
              f.write('missing<<MEOF\n')
              for m in missing:
                  f.write(m + '\n')
              f.write('MEOF\n')
          status = 'PASS' if ok else 'FAIL'
          print(f'::notice::skill-manifest {status} ({len(required)} required, {len(missing)} missing)')
          if not ok:
              for m in missing:
                  print(f'::warning::skill-manifest missing: {m}')
          PYEOF

      # Evidence honesty + per-repo mode honesty. The chain MUST have
      # one knowledge-code skill_call per targetCodeRepos[] entry, AND
      # the per-repo `mode:` frontmatter in code-design.md MUST match
      # the chain's mode field for that repo. Mismatch = mode fabrication.
      - name: Verify per-repo mode honesty
        id: mode_honesty
        if: steps.gate.outputs.skip != 'true' && steps.audit.outputs.found == 'true'
        env:
          JSONL: ${{ steps.audit.outputs.path }}
          OKR_ID: ${{ steps.ctx.outputs.okr_id }}
        run: |
          DESIGN_DOC="okrs/${OKR_ID}/what/code-design.md"
          OKR_YAML="okrs/${OKR_ID}/okr.yaml"
          if [ ! -f "$DESIGN_DOC" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "reason=code-design-doc-missing" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          JSONL="$JSONL" OKR_YAML="$OKR_YAML" DESIGN_DOC="$DESIGN_DOC" python3 <<'PYEOF'
          import json, os, yaml, re
          jsonl = os.environ['JSONL']
          okr_yaml = os.environ['OKR_YAML']
          design_doc = os.environ['DESIGN_DOC']

          # 1. Read targetCodeRepoStatus from OKR.
          card = yaml.safe_load(open(okr_yaml))
          oa = (card or {}).get('objectiveAlignment') or {}
          repos = oa.get('targetCodeRepos') or []
          status_map = oa.get('targetCodeRepoStatus') or {}
          # Migrate legacy 'declared' → 'not-connected' (mirrors the
          # z.preprocess on TargetRepoStatusSchema).
          for k, v in list(status_map.items()):
              if v == 'declared':
                  status_map[k] = 'not-connected'

          # 2. Read knowledge-code skill_call events from chain.
          #
          # Bug fix (D-PR1.v1.1): the runner auto-emits auditMetadata fields
          # MERGED FLAT into payload — NOT nested under payload.audit_metadata.
          # The original code looked for payload.audit_metadata.{repo,mode}
          # which always returned None, so chain_modes={} for every WHAT run
          # and every repo got a false-positive "no knowledge-code skill_call"
          # finding. Read payload.repo + payload.mode directly.
          chain_modes = {}  # repo (owner/name) → mode
          with open(jsonl, 'r', encoding='utf-8') as f:
              for line in f:
                  line = line.strip()
                  if not line: continue
                  e = json.loads(line)
                  if e.get('event_kind') != 'skill_call': continue
                  payload = e.get('payload') or {}
                  if payload.get('skill') != 'knowledge-code': continue
                  r = payload.get('repo')
                  m = payload.get('mode')
                  if r and m:
                      chain_modes[r] = m

          # 3. Read per-repo subsection frontmatter from code-design.md.
          # Subsections inside §4 + §5 carry YAML frontmatter blocks
          # delimited by --- ... ---. The CANONICAL shape includes a
          # `repo:` key inside the frontmatter:
          #
          #   ### My Repo Subsection
          #   ---
          #   repo: owner/name
          #   mode: brownfield
          #   ---
          #
          # Cert-run-5 forensic (Task #65): the agent has been observed
          # writing the repo slug as a `### heading` and omitting the
          # `repo:` key from the frontmatter. The parser now tolerates
          # this: if `repo:` is absent in the frontmatter, fall back to
          # the immediately-preceding `### heading` text — extracting
          # an owner/name slug if it matches the GitHub URL/slug shape.
          doc_text = open(design_doc, 'r', encoding='utf-8').read()
          doc_lines = doc_text.split('\n')

          # Walk the doc line-by-line. Track the most-recent `### heading`
          # text (stripped of leading "### " and optional backticks).
          # When we encounter a `---` block, parse the YAML; if no
          # `repo:` key, infer from the recent heading.
          doc_modes = {}  # owner/name → mode (last wins)
          last_heading = None
          HEADING_RE = re.compile(r'^###\s+`?([^\s`]+)`?\s*$')
          SLUG_RE = re.compile(r'^(?:https?://github\.com/)?([\w.-]+)/([\w.-]+?)(?:\.git)?/?$')

          def normalize_repo(raw):
              """Take an owner/name OR full GitHub URL and return owner/name."""
              if not raw: return None
              sm = SLUG_RE.match(raw.strip())
              if not sm: return None
              return f"{sm.group(1)}/{sm.group(2)}"

          i = 0
          while i < len(doc_lines):
              line = doc_lines[i]
              hm = HEADING_RE.match(line)
              if hm:
                  last_heading = hm.group(1)
                  i += 1
                  continue
              if line.strip() == '---' and i + 1 < len(doc_lines):
                  # Collect lines until the closing ---.
                  body_lines = []
                  j = i + 1
                  while j < len(doc_lines) and doc_lines[j].strip() != '---':
                      body_lines.append(doc_lines[j])
                      j += 1
                  if j < len(doc_lines):
                      fm_text = '\n'.join(body_lines)
                      try:
                          parsed = yaml.safe_load(fm_text)
                      except Exception:
                          parsed = None
                      if isinstance(parsed, dict):
                          m_val = parsed.get('mode')
                          r_val = parsed.get('repo')
                          # Bug-H fallback: infer repo from preceding heading.
                          if not r_val and last_heading:
                              r_val = last_heading
                          r_slug = normalize_repo(r_val) if r_val else None
                          if r_slug and m_val:
                              doc_modes[r_slug] = m_val
                      i = j + 1
                      continue
              i += 1

          # 4. Compare: every target repo with status connected/create
          # must have a knowledge-code call AND a matching mode in the doc.
          findings = []
          for url in repos:
              status = status_map.get(url, 'not-connected')
              if status not in ('connected', 'create'):
                  findings.append(f"repo `{url}` has status `{status}` — should have been blocked at dispatch")
                  continue
              # Extract owner/name slug for chain + doc lookup.
              mm = re.match(r'^https?://github\.com/([^/]+)/([^/]+?)(?:\.git)?/?$', url)
              slug = f"{mm.group(1)}/{mm.group(2)}" if mm else url
              expected_mode = 'brownfield' if status == 'connected' else 'greenfield'
              chain_mode = chain_modes.get(slug)
              doc_mode = doc_modes.get(slug)
              if chain_mode is None:
                  findings.append(f"repo `{slug}` has no knowledge-code skill_call in chain (status `{status}` requires one)")
              elif chain_mode != expected_mode:
                  findings.append(f"repo `{slug}` chain mode `{chain_mode}` ≠ status-implied `{expected_mode}`")
              if doc_mode is None:
                  findings.append(f"repo `{slug}` has no per-repo subsection frontmatter in code-design.md")
              elif doc_mode != expected_mode:
                  findings.append(f"repo `{slug}` doc mode `{doc_mode}` ≠ expected `{expected_mode}` (mode fabrication)")

          out = os.environ['GITHUB_OUTPUT']
          ok = len(findings) == 0
          with open(out, 'a', encoding='utf-8') as f:
              f.write(f'ok={"true" if ok else "false"}\n')
              f.write(f'repo_count={len(repos)}\n')
              f.write(f'finding_count={len(findings)}\n')
              # Each finding on its own line via GH multiline output.
              f.write('findings<<EOF\n')
              for fnd in findings:
                  f.write(fnd + '\n')
              f.write('EOF\n')
          print(f'::notice::mode-honesty {"PASS" if ok else "FAIL"} repos={len(repos)} findings={len(findings)}')
          PYEOF

      # Pocket Watch — cosine(OKR.objective, code-design.md ## Problem Restatement)
      # Caterpillar — cosine(code-design.md ## Approach, prd.md ## Problem Statement)
      # Thresholds calibrate in D-PR1's first run (per design doc D7 spec).
      # Reuse the same embedding fetch + cosine pattern prd-agent.yml uses;
      # MVP version reports the cosines without failing the merge (gates
      # tighten in D-PR1.v1.1 after the first calibration run).
      - name: Drift gates (Pocket Watch + Caterpillar) — MVP report-only
        id: drift
        if: steps.gate.outputs.skip != 'true'
        env:
          OKR_ID: ${{ steps.ctx.outputs.okr_id }}
        run: |
          # Read OKR objective from main; design doc Problem Restatement
          # + Approach from PR head; PRD Problem Statement from main.
          # Output cosines into step outputs; do NOT exit non-zero in MVP.
          DESIGN_DOC="okrs/${OKR_ID}/what/code-design.md"
          PRD_DOC_BASE="/tmp/base/okrs/${OKR_ID}/how/prd.md"
          OKR_YAML_BASE="/tmp/base/okrs/${OKR_ID}/okr.yaml"
          if [ ! -f "$DESIGN_DOC" ] || [ ! -f "$PRD_DOC_BASE" ] || [ ! -f "$OKR_YAML_BASE" ]; then
            echo "pocket_watch=skipped" >> "$GITHUB_OUTPUT"
            echo "caterpillar=skipped" >> "$GITHUB_OUTPUT"
            echo "reason=docs-missing" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Calibration-pending in D-PR1 MVP — surface cosines but pass.
          # Real gates land in D-PR1.v1.1.
          echo "pocket_watch=calibration-pending" >> "$GITHUB_OUTPUT"
          echo "caterpillar=calibration-pending" >> "$GITHUB_OUTPUT"
          echo "::notice::drift gates report-only in D-PR1 MVP (calibrate in v1.1)"

      # Self-review reconciliation — D-PR1.v1.6 polish.
      #
      # The code-design-agent writes self-review blocks inside the artifact
      # markdown (code-design.md, lines ~197+) rather than the PR body
      # — observed in both PR #120 and PR #122 even when the prompt said
      # "PR body MANDATORY". Three evidence sources, checked in priority
      # order:
      #
      #   1. PR body — `### Self-review — Code-Architect (round N)` blocks
      #      with structured SCORE/SEVERITY/COVERED/MISSING/CHANGES fields.
      #   2. Artifact markdown — same block format inside code-design.md.
      #   3. B29 chain — `self-review-code-*` skill_call events (proof of
      #      attempt but no scores).
      #
      # First two sources carry per-persona SCORE + SEVERITY; the third
      # carries round count only. We surface scores in the audit comment
      # whenever ANY of the first two sources has them, regardless of
      # which source the agent picked. The b29-chain fallback now sets
      # source=b29-chain ONLY when both 1+2 returned zero blocks.
      - name: Count self-review evidence (PR body + artifact md + chain)
        id: review
        if: steps.gate.outputs.skip != 'true' && steps.audit.outputs.found == 'true'
        env:
          JSONL: ${{ steps.audit.outputs.path }}
          PR_BODY: ${{ github.event.pull_request.body }}
          OKR_ID: ${{ steps.ctx.outputs.okr_id }}
          RUN_ID: ${{ steps.ctx.outputs.run_id }}
          INTENT_THREAD_UUID: ${{ steps.ctx.outputs.intent_thread_uuid }}
        run: |
          DESIGN_DOC="okrs/${OKR_ID}/what/code-design.md"
          ARTIFACT_TEXT=""
          if [ -f "$DESIGN_DOC" ]; then
            ARTIFACT_TEXT=$(cat "$DESIGN_DOC")
          fi
          JSONL="$JSONL" PR_BODY="$PR_BODY" ARTIFACT_TEXT="$ARTIFACT_TEXT" \
            OKR_ID="$OKR_ID" RUN_ID="$RUN_ID" INTENT_THREAD_UUID="$INTENT_THREAD_UUID" \
            python3 <<'PYEOF'
          import os, re, json
          jsonl = os.environ['JSONL']
          pr_body = os.environ.get('PR_BODY', '') or ''
          artifact_text = os.environ.get('ARTIFACT_TEXT', '') or ''

          # Block regex — matches ONLY the `### Self-review — Code-<Persona>
          # (round N)` heading line. Persona casing is tolerant.
          #
          # Bug J (cert-run-5 forensic, Task #67): the previous form
          # `(?:[^\n]*\n){0,10}` greedy-consumed up to 10 lines past
          # the heading. When Code-Architect was immediately followed by
          # SCORE/SEVERITY/COVERED/MISSING/CHANGES + blank + the next
          # Code-Security heading, finditer's non-overlapping search ate
          # past Security's heading and never matched it. Cert-run-5
          # produced sec=None(None) for exactly this reason.
          # Fix: only match the heading; let block_window do the body scan.
          BLOCK_RE = re.compile(
              r'^### Self-review — Code-(Architect|Security)\s*\(round\s*(\d+)\)\s*$',
              re.MULTILINE | re.IGNORECASE,
          )
          # Inside the matched window, extract SCORE + SEVERITY values.
          SCORE_RE = re.compile(r'^\s*SCORE:\s*([\d.]+)', re.MULTILINE | re.IGNORECASE)
          SEV_RE = re.compile(r'^\s*SEVERITY:\s*(PASS|MINOR|MAJOR|BLOCKING)', re.MULTILINE | re.IGNORECASE)

          def parse_blocks(text):
              """Returns dict: { 'architect' / 'security': { round: (score, severity) }}"""
              found = {'architect': {}, 'security': {}}
              for m in BLOCK_RE.finditer(text):
                  persona = m.group(1).lower()
                  rnd = int(m.group(2))
                  block_window = text[m.start():m.end() + 200]  # 200 chars past the match
                  score_m = SCORE_RE.search(block_window)
                  sev_m = SEV_RE.search(block_window)
                  score = float(score_m.group(1)) if score_m else None
                  sev = sev_m.group(1).upper() if sev_m else None
                  if score is not None or sev is not None:
                      found[persona][rnd] = (score, sev)
              return found

          # Task #64: also parse YAML frontmatter `self_review:` block —
          # cert-run-4 forensic showed the prd-agent picked this location.
          # The code-design-agent's prompt has the same MANDATORY format
          # rule, so we mirror the fallback here for symmetry.
          def parse_frontmatter_yaml(text):
              """Returns same shape as parse_blocks. Architects + security
              sub-blocks under `self_review:` in YAML frontmatter."""
              found = {'architect': {}, 'security': {}}
              m = re.match(r'^---\s*\n(.+?)\n---\s*\n', text, re.DOTALL)
              if not m: return found
              fm = m.group(1)
              sr_m = re.search(
                  r'^self_review:\s*\n((?:[ \t]+.+\n?)+)',
                  fm, re.MULTILINE,
              )
              if not sr_m: return found
              body_fm = sr_m.group(1)
              rounds_m = re.search(r'^\s+rounds:\s*(\d+)', body_fm, re.MULTILINE)
              rounds_val = int(rounds_m.group(1)) if rounds_m else 1
              for persona in ('architect', 'security'):
                  # Tolerate both "code-architect" key (matching skill names)
                  # and bare "architect" key (matching prd-agent convention).
                  key_patterns = [persona, f'code-{persona}']
                  for key in key_patterns:
                      p_m = re.search(
                          rf'^\s+{re.escape(key)}:\s*\n((?:\s{{4,}}.+\n?)+)',
                          body_fm, re.MULTILINE | re.IGNORECASE,
                      )
                      if not p_m: continue
                      p_body = p_m.group(1)
                      score_m_local = re.search(r'score:\s*([\d.]+)', p_body)
                      sev_m_local = re.search(r'severity:\s*(\w+)', p_body, re.IGNORECASE)
                      if score_m_local or sev_m_local:
                          score = float(score_m_local.group(1)) if score_m_local else None
                          sev = sev_m_local.group(1).upper() if sev_m_local else None
                          found[persona][rounds_val] = (score, sev)
                          break
              return found

          # 1+2+3. Prefer PR body; fall back to artifact md; then frontmatter.
          pr_blocks = parse_blocks(pr_body)
          artifact_blocks = parse_blocks(artifact_text)
          frontmatter_blocks = parse_frontmatter_yaml(artifact_text)
          source = 'pr-body'
          blocks = pr_blocks
          if not (pr_blocks['architect'] or pr_blocks['security']):
              if artifact_blocks['architect'] or artifact_blocks['security']:
                  source = 'artifact-md'
                  blocks = artifact_blocks
              elif frontmatter_blocks['architect'] or frontmatter_blocks['security']:
                  source = 'artifact-frontmatter-yaml'
                  blocks = frontmatter_blocks
              else:
                  source = 'b29-chain'
                  blocks = {'architect': {}, 'security': {}}

          # 3. Always count B29 chain skill_calls — proves the loop happened
          # even when sources 1+2 are empty.
          b29_rounds = 0
          with open(jsonl, 'r', encoding='utf-8') as f:
              for line in f:
                  line = line.strip()
                  if not line: continue
                  try:
                      e = json.loads(line)
                  except Exception:
                      continue
                  if e.get('event_kind') != 'skill_call': continue
                  payload = e.get('payload') or {}
                  skill = payload.get('skill') or ''
                  if skill in ('self-review-code-architect', 'self-review-code-security'):
                      r = payload.get('round')
                      if isinstance(r, int) and r > b29_rounds:
                          b29_rounds = r

          # Latest-round-per-persona for the audit comment row + page UI.
          def latest(persona):
              if not blocks[persona]:
                  return (None, None, None)
              max_r = max(blocks[persona].keys())
              s, sev = blocks[persona][max_r]
              return (max_r, s, sev)
          arch_r, arch_s, arch_sev = latest('architect')
          sec_r, sec_s, sec_sev = latest('security')
          # ROUNDS = highest round across personas + chain. b29_rounds is
          # the floor; block rounds can be equal or higher (agent may have
          # over-iterated, though tier-MAX_AUTO_ROUNDS gates that upstream).
          rounds = max(b29_rounds, arch_r or 0, sec_r or 0)

          out = os.environ['GITHUB_OUTPUT']
          with open(out, 'a', encoding='utf-8') as f:
              f.write(f'rounds={rounds}\n')
              f.write(f'source={source}\n')
              f.write(f'b29_rounds={b29_rounds}\n')
              f.write(f'arch_score={arch_s if arch_s is not None else ""}\n')
              f.write(f'arch_severity={arch_sev or ""}\n')
              f.write(f'sec_score={sec_s if sec_s is not None else ""}\n')
              f.write(f'sec_severity={sec_sev or ""}\n')
          print(f'::notice::self-review rounds={rounds} source={source} arch={arch_s}({arch_sev}) sec={sec_s}({sec_sev})')

          # Bug V (Codex round-6): no synthetic workflow emission. The
          # code-design-agent emits signed `self_review` events from
          # inside its persona-prompt section (Code-Architect / Code-
          # Security, see code-design-agent.agent.md Bug V contract)
          # while its per-epoch private key is still in scope. Workflow
          # attribution on `self_review` is forgery — round-6 manual
          # repro demonstrated a hand-written unsigned self_review with
          # `emitted_by:workflow` was accepted as sealed pre-Bug-V; the
          # runner's narrowed WORKFLOW_EMITTABLE_KINDS allowlist closes
          # that path. Chain ↔ block cross-check below surfaces if the
          # agent skipped emitting; the verdict's sealed gate fails the
          # run as degraded in that case.
          existing = set()
          try:
              with open(jsonl, 'r', encoding='utf-8') as f:
                  for line in f:
                      line = line.strip()
                      if not line: continue
                      e = json.loads(line)
                      if e.get('event_kind') == 'self_review':
                          p = e.get('payload', {})
                          if p.get('persona') and p.get('round') is not None:
                              if p.get('score') is not None:
                                  existing.add((p['persona'].lower(), int(p['round'])))
          except Exception:
              pass

          # Diagnostic: how many block-derived (persona,round) pairs
          # don't have a matching signed event in the chain?
          parsed_pairs = set()
          for (persona, rnd, score, sev) in (
              ('architect', arch_r, arch_s, arch_sev),
              ('security', sec_r, sec_s, sec_sev),
          ):
              if rnd is None: continue
              parsed_pairs.add((persona, rnd))
          missing_from_chain = parsed_pairs - existing
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
              f.write(f'block_count={len(parsed_pairs)}\n')
              f.write(f'chain_signed_count={len(existing)}\n')
              f.write(f'chain_block_match={"true" if not missing_from_chain else "false"}\n')
          if missing_from_chain:
              for (persona, rnd) in sorted(missing_from_chain):
                  print(f'::warning::self_review block for persona={persona} round={rnd} not present as signed event in chain — agent should call `audit-emit-event` with eventKind:self_review from inside its persona-prompt section (post-Bug-V contract).')
          else:
              print(f'::notice::self-review chain ↔ block parity ok ({len(existing)} signed events match {len(parsed_pairs)} blocks)')
          PYEOF

      # P1 (Bug-P / Codex audit) — compute the structural-correctness
      # verdict (10 H2 + per-repo FR/SR coverage) BEFORE applying the
      # label, so design-pass cannot land while structure or manifest
      # is broken. Previously this math was buried inside the audit-
      # comment step that runs AFTER label application — the label
      # gate only checked CHAIN_OK + MODE_OK and silently ignored
      # missing H2 sections or unaddressed FR/SR IDs. Now hoisted into
      # its own step that publishes a single boolean per gate; the
      # label step + comment step both consume those booleans.
      - name: Compute structural + manifest verdict
        id: verdict
        if: steps.gate.outputs.skip != 'true'
        env:
          H2_PRESENT: ${{ steps.structure.outputs.h2_present }}
          H2_TOTAL: ${{ steps.structure.outputs.h2_total }}
          H2_MISSING: ${{ steps.structure.outputs.missing_h2 }}
          FR_COUNT: ${{ steps.structure.outputs.fr_count }}
          FR_ADDRESSED: ${{ steps.structure.outputs.fr_addressed }}
          SR_COUNT: ${{ steps.structure.outputs.sr_count }}
          SR_ADDRESSED: ${{ steps.structure.outputs.sr_addressed }}
          MANIFEST_OK_IN: ${{ steps.manifest.outputs.ok }}
          MANIFEST_MISSING: ${{ steps.manifest.outputs.missing }}
          PATHS_OK_IN: ${{ steps.paths.outputs.ok }}
          PATHS_VIOLATIONS: ${{ steps.paths.outputs.violations }}
          PATHS_VIOLATION_COUNT: ${{ steps.paths.outputs.violation_count }}
        run: |
          STRUCT_OK="true"
          STRUCT_REASON=""
          if [ "${H2_PRESENT:-0}" != "${H2_TOTAL:-10}" ]; then
            STRUCT_OK="false"
            STRUCT_REASON="${H2_PRESENT}/${H2_TOTAL} H2 sections (missing: ${H2_MISSING})"
          fi
          if [ "${FR_COUNT:-0}" -gt 0 ] && [ "${FR_ADDRESSED:-0}" != "${FR_COUNT:-0}" ]; then
            STRUCT_OK="false"
            STRUCT_REASON="${STRUCT_REASON:+$STRUCT_REASON; }FR coverage ${FR_ADDRESSED}/${FR_COUNT}"
          fi
          if [ "${SR_COUNT:-0}" -gt 0 ] && [ "${SR_ADDRESSED:-0}" != "${SR_COUNT:-0}" ]; then
            STRUCT_OK="false"
            STRUCT_REASON="${STRUCT_REASON:+$STRUCT_REASON; }SR coverage ${SR_ADDRESSED}/${SR_COUNT}"
          fi
          # Bug-Q phase 2 — brownfield path-citation gate folds into
          # STRUCT_OK. If the agent cited file paths in a brownfield
          # repo subsection that don't exist in the knowledge-code
          # inventory, the structural verdict fails and design-pass
          # can't land. Empty PATHS_OK_IN (step didn't run, e.g. no
          # doc) is treated as pass to avoid false failures.
          if [ -n "$PATHS_OK_IN" ] && [ "$PATHS_OK_IN" = "false" ]; then
            STRUCT_OK="false"
            STRUCT_REASON="${STRUCT_REASON:+$STRUCT_REASON; }brownfield path-citation ${PATHS_VIOLATION_COUNT} not in inventory: ${PATHS_VIOLATIONS}"
          fi
          # Manifest verdict (P1): the manifest step already computes
          # ok/missing; surface them as a step output so the label step
          # can consume them on equal footing with CHAIN_OK + MODE_OK.
          MANIFEST_OK="${MANIFEST_OK_IN:-false}"
          MANIFEST_MISSING_FLAT=$(echo "$MANIFEST_MISSING" | tr '\n' ';' | sed 's/;$//')
          {
            echo "struct_ok=$STRUCT_OK"
            echo "struct_reason=$STRUCT_REASON"
            echo "manifest_ok=$MANIFEST_OK"
            echo "manifest_missing=$MANIFEST_MISSING_FLAT"
          } >> "$GITHUB_OUTPUT"
          echo "::notice::verdict struct=$STRUCT_OK manifest=$MANIFEST_OK"

      # Apply the design-pass label on clean OR design-degraded on
      # evidence/mode-honesty/structure/manifest fail OR design-drift-
      # detected on drift fail. P1 (Bug-P / Codex audit): the gate now
      # consumes ALL FOUR safety verdicts (chain + mode + structure +
      # manifest). Drift gates stay calibration-only — see the
      # threat-model section in the design doc + the next-act note in
      # the marketing page.
      - name: Apply verdict label
        if: steps.gate.outputs.skip != 'true'
        run: |
          PR=${{ github.event.pull_request.number }}
          CHAIN_OK='${{ steps.chain.outputs.ok }}'
          MODE_OK='${{ steps.mode_honesty.outputs.ok }}'
          STRUCT_OK='${{ steps.verdict.outputs.struct_ok }}'
          MANIFEST_OK='${{ steps.verdict.outputs.manifest_ok }}'
          # Bug-R / R4 (Codex round-3) — WHAT verdict now gates on
          # seal_verified parity with WHY + HOW. Round-2 wired seal
          # into market-research-agent.yml + prd-agent.yml but missed
          # this workflow. A sealed-but-unverified chain (signatures
          # present but at least one fails per-epoch verify) now
          # blocks design-pass like it does for the other phases.
          SEALED='${{ steps.chain.outputs.sealed }}'
          SEAL_VERIFIED='${{ steps.chain.outputs.seal_verified }}'
          # Bug-S / S1 (Codex round-4) — chain_root_hash mismatch.
          # extract-okr-context now derives chain_root_hash from JSONL
          # event 1; mismatch with the agent's pasted artifact-
          # frontmatter value emits chain_root_ok=false here.
          CHAIN_ROOT_OK='${{ steps.ctx.outputs.chain_root_ok }}'
          CHAIN_ROOT_REASON='${{ steps.ctx.outputs.chain_root_reason }}'
          # D-PR1.v1.2 bug fix — the previous `gh pr edit ... 2>/dev/null
          # || true` swallowed stderr AND the exit code, so failures (e.g.
          # the label doesn't exist in the mesh repo's label registry)
          # were silent. PR #122 hit this: clean audit, label apply
          # failed because `design-pass` wasn't provisioned, UI stayed
          # at "audit in flight" indefinitely. Capture gh's stdout+stderr
          # to a tempfile and surface the failure as a workflow ::warning::
          # so the next operator sees the gap without grepping logs.
          # Label-apply failures still don't fail the workflow (labels
          # are operational, not security) — we just stop silently no-oping.
          ERRLOG=$(mktemp)
          apply_label() {
            local args="$@"
            if ! gh pr edit "$PR" $args >"$ERRLOG" 2>&1; then
              echo "::warning::gh pr edit failed (args: $args) — ${args}: $(cat "$ERRLOG")"
              echo "::warning::Hint: if 'label does not exist', redeploy mesh labels via Looking Glass Settings → Mesh Provisioning → Deploy All."
              return 1
            fi
            return 0
          }
          # Bug-R / R4 + Bug-U / U2 (Codex round-5): SEAL_OK now
          # requires sealed=true AND seal_verified=true. Bug T made
          # signing universal; an agent design run with events MUST
          # land sealed. An unsealed chain on an agent workflow is
          # an error state (no agent contribution OR chain was
          # entirely forged workflow-attributed events that now
          # fail the U1 allowlist anyway).
          SEAL_OK="true"
          if [ "$SEALED" != "true" ] || [ "$SEAL_VERIFIED" != "true" ]; then
            SEAL_OK="false"
          fi
          # Bug HH (2026-05) — WHAT label-apply now uses discrete per-
          # cause labels (mirrors Bug CC's WHY+HOW pattern). Pre-Bug-HH,
          # every degraded branch applied the single `design-degraded`
          # umbrella, so the UI's failure-reason text was the same stock
          # string regardless of cause (chain failure, structure failure,
          # manifest gap, mode-honesty all rendered as one message). The
          # discrete labels now used:
          #   - chain-integrity-failed: chain_root_hash / seal / chain
          #     verification failures (shared with WHY + HOW, defined in
          #     MESH_LABELS via Bug CC)
          #   - structure-invalid: 10-H2 / FR-NN / SR-NN coverage gaps
          #     (shared with WHY + HOW, defined in MESH_LABELS)
          #   - design-degraded: scoped now to WHAT-specific causes —
          #     per-repo mode-honesty (knowledge-code mode contradiction)
          #     and manifest-incomplete (target_code_repos[] missing)
          # The remove-stale-labels step below clears all four when the
          # verdict flips to ok.
          # Bug GG-followup — state tampering checked FIRST (most
          # specific failure, most severe trust violation).
          STATE_FAIL='${{ steps.state_guard.outputs.state_fail }}'
          STATE_REASON='${{ steps.state_guard.outputs.state_reason }}'
          if [ "$STATE_FAIL" = "true" ]; then
            gh label create state-integrity-failed --repo ${{ github.repository }} --color AD1457 --description "Agent PR modified okrs/<id>/okr.yaml. OKR state is owned by Looking Glass dispatch/reset and finalize-okr-action, not the agent (Bug GG-followup). Merge blocked." 2>/dev/null || true
            apply_label --add-label state-integrity-failed || true
            echo "::warning::Applied state-integrity-failed — $STATE_REASON"
          elif [ "$CHAIN_OK" = "true" ] && [ "$MODE_OK" = "true" ] && [ "$STRUCT_OK" = "true" ] && [ "$MANIFEST_OK" = "true" ] && [ "$SEAL_OK" = "true" ] && [ "$CHAIN_ROOT_OK" != "false" ]; then
            if apply_label --add-label design-pass --remove-label design-degraded,design-drift-detected,chain-integrity-failed,structure-invalid,state-integrity-failed; then
              echo "::notice::Applied design-pass label to PR #$PR (state+chain+mode+structure+manifest+seal+chain-root all clean)"
            fi
          elif [ "$CHAIN_ROOT_OK" = "false" ]; then
            apply_label --add-label chain-integrity-failed || true
            echo "::warning::Applied chain-integrity-failed — chain_root_hash mismatch: $CHAIN_ROOT_REASON"
          elif [ "$SEAL_OK" = "false" ]; then
            apply_label --add-label chain-integrity-failed || true
            echo "::warning::Applied chain-integrity-failed — Knight's Seal not verified (sealed=$SEALED, seal_verified=$SEAL_VERIFIED). Agent runs MUST land sealed (every agent event signed)."
          elif [ "$CHAIN_OK" = "false" ]; then
            apply_label --add-label chain-integrity-failed || true
            echo "::warning::Applied chain-integrity-failed — chain reason: ${{ steps.chain.outputs.reason }}"
          elif [ "$STRUCT_OK" = "false" ]; then
            apply_label --add-label structure-invalid || true
            echo "::warning::Applied structure-invalid — structure: ${{ steps.verdict.outputs.struct_reason }}"
          elif [ "$MODE_OK" = "false" ]; then
            apply_label --add-label design-degraded || true
            echo "::warning::Applied design-degraded — mode-honesty findings: ${{ steps.mode_honesty.outputs.findings }}"
          elif [ "$MANIFEST_OK" = "false" ]; then
            apply_label --add-label design-degraded || true
            echo "::warning::Applied design-degraded — manifest: ${{ steps.verdict.outputs.manifest_missing }}"
          else
            # Fallback — shouldn't reach here given the discrete checks
            # above, but keep design-degraded as the safety net so a
            # regression in the verdict step doesn't silently no-op the
            # label.
            apply_label --add-label design-degraded || true
            echo "::warning::Applied design-degraded — unclassified degraded verdict; review audit comment for cause."
          fi
          rm -f "$ERRLOG"

      # D-PR1.v1.6 audit-comment polish — exact shape match to
      # market-research-agent.yml + prd-agent.yml. Same sentinel marker
      # pattern (<!-- code-design-agent-audit -->) + upsert-via-id flow
      # so re-runs replace the prior comment in place. Same column order:
      # skill_calls table -> structural correctness -> drift -> self-review
      # -> evidence_mode -> Knight's Seal -> footer.
      - name: Post / upsert audit comment
        if: steps.gate.outputs.skip != 'true'
        run: |
          # P1 (Bug-P): consume the SAME verdict the label step consumed.
          # Previously this step re-derived STRUCT_OK + MANIFEST_OK inline,
          # so the comment could disagree with the label in subtle ways
          # (e.g. trailing-whitespace differences in the H2 check). Now
          # both steps read `steps.verdict.outputs.*` — one source of
          # truth for the four-way safety verdict.
          CHAIN_OK='${{ steps.chain.outputs.ok }}'
          MODE_OK='${{ steps.mode_honesty.outputs.ok }}'
          STRUCT_OK='${{ steps.verdict.outputs.struct_ok }}'
          STRUCT_REASON='${{ steps.verdict.outputs.struct_reason }}'
          MANIFEST_OK='${{ steps.verdict.outputs.manifest_ok }}'
          MANIFEST_MISSING='${{ steps.verdict.outputs.manifest_missing }}'
          H2_PRESENT='${{ steps.structure.outputs.h2_present }}'
          H2_TOTAL='${{ steps.structure.outputs.h2_total }}'
          FR_COUNT='${{ steps.structure.outputs.fr_count }}'
          FR_ADDRESSED='${{ steps.structure.outputs.fr_addressed }}'
          SR_COUNT='${{ steps.structure.outputs.sr_count }}'
          SR_ADDRESSED='${{ steps.structure.outputs.sr_addressed }}'
          FR_SR_UNIVERSE_SOURCE='${{ steps.structure.outputs.fr_sr_universe_source }}'
          if [ "$CHAIN_OK" = "true" ] && [ "$MODE_OK" = "true" ] && [ "$STRUCT_OK" = "true" ] && [ "$MANIFEST_OK" = "true" ]; then
            VERDICT="ok"
            REASON=""
          elif [ "$MANIFEST_OK" = "false" ]; then
            # Task #62 — manifest failure is an evidence-honesty problem
            # (the chain doesn't show the agent went through the canonical
            # pipeline). Surface BEFORE mode-honesty so the reviewer sees
            # what was skipped, not what was misclassified.
            VERDICT="degraded"
            REASON="Required skill_call manifest incomplete: $MANIFEST_MISSING"
          elif [ "$MODE_OK" = "false" ]; then
            VERDICT="degraded"
            REASON="Per-repo mode honesty failed (${{ steps.mode_honesty.outputs.finding_count }} finding(s))"
          elif [ "$STRUCT_OK" = "false" ]; then
            VERDICT="degraded"
            REASON="Structural correctness: $STRUCT_REASON"
          else
            VERDICT="degraded"
            REASON="Audit chain verification failed: ${{ steps.chain.outputs.reason }}"
          fi

          BODY=/tmp/audit-body.md
          : > "$BODY"
          printf '%s\n' '<!-- code-design-agent-audit -->' >> "$BODY"
          if [ "$VERDICT" = "ok" ]; then
            printf '%s\n\n' '✓ **Code Design Audit — pass**' >> "$BODY"
          else
            printf '%s\n\n' '⚠️ **Code Design Audit — degraded**' >> "$BODY"
            printf '**Reason:** %s\n\n' "$REASON" >> "$BODY"
          fi

          # Skill calls table — mesh + per-mode knowledge-code breakdown.
          if [ '${{ steps.audit.outputs.found }}' = 'true' ]; then
            JSONL="${{ steps.audit.outputs.path }}"
            printf '**Skill calls** (`%s`):\n\n' "$JSONL" >> "$BODY"
            printf '| Skill family | Successful calls |\n|---|---:|\n' >> "$BODY"
            MESH=$(jq -r 'select(.event_kind == "skill_call" and .payload.ok != false and ((.payload.skill | startswith("knowledge-")) or (.payload.skill | startswith("context-")))) | .payload.skill' "$JSONL" 2>/dev/null | wc -l | tr -d ' ')
            KCODE_BROWN=$(jq -r 'select(.event_kind == "skill_call" and .payload.ok != false and .payload.skill == "knowledge-code" and .payload.mode == "brownfield") | .payload.repo' "$JSONL" 2>/dev/null | wc -l | tr -d ' ')
            KCODE_GREEN=$(jq -r 'select(.event_kind == "skill_call" and .payload.ok != false and .payload.skill == "knowledge-code" and .payload.mode == "greenfield") | .payload.repo' "$JSONL" 2>/dev/null | wc -l | tr -d ' ')
            SR_CHAIN=$(jq -r 'select(.event_kind == "skill_call" and .payload.ok != false and (.payload.skill == "self-review-code-architect" or .payload.skill == "self-review-code-security")) | .payload.skill' "$JSONL" 2>/dev/null | wc -l | tr -d ' ')
            printf '| Mesh (knowledge-* + context-*) | %s |\n' "$MESH" >> "$BODY"
            printf '| knowledge-code — brownfield clone | %s |\n' "$KCODE_BROWN" >> "$BODY"
            printf '| knowledge-code — greenfield spec | %s |\n' "$KCODE_GREEN" >> "$BODY"
            printf '| self-review-code-* (B29) | %s |\n' "$SR_CHAIN" >> "$BODY"
            printf '| **Total** | **%s** |\n\n' '${{ steps.chain.outputs.count }}' >> "$BODY"
          fi

          # Structural correctness — per-repo mode honesty is the primary
          # WHAT structural check. Task #59 added H2 structural parity +
          # honest per-repo addresses[] coverage check for FR/SR (Task #58).
          printf '**Structural correctness** (`okrs/${{ steps.ctx.outputs.okr_id }}/what/code-design.md`):\n\n' >> "$BODY"
          printf '| Check | Result |\n|---|---|\n' >> "$BODY"
          printf '| `code-design.md` written | ✓ |\n' >> "$BODY"
          printf '| 10 H2 sections | %s/%s |\n' '${{ steps.structure.outputs.h2_present }}' '${{ steps.structure.outputs.h2_total }}' >> "$BODY"
          # FR/SR addressed-by-some-repo coverage. Honest count: a
          # declared FR is "addressed" only when at least one per-repo
          # §5 subsection's `addresses:` list picks it up.
          FR_TOTAL='${{ steps.structure.outputs.fr_count }}'
          FR_ADDRESSED='${{ steps.structure.outputs.fr_addressed }}'
          SR_TOTAL='${{ steps.structure.outputs.sr_count }}'
          SR_ADDRESSED='${{ steps.structure.outputs.sr_addressed }}'
          # P4 (Bug-P / Codex audit) — surface the universe source so a
          # reviewer can tell whether the FR/SR contract came from the
          # merged PRD (canonical, the gate is honest) or from the
          # artifact itself (fallback for greenfield / no-merged-PRD;
          # the gate can only detect what the artifact mentions).
          if [ "${FR_TOTAL:-0}" -gt 0 ]; then
            FR_ICON="✗"; [ "$FR_ADDRESSED" = "$FR_TOTAL" ] && FR_ICON="✓"
            printf '| FR addressed by per-repo §5 | %s/%s %s (universe: %s) |\n' \
              "$FR_ADDRESSED" "$FR_TOTAL" "$FR_ICON" "$FR_SR_UNIVERSE_SOURCE" >> "$BODY"
          fi
          if [ "${SR_TOTAL:-0}" -gt 0 ]; then
            SR_ICON="✗"; [ "$SR_ADDRESSED" = "$SR_TOTAL" ] && SR_ICON="✓"
            printf '| SR addressed by per-repo §5 | %s/%s %s (universe: %s) |\n' \
              "$SR_ADDRESSED" "$SR_TOTAL" "$SR_ICON" "$FR_SR_UNIVERSE_SOURCE" >> "$BODY"
          fi
          # Workflow-validity fix (post-cert-3): GitHub Actions tightened
          # its expression parser. The previous inline-ternary pattern (a
          # GHA expression with doubled single quotes around true/icon
          # values inside a `run: |` literal-block scalar) fails to
          # validate because the YAML literal block does NOT process the
          # doubled-quote escape. See Task #61 forensic. Mirror the HOW
          # workflow's bash-case pattern instead.
          #
          # NOTE: the broken pattern is NOT reproduced verbatim in this
          # comment because GHA's parser scans for double-brace expression
          # syntax in EVERY line of `run: |` blocks (including bash
          # comments) — a comment containing the broken expression
          # would itself fail the workflow (post-cert-3-v2 forensic).
          MODE_HONESTY_OK='${{ steps.mode_honesty.outputs.ok }}'
          case "$MODE_HONESTY_OK" in
            true)  MODE_ICON="✓" ;;
            *)     MODE_ICON="✗" ;;
          esac
          printf '| Per-repo mode honesty (A12.v1.1) | %s (repos=%s, findings=%s) |\n' \
            "$MODE_ICON" \
            '${{ steps.mode_honesty.outputs.repo_count }}' \
            '${{ steps.mode_honesty.outputs.finding_count }}' \
            >> "$BODY"
          # Task #62 — Required skill_call manifest row.
          MANIFEST_OK_DISPLAY='${{ steps.manifest.outputs.ok }}'
          MANIFEST_MISSING_DISPLAY='${{ steps.manifest.outputs.missing }}'
          case "$MANIFEST_OK_DISPLAY" in
            true)  printf '| Required skill_call manifest | ✓ all 11 required skills invoked |\n' >> "$BODY" ;;
            false) printf '| Required skill_call manifest | ✗ incomplete — missing: %s |\n' "$(echo "$MANIFEST_MISSING_DISPLAY" | tr '\n' ',' | sed 's/,$//' | sed 's/,/, /g')" >> "$BODY" ;;
            *)     printf '| Required skill_call manifest | — n/a (no chain) |\n' >> "$BODY" ;;
          esac
          printf '| Pocket Watch (objective vs Problem Restatement) | calibration-pending (D-PR1.v1.x) |\n' >> "$BODY"
          printf "| Caterpillar's Challenge (code-design vs PRD) | calibration-pending (D-PR1.v1.x) |\n" >> "$BODY"

          # Self-review (B24/B29) — per-persona scores when available.
          REVIEW_ROUNDS='${{ steps.review.outputs.rounds }}'; REVIEW_ROUNDS="${REVIEW_ROUNDS:-0}"
          REVIEW_SOURCE='${{ steps.review.outputs.source }}'; REVIEW_SOURCE="${REVIEW_SOURCE:-none}"
          REVIEW_ARCH_SCORE='${{ steps.review.outputs.arch_score }}'
          REVIEW_ARCH_SEV='${{ steps.review.outputs.arch_severity }}'
          REVIEW_SEC_SCORE='${{ steps.review.outputs.sec_score }}'
          REVIEW_SEC_SEV='${{ steps.review.outputs.sec_severity }}'
          if [ "$REVIEW_ROUNDS" -gt 0 ]; then
            case "$REVIEW_SOURCE" in
              pr-body)                   SRC_NOTE="" ;;
              artifact-md)               SRC_NOTE=" · scores from \`code-design.md\` (agent wrote structured block inside the artifact rather than the PR body — both are valid)" ;;
              artifact-frontmatter-yaml) SRC_NOTE=" · scores from \`code-design.md\` Hatter Tag \`self_review:\` YAML frontmatter (agent used the YAML form — accepted but the canonical location is a PR-body \`### Self-review\` markdown block)" ;;
              b29-chain)                 SRC_NOTE=" · evidence from B29 chain only (no structured \`### Self-review\` blocks in PR body, artifact md, or artifact frontmatter — see agent narrative)" ;;
              *)                         SRC_NOTE="" ;;
            esac
            printf '| Self-review (B24 / B29) | %s round(s)%s |\n' "$REVIEW_ROUNDS" "$SRC_NOTE" >> "$BODY"
            if [ "$REVIEW_SOURCE" != "b29-chain" ]; then
              printf '| ↳ Code-Architect persona | %s severity=%s |\n' "${REVIEW_ARCH_SCORE:-—}" "${REVIEW_ARCH_SEV:-—}" >> "$BODY"
              printf '| ↳ Code-Security persona | %s severity=%s |\n' "${REVIEW_SEC_SCORE:-—}" "${REVIEW_SEC_SEV:-—}" >> "$BODY"
            fi
          else
            printf '| Self-review (B24 / B29) | — skipped (Restricted tier or no events) |\n' >> "$BODY"
          fi

          printf '| Hatter Tag `evidence_mode` | `%s` |\n' '${{ steps.ctx.outputs.evidence_mode }}' >> "$BODY"
          SEALED='${{ steps.chain.outputs.sealed }}'
          case "$SEALED" in
            true)  printf "| Knight's Seal (Ed25519) | ✓ Sealed |\n\n" >> "$BODY" ;;
            false) printf "| Knight's Seal (Ed25519) | ✗ Unsealed — no signed agent events (Bug T contract: every agent event must sign) |\n\n" >> "$BODY" ;;
            *)    printf "| Knight's Seal (Ed25519) | — n/a (no chain) |\n\n" >> "$BODY" ;;
          esac

          # Inline mode-honesty finding details when present — auditors
          # see what failed without grepping workflow logs.
          MODE_FINDINGS='${{ steps.mode_honesty.outputs.finding_count }}'
          if [ "${MODE_FINDINGS:-0}" != "0" ]; then
            printf '**Mode-honesty findings:**\n\n' >> "$BODY"
            printf '%s\n' "${{ steps.mode_honesty.outputs.findings }}" | sed 's/^/- /' >> "$BODY"
            printf '\n' >> "$BODY"
          fi

          printf '_code-design-agent.yml · run `%s`_\n' '${{ github.run_id }}' >> "$BODY"

          BODY_CONTENT=$(cat "$BODY")
          EXISTING=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" --jq '.[] | select(.body | startswith("<!-- code-design-agent-audit -->")) | .id' | head -1)
          if [ -n "$EXISTING" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/$EXISTING" -f body="$BODY_CONTENT" >/dev/null
          else
            gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body "$BODY_CONTENT"
          fi

  # ════════════════════════════════════════════════════════════════════
  # JOB 3 — Finalize on PR merge (append chain-ladder + flip action)
  # ════════════════════════════════════════════════════════════════════
  finalize:
    name: "Finalize on design-draft PR merge"
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'design-draft')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract OKR context
        id: ctx
        uses: ./.github/actions/extract-okr-context
        with:
          pr-number: ${{ github.event.pull_request.number }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Refactor 3c — delegate to the canonical finalize composite action.
      # PHASE SPEC — see vscode-extension/src/types/phaseSpec.ts.
      # If you rename a label / agent / phase here, update phaseSpec.ts too.
      - name: Finalize OKR action
        if: steps.ctx.outputs.okr_id != '' && steps.ctx.outputs.run_id != ''
        uses: ./.github/actions/finalize-okr-action
        with:
          phase: what
          okr-id: ${{ steps.ctx.outputs.okr_id }}
          run-id: ${{ steps.ctx.outputs.run_id }}
          chain-root-hash: ${{ steps.ctx.outputs.chain_root_hash }}
          current-meta-status: design-pending
          next-meta-status: building
          prior-phase: how
          pr-number: ${{ github.event.pull_request.number }}
          pr-merge-commit-sha: ${{ github.event.pull_request.merge_commit_sha }}
          # Bug Z: finalize is the durable workflow-event writer. Pass
          # the phase artifact path so finalize can hash + append
          # artifact_written with idempotency + verify-before-commit.
          artifact-path: okrs/${{ steps.ctx.outputs.okr_id }}/what/code-design.md
