name: "Market Research Agent — WHY-phase lifecycle"

# Single workflow for the market-research-agent's complete lifecycle in
# the agentic-SDLC pipeline. Replaces these legacy concern-keyed
# workflows for the WHY-phase scope:
#   - okr-bus.yml (oraculum-research branch)
#   - audit-validate.yml (research-synthesis branch)
#   - drift-gate.yml (research-synthesis branch)
#   - pr-auto-label.yml (research-synthesis path)
#
# Three triggers, three jobs:
#   1. `dispatch-agent` — on issue labeled `oraculum-research` (Looking
#       Glass "Start Why"). Posts the @copilot mention that activates
#       the market-research-agent persona.
#   2. `audit-and-drift` — on PR labeled `research-synthesis` (user-
#       triggered via Looking Glass "Run audit" button). Runs evidence-
#       honesty check + structural correctness + Pocket Watch goal-
#       drift. Applies `research-pass` on clean OR `degraded-evidence`
#       on fail. Posts the upserted correctness summary comment.
#   3. `finalize` — on PR closed-and-merged with research-synthesis
#       label. Emits the `run_complete` audit event + flips the OKR
#       action.status to `complete`.
#
# Caterpillar's Challenge (cross-phase drift) does NOT run on WHY —
# there is no prior phase to compare against. Pocket Watch (objective
# drift) IS run, comparing the OKR's frozen objective to the PR scope.
#
# Trigger model: pull_request_target on labeled events ONLY. The
# triggering_actor is the USER (who clicked Run audit), not the bot,
# so GitHub's "Require approval for outside collaborators" Actions
# policy doesn't gate the workflow as action_required. This is the
# whole reason the per-agent workflow rewrite was done.
#
# Phase tracking: §13 B20.

on:
  issues:
    types: [opened, labeled, reopened]
  pull_request_target:
    # NOTE: `closed` is here (not under a separate `pull_request:` block)
    # so the finalize job ALSO runs under user attribution and bypasses
    # GitHub's "Require approval for outside collaborators" gate when
    # the merge happens on a bot-opened PR. Confirmed broken on PR #87
    # merge (run 26183671575): event=pull_request with closed type
    # ended up as action_required and finalize never fired → okr.yaml
    # never flipped to status: complete → Looking Glass kept showing
    # "running". pull_request_target with closed type runs under the
    # merger's attribution (the human who clicked Merge), bypassing the
    # gate. Safety analysis is the same as labeled/unlabeled — workflow
    # definition runs from base, no PR scripts executed.
    types: [labeled, unlabeled, closed]

concurrency:
  group: market-research-agent-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  issues: write
  pull-requests: write
  contents: write
  checks: write
  # Oracle & Privacy Rails: finalize dispatches the model-replay workflow after
  # committing the durable rail report. A push made with the default GITHUB_TOKEN
  # does NOT trigger workflows (GitHub's recursion guard), but workflow_dispatch
  # is the explicit exception and runs with this token — so the replay leg fires
  # automatically without a PAT/App secret. Requires `actions: write`.
  actions: write
  # B21: models:read REQUIRED for the Pocket Watch goal-drift check —
  # the GitHub Models endpoint (models.inference.ai.azure.com/embeddings)
  # rejects requests without this scope. Without it embedding calls
  # silently return 401/403, our -s curl swallows the error, jq sees
  # null, python computes cosine=0.0, and Pocket Watch falsely flags
  # the run as goal-drift. Observed on PR #85 run 26180609548.
  models: read

jobs:
  # ════════════════════════════════════════════════════════════════════
  # JOB 1 — Dispatch the agent on Looking Glass "Start Why"
  # ════════════════════════════════════════════════════════════════════
  verify-agent-deployed:
    name: "Verify market-research-agent file is deployed"
    # Pre-flight sanity check that runs once when Looking Glass attaches
    # the `oraculum-research` label. The actual agent dispatch is handled
    # by Looking Glass via the Copilot Coding Agent assignment API
    # (`assignCustomCopilotAgent` → body-extension on the issue), NOT by
    # an `@copilot use agent ...` comment posted from here. Comment-based
    # dispatch on issues was confirmed to be a no-op (it adds noise but
    # never activates the agent), so we no longer post one.
    #
    # This job exists only to make the agent-file-missing failure mode
    # visible: if .github/agents/market-research-agent.agent.md is absent
    # from main when the label is applied, leave a clear PR comment so
    # the operator knows to Redeploy from Looking Glass.
    #
    # Gated on the `labeled` action + specific label name so issues
    # opened-with-label dispatch exactly once (not once for `opened`
    # AND once for `labeled` — see commit history for the double-fire
    # bug this guards against).
    if: >-
      github.event_name == 'issues' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'oraculum-research'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check agent file present on default branch
        run: |
          if ! gh api "repos/${{ github.repository }}/contents/.github/agents/market-research-agent.agent.md" >/dev/null 2>&1; then
            gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} \
              --body "⚠️ **market-research-agent.agent.md is not deployed.** Open Looking Glass → Settings → Mesh Provisioning → \"Deploy All\" so the agent file lands on \`main\`. (Looking Glass handles the actual dispatch — this workflow only sanity-checks the file.)"
            exit 1
          fi
          echo "::notice::market-research-agent.agent.md verified present — Looking Glass owns the dispatch."

  # ════════════════════════════════════════════════════════════════════
  # JOB 2 — Audit + drift on user-applied research-synthesis label
  # ════════════════════════════════════════════════════════════════════
  audit-and-drift:
    name: "Audit + drift check on research-synthesis PR"
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'research-synthesis' &&
      github.event.pull_request.base.repo.full_name == github.event.pull_request.head.repo.full_name
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      # SAFETY: checkout PR head with persist-credentials:false because
      # this is pull_request_target. We need the PR's audit JSONL +
      # research-doc.md, but PR-head files are DATA only. Trusted helper
      # actions / verifier scripts must come from the base branch.
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Checkout trusted helpers from base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: .trusted
          persist-credentials: false

      - name: Extract OKR context
        id: ctx
        uses: ./.trusted/.github/actions/extract-okr-context
        with:
          pr-number: ${{ github.event.pull_request.number }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip if Hatter Tag missing (legacy/manual PRs)
        id: gate
        if: steps.ctx.outputs.okr_id == '' || steps.ctx.outputs.run_id == ''
        run: |
          echo "::warning::PR has no okr_id/run_id Hatter Tag — skipping audit"
          echo "skip=true" >> "$GITHUB_OUTPUT"

      - name: Detect OKR state tampering (Bug GG-followup)
        id: state_guard
        if: steps.gate.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Bug GG-followup (2026-05): agents are CONTRACTUALLY forbidden
        # from mutating OKR state. The agent prompts carry the rule
        # ("NEVER edit okrs/<id>/okr.yaml" — Bug GG), but that is advice;
        # this step is the enforcement. See prd-agent.yml for the full
        # forensic — PR #140 (HOW-2026-05-25-j2gpke) tripped this
        # exact violation when the agent "fixed" a stale runId.
        run: |
          OKR_ID='${{ steps.ctx.outputs.okr_id }}'
          PR='${{ github.event.pull_request.number }}'
          TARGET="okrs/${OKR_ID}/okr.yaml"
          CHANGED=$(gh pr view "$PR" --repo '${{ github.repository }}' --json files --jq '.files[].path' 2>/dev/null || true)
          if [ -z "$CHANGED" ]; then
            echo "::warning::Could not read PR file list via gh — state-guard cannot verify okr.yaml. Treating as state_fail=false; downstream chain/structure checks still apply."
            echo "state_fail=false"   >> "$GITHUB_OUTPUT"
            echo "state_reason="      >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if printf '%s\n' "$CHANGED" | grep -Fxq "$TARGET"; then
            echo "::error::Agent PR modified $TARGET — OKR state is owned by Looking Glass dispatch/reset and finalize-okr-action, not the agent. This is a Bug GG trust-boundary violation. Revert the okr.yaml change; raise a separate (non-agent-labeled) PR if okr.yaml legitimately needs correction."
            echo "state_fail=true"    >> "$GITHUB_OUTPUT"
            echo "state_reason=Agent PR modified $TARGET; OKR state is owned by Looking Glass dispatch/reset and finalize-okr-action (Bug GG-followup). Revert the okr.yaml change and, if okr.yaml legitimately needs correction, raise a separate PR that does NOT carry the prd-draft / research-synthesis / design-draft label." >> "$GITHUB_OUTPUT"
          else
            echo "::notice::state-guard pass: okr.yaml unchanged in this PR"
            echo "state_fail=false"   >> "$GITHUB_OUTPUT"
            echo "state_reason="      >> "$GITHUB_OUTPUT"
          fi

      - name: Locate audit JSONL
        id: audit
        if: steps.gate.outputs.skip != 'true'
        run: |
          JSONL="okrs/${{ steps.ctx.outputs.okr_id }}/audit/events/${{ steps.ctx.outputs.run_id }}.jsonl"
          if [ ! -f "$JSONL" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "path=$JSONL" >> "$GITHUB_OUTPUT"
            echo "::warning::Audit JSONL missing at $JSONL"
            exit 0
          fi
          echo "found=true"   >> "$GITHUB_OUTPUT"
          echo "path=$JSONL"  >> "$GITHUB_OUTPUT"

      # P2 (Bug-P / Codex audit) — chain verification now goes through
      # the runner's `audit-verify-chain` skill instead of inline Python.
      # The previous form recomputed SHA hashes and *counted* non-empty
      # signatures, but never cryptographically verified the Ed25519
      # signatures themselves. The runner skill loads every <runId>.
      # epoch-N.pub.pem from audit/keys/ and verifies each agent-signed
      # event against the right epoch's public key (Bug O contract).
      # One implementation, one source of truth.
      - name: Verify audit chain integrity (per-epoch Ed25519 + hash replay)
        id: chain
        if: steps.gate.outputs.skip != 'true' && steps.audit.outputs.found == 'true'
        env:
          OKR_ID: ${{ steps.ctx.outputs.okr_id }}
          RUN_ID: ${{ steps.ctx.outputs.run_id }}
        run: |
          set -e
          RESULT=$(printf '{"okrId":"%s","runId":"%s"}' "$OKR_ID" "$RUN_ID" \
            | npx -y @maintainabilityai/research-runner@~0.1.64 skill-audit-verify-chain 2>&1 || true)
          echo "$RESULT" > /tmp/chain-verify.json
          python3 <<'PYEOF'
          import json, os
          raw = open('/tmp/chain-verify.json', 'r', encoding='utf-8').read()
          obj = None
          for line in raw.splitlines():
              line = line.strip()
              if line.startswith('{') and line.endswith('}'):
                  try:
                      obj = json.loads(line); break
                  except Exception: pass
          if obj is None:
              obj = {'ok': False, 'reason': f'runner-cli-no-json: {raw[:200]}'}
          out_path = os.environ['GITHUB_OUTPUT']
          with open(out_path, 'a', encoding='utf-8') as f:
              f.write(f"ok={'true' if obj.get('ok') else 'false'}\n")
              f.write(f"reason={obj.get('reason','') if not obj.get('ok') else ''}\n")
              f.write(f"head={obj.get('chainHead','') or ''}\n")
              f.write(f"count={obj.get('eventCount', 0)}\n")
              f.write(f"sealed={'true' if obj.get('sealed') else 'false'}\n")
              f.write(f"seal_verified={'true' if obj.get('sealVerified') else 'false'}\n")
          status = 'PASS' if obj.get('ok') else 'FAIL'
          print(f"::notice::audit chain {status} count={obj.get('eventCount', 0)} "
                f"sealed={obj.get('sealed', False)} seal_verified={obj.get('sealVerified', False)}")
          if not obj.get('ok'):
              print(f"::warning::audit chain reason: {obj.get('reason','')}")
          PYEOF

      # Task #62 — Required skill_call manifest verification. Cert-run-3
      # forensic: the agent skipped dedupe-and-rank + format-research-issue-
      # update entirely (12 events instead of expected ~16) while the run
      # still passed all other checks. The chain became a coverage lie.
      # This step counts skill_call events per skill and fails the verdict
      # if any required skill is missing. Per-BAR / per-repo counts read
      # from okr.yaml so the threshold matches the actual scope.
      - name: Verify required skill_call manifest
        id: manifest
        if: steps.gate.outputs.skip != 'true' && steps.audit.outputs.found == 'true'
        env:
          JSONL: ${{ steps.audit.outputs.path }}
          OKR_ID: ${{ steps.ctx.outputs.okr_id }}
        run: |
          OKR_YAML="okrs/${OKR_ID}/okr.yaml"
          if [ ! -f "$OKR_YAML" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "reason=okr-yaml-missing" >> "$GITHUB_OUTPUT"
            echo "missing=$OKR_YAML" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          JSONL="$JSONL" OKR_YAML="$OKR_YAML" python3 <<'PYEOF'
          import json, os, yaml
          # Count successful skill_call events per skill.
          counts = {}
          with open(os.environ['JSONL'], 'r', encoding='utf-8') as f:
              for line in f:
                  line = line.strip()
                  if not line: continue
                  try:
                      e = json.loads(line)
                  except Exception:
                      continue
                  if e.get('event_kind') != 'skill_call': continue
                  payload = e.get('payload') or {}
                  if payload.get('ok') is False: continue  # don't count failures
                  skill = payload.get('skill')
                  if not skill: continue
                  counts[skill] = counts.get(skill, 0) + 1

          # Dynamic threshold for knowledge-mesh-bar: 1 per affectedBarIds.
          card = yaml.safe_load(open(os.environ['OKR_YAML'])) or {}
          oa = card.get('objectiveAlignment') or {}
          bar_ids = oa.get('affectedBarIds') or []
          required_bar_calls = max(1, len(bar_ids))

          # Required skill_call manifest — must match the table in
          # agents-v4/market-research-agent.agent.md "Required skill_call
          # manifest" section.
          required = [
              ('knowledge-okr', 1),
              ('knowledge-mesh-bar', required_bar_calls),
              ('knowledge-mesh-threats', 1),
              ('knowledge-mesh-adrs', 1),
              ('tavily-search', 1),
              ('arxiv-search', 1),
              ('uspto-search', 1),
              ('hackernews-search', 1),
              ('dedupe-and-rank', 1),
              ('format-research-issue-update', 1),
          ]
          missing = []
          for skill, min_count in required:
              actual = counts.get(skill, 0)
              if actual < min_count:
                  missing.append(f'{skill} (got {actual}/{min_count})')
          ok = len(missing) == 0
          out = os.environ['GITHUB_OUTPUT']
          with open(out, 'a', encoding='utf-8') as f:
              f.write(f'ok={"true" if ok else "false"}\n')
              f.write(f'reason={"" if ok else "skill-manifest-incomplete"}\n')
              # Multiline-safe missing list.
              f.write('missing<<MEOF\n')
              for m in missing:
                  f.write(m + '\n')
              f.write('MEOF\n')
          status = 'PASS' if ok else 'FAIL'
          print(f'::notice::skill-manifest {status} ({len(required)} required, {len(missing)} missing)')
          if not ok:
              for m in missing:
                  print(f'::warning::skill-manifest missing: {m}')
          PYEOF

      # Query-plan quality gate. Each provider searches a different corpus:
      # Tavily wants recency-anchored web queries, arXiv wants short formal
      # technical phrases, USPTO wants 2-3 AND-joined keywords, and HN wants
      # short casual title phrases. The audit chain is honest even when a
      # poorly shaped query returns ok:true + zero results, so enforce the
      # deterministic parts of .caterpillar/prompts/research/query-plan.md
      # from the JSONL payload.
      - name: Verify provider query-plan shape
        id: query_plan
        if: steps.gate.outputs.skip != 'true' && steps.audit.outputs.found == 'true'
        env:
          JSONL: ${{ steps.audit.outputs.path }}
        run: |
          JSONL="$JSONL" python3 <<'PYEOF'
          import datetime, json, os, re
          path = os.environ['JSONL']
          bad = []
          total = 0
          current_year = str(datetime.datetime.utcnow().year)
          stop_words = {'a', 'an', 'and', 'as', 'for', 'from', 'in', 'of', 'on', 'or', 'the', 'to', 'with'}

          def word_count(query):
              return len(re.findall(r"[A-Za-z0-9][A-Za-z0-9+._/-]*", str(query)))

          def words(query):
              return re.findall(r"[A-Za-z0-9][A-Za-z0-9+._/-]*", str(query).lower())

          def record(skill, query, reason):
              bad.append(f'{skill}: "{query}" - {reason}')

          with open(path, 'r', encoding='utf-8') as f:
              for line in f:
                  line = line.strip()
                  if not line:
                      continue
                  try:
                      event = json.loads(line)
                  except Exception:
                      continue
                  if event.get('event_kind') != 'skill_call':
                      continue
                  payload = event.get('payload') or {}
                  skill = payload.get('skill')
                  if skill not in {'tavily-search', 'arxiv-search', 'uspto-search', 'hackernews-search'}:
                      continue
                  for query in payload.get('queries') or []:
                      total += 1
                      count = word_count(query)
                      q = str(query)
                      if skill == 'tavily-search':
                          if current_year not in q:
                              record(skill, q, f'missing recency year {current_year}')
                          if count < 4:
                              record(skill, q, f'too short for web search ({count} words, expected >=4)')
                      elif skill == 'arxiv-search':
                          if count < 3 or count > 6:
                              record(skill, q, f'{count} words, expected 3-6')
                          if re.search(r'\b(AND|OR|NOT)\b', q, re.IGNORECASE):
                              record(skill, q, 'contains boolean operator; arXiv queries should be plain phrases')
                          if re.search(r'\b20\d{2}\b', q):
                              record(skill, q, 'contains year; arXiv queries should be technical phrases, not recency queries')
                      elif skill == 'uspto-search':
                          terms = [t.strip() for t in re.split(r'\s+AND\s+', q, flags=re.IGNORECASE) if t.strip()]
                          if len(terms) < 2 or len(terms) > 3:
                              record(skill, q, f'{len(terms)} AND terms, expected 2-3')
                          for term in terms:
                              term_words = words(term)
                              if len(term_words) == 0:
                                  record(skill, q, 'contains empty USPTO term')
                              elif len(term_words) > 2:
                                  record(skill, q, f'USPTO term "{term}" is too phrase-like; use keywords')
                              if any(w in stop_words for w in term_words):
                                  record(skill, q, f'USPTO term "{term}" contains stop word')
                      elif skill == 'hackernews-search':
                          if count < 2 or count > 3:
                              record(skill, q, f'{count} words, expected 2-3 casual words')

          ok = len(bad) == 0
          out = os.environ['GITHUB_OUTPUT']
          with open(out, 'a', encoding='utf-8') as f:
              f.write(f'ok={"true" if ok else "false"}\n')
              f.write(f'total={total}\n')
              f.write(f'bad_count={len(bad)}\n')
              f.write('bad<<QEOF\n')
              for item in bad:
                  f.write(item + '\n')
              f.write('QEOF\n')
          if ok:
              print(f'::notice::query-plan PASS ({total} provider queries matched deterministic provider-shape rules)')
          else:
              print(f'::warning::query-plan FAIL ({len(bad)} violation(s) across {total} provider queries)')
              for item in bad:
                  print(f'::warning::bad provider query: {item}')
          PYEOF

      # Bug Z (post-Codex round-10) — PR audit VERIFIES, finalize RECORDS.
      # This step previously emitted artifact_written into the workspace
      # JSONL via `npx audit-emit-event`. That path was always disposable:
      # this job runs under pull_request_target with persist-credentials:
      # false (intentional for safety), so the workflow has no write
      # credentials to push the appended JSONL back to the PR branch.
      # The emit landed in the runner workspace and was discarded when
      # the runner shut down. Merged main carried only skill_call events;
      # finalize never appended workflow events to the per-run JSONL.
      #
      # The fix moves the durable write to finalize-okr-action (runs on
      # main with write credentials) and reduces this step to a pure
      # verifier: compute the expected payload, surface a forged existing
      # event if one is hand-rolled into the chain, never mutate.
      - name: Compute expected artifact_written + detect forged existing event (verify-only)
        id: artifact-expect
        if: steps.gate.outputs.skip != 'true' && steps.audit.outputs.found == 'true'
        env:
          JSONL: ${{ steps.audit.outputs.path }}
        run: |
          ARTIFACT="okrs/${{ steps.ctx.outputs.okr_id }}/why/research-doc.md"
          if [ ! -f "$ARTIFACT" ]; then
            echo "artifact_present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::artifact $ARTIFACT not on PR head — finalize will not be able to record artifact_written on merge"
            exit 0
          fi
          CURRENT_SHA=$(sha256sum "$ARTIFACT" | awk '{print $1}')
          CURRENT_BYTES=$(wc -c < "$ARTIFACT" | tr -d ' ')
          echo "artifact_present=true"   >> "$GITHUB_OUTPUT"
          echo "expected_sha=$CURRENT_SHA"   >> "$GITHUB_OUTPUT"
          echo "expected_bytes=$CURRENT_BYTES" >> "$GITHUB_OUTPUT"

          # Forge detection: a hand-rolled artifact_written in the chain
          # whose sha/bytes don't match the PR head is a tampering signal.
          # Finalize will refuse to overwrite it; this step surfaces it
          # to the reviewer pre-merge so the PR can be rejected.
          EXISTING_LINE=$(jq -rc --arg path "$ARTIFACT" 'select(.event_kind == "artifact_written" and .payload.path == $path)' "$JSONL" 2>/dev/null | head -1)
          if [ -n "$EXISTING_LINE" ]; then
            EXISTING_SHA=$(echo "$EXISTING_LINE" | jq -r '.payload.sha256 // ""')
            EXISTING_BYTES=$(echo "$EXISTING_LINE" | jq -r '.payload.bytes // -1')
            EXISTING_ID=$(echo "$EXISTING_LINE" | jq -r '.event_id // -1')
            if [ "$EXISTING_SHA" != "$CURRENT_SHA" ] || [ "$EXISTING_BYTES" != "$CURRENT_BYTES" ]; then
              echo "::error::FORGED artifact_written detected — chain event $EXISTING_ID has sha=${EXISTING_SHA:0:16}… bytes=$EXISTING_BYTES but current PR head has sha=${CURRENT_SHA:0:16}… bytes=$CURRENT_BYTES."
              echo "artifact_forged=true" >> "$GITHUB_OUTPUT"
              echo "artifact_forged_reason=existing-event-${EXISTING_ID}-sha-${EXISTING_SHA:0:16}-vs-current-${CURRENT_SHA:0:16}" >> "$GITHUB_OUTPUT"
            else
              echo "::notice::artifact_written event $EXISTING_ID found in chain and matches PR head (sha + bytes) — finalize will treat as idempotent no-op"
            fi
          fi

      - name: Count successful skill_calls + distinct queries
        id: counts
        if: steps.gate.outputs.skip != 'true' && steps.audit.outputs.found == 'true'
        uses: ./.trusted/.github/actions/count-skill-calls
        with:
          audit-jsonl-path: ${{ steps.audit.outputs.path }}

      # Bug Z/2 — source-claim integrity. For every S[N] citation in
      # research-doc.md, confirm the cited (title, url) pair matches a
      # results_preview[] entry in the audited chain. This catches the
      # evidence-laundering patterns observed on WHY-2026-05-24-wzi0yl
      # (S40 title-swap, S47/S48 URL fabrication). Mismatches degrade
      # the audit verdict in the next step.
      - name: Verify source-table integrity (S[N] title+URL match registry/previews)
        id: source-verify
        if: steps.gate.outputs.skip != 'true' && steps.audit.outputs.found == 'true'
        env:
          OKR_ID: ${{ steps.ctx.outputs.okr_id }}
          RUN_ID: ${{ steps.ctx.outputs.run_id }}
          DOC_PATH: okrs/${{ steps.ctx.outputs.okr_id }}/why/research-doc.md
          JSONL_PATH: ${{ steps.audit.outputs.path }}
        run: |
          set -e
          TRUSTED_SCRIPT="$RUNNER_TEMP/verify-source-table.mjs"
          if ! gh api \
            -H "Accept: application/vnd.github.raw" \
            "repos/${{ github.repository }}/contents/.github/workflows/scripts/verify-source-table.mjs?ref=${{ github.event.repository.default_branch }}" \
            > "$TRUSTED_SCRIPT"; then
            # Bug Z review fix — was previously a fail-OPEN skip ("warn +
            # ok=true"). That meant a partial mesh deploy could ship a
            # green WHY run with no source-claim verification at all,
            # which is the exact "green but unchecked" class this gate
            # exists to catch. Now fails closed as missing-verifier so
            # the verdict step degrades the run with a clear reason.
            echo "::error::trusted verify-source-table.mjs could not be fetched from ${{ github.event.repository.default_branch }} — source-table verification cannot run. Open Looking Glass → Settings → Mesh Provisioning → Redeploy so the script lands on main, then re-trigger this audit."
            echo "ok=false"          >> "$GITHUB_OUTPUT"
            echo "missing=true"      >> "$GITHUB_OUTPUT"
            echo "mismatches=0"      >> "$GITHUB_OUTPUT"
            echo "unmatched=0"       >> "$GITHUB_OUTPUT"
            echo "conflicts=0"       >> "$GITHUB_OUTPUT"
            echo "registry_errors=0" >> "$GITHUB_OUTPUT"
            echo "total=0"           >> "$GITHUB_OUTPUT"
            exit 0
          fi
          RESULT=$(node "$TRUSTED_SCRIPT")
          echo "$RESULT" > /tmp/source-verify.json
          OK=$(echo "$RESULT" | jq -r '.ok')
          MISMATCHES=$(echo "$RESULT" | jq -r '.mismatches | length // 0')
          UNMATCHED=$(echo "$RESULT" | jq -r '.unmatched | length // 0')
          CONFLICTS=$(echo "$RESULT" | jq -r '.conflicts | length // 0')
          REGISTRY_ERRORS=$(echo "$RESULT" | jq -r '.registryErrors | length // 0')
          TOTAL=$(echo "$RESULT" | jq -r '.totalUnique // 0')
          echo "ok=$OK"               >> "$GITHUB_OUTPUT"
          echo "mismatches=$MISMATCHES" >> "$GITHUB_OUTPUT"
          echo "unmatched=$UNMATCHED" >> "$GITHUB_OUTPUT"
          echo "conflicts=$CONFLICTS" >> "$GITHUB_OUTPUT"
          echo "registry_errors=$REGISTRY_ERRORS" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL"         >> "$GITHUB_OUTPUT"
          if [ "$OK" != "true" ]; then
            echo "::warning::source-table verify found $MISMATCHES title-mismatch(es) + $UNMATCHED unmatched citation(s) + $CONFLICTS declaration-conflict(s) + $REGISTRY_ERRORS registry error(s) across $TOTAL S[N] sources"
            # Inside jq's `\(...)` string interpolation we're in jq
            # EXPRESSION context, NOT string context — so the join
            # separator MUST be a regular jq string `" | "`, NOT the
            # escaped form `\" | \"` (which only works at the outer
            # string level around the interpolation itself, like the
            # `\"\(.cited_title)\"` wrap above). Before this fix, jq
            # crashed with "unexpected INVALID_CHARACTER" the moment
            # source-verify produced any mismatch — making the WHY
            # workflow non-degradable. Bug Z's source-table verifier
            # shipped with this latent bug because tests only covered
            # the OK path. Pre-existing class.
            echo "$RESULT" | jq -r '.mismatches[]? | "::error file=\(.cited_url),line=\(.line)::S\(.s) title \"\(.cited_title)\" does not match chain title(s) for this URL: \(.chain_titles | join(" | "))"'
            echo "$RESULT" | jq -r '.unmatched[]?  | "::error file=\(.url),line=\(.line)::S\(.s) URL not present in any audited provider result — possible fabrication"'
            echo "$RESULT" | jq -r '.conflicts[]?  | "::error::S\(.s) source declaration conflict: \(.reason); declarations: \(.declarations | map("line " + (.line|tostring) + " -> " + .url) | join(" | "))"'
            echo "$RESULT" | jq -r '.registryErrors[]? | "::error::source registry error: \(.reason)"'
          else
            echo "::notice::source-table verify ok — $TOTAL S[N] citations all match chain previews"
          fi

      - name: Parse research-doc.md structure
        id: structure
        if: steps.gate.outputs.skip != 'true'
        run: |
          DOC="okrs/${{ steps.ctx.outputs.okr_id }}/why/research-doc.md"
          if [ ! -f "$DOC" ]; then
            echo "doc_found=false"    >> "$GITHUB_OUTPUT"
            echo "h2_present=0"       >> "$GITHUB_OUTPUT"
            echo "h3_present=0"       >> "$GITHUB_OUTPUT"
            echo "conclusions=0"      >> "$GITHUB_OUTPUT"
            echo "conclusions_with_cites=0" >> "$GITHUB_OUTPUT"
            echo "doc_path=$DOC"      >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "doc_found=true"   >> "$GITHUB_OUTPUT"
          echo "doc_path=$DOC"    >> "$GITHUB_OUTPUT"

          # Each required section accepts a regex alternation of heading
          # strings — agent has been observed inconsistent ("JTBD Analysis"
          # vs "Jobs-to-be-Done Analysis" across PR #110 vs PR #114, same
          # section). Tolerance > fighting the model on wording.
          REQUIRED_H2=(
            "Source Premises"
            "Executive Summary"
            "Cross-Source Analysis"
            "Evidence Gaps"
            "JTBD Analysis|Jobs-to-be-Done Analysis"
            "Patent Landscape"
            "Whitespace Analysis"
            "Formal Conclusions"
            "Recommendations"
            "References"
          )
          H2_PRESENT=0; MISSING_H2=""
          for pattern in "${REQUIRED_H2[@]}"; do
            if grep -qE "^##[[:space:]]+(${pattern})[[:space:]]*$" "$DOC"; then
              H2_PRESENT=$((H2_PRESENT + 1))
            else
              MISSING_H2="${MISSING_H2}${pattern}; "
            fi
          done

          REQUIRED_H3=("Standards and Best Practices" "Security and Compliance" "Implementation Patterns" "Market Landscape")
          H3_PRESENT=0; MISSING_H3=""
          for name in "${REQUIRED_H3[@]}"; do
            if grep -qE "^###[[:space:]]+${name}[[:space:]]*$" "$DOC"; then
              H3_PRESENT=$((H3_PRESENT + 1))
            else
              MISSING_H3="${MISSING_H3}${name}; "
            fi
          done

          # Cert-run-2 bug C fix (Task #55) — count UNIQUE conclusion ids,
          # not raw markers. Old behavior counted every restatement of a
          # C-N marker (§9 Recommendations re-references each conclusion
          # by id), inflating both numerator + denominator. Cert-run-2's
          # artifact had 4 distinct conclusions and the old counter
          # returned 9 raw + 8 lines-with-S-cite. Now counts unique
          # ids + checks a per-id 4-line window for the S-N citation.
          UNIQUE_C_IDS=$(grep -oE '\*\*C[0-9]+\*\*' "$DOC" | sort -u)
          CONCLUSIONS=$(echo "$UNIQUE_C_IDS" | grep -cE '\*\*C[0-9]+\*\*' || true)
          CONCLUSIONS_WITH_CITES=0
          for CID_MARKER in $UNIQUE_C_IDS; do
            # First line where this marker appears.
            START=$(grep -nF "$CID_MARKER" "$DOC" | head -1 | cut -d: -f1)
            if [ -n "$START" ]; then
              END=$((START + 3))  # 4-line window (start + 3 trailing)
              if sed -n "${START},${END}p" "$DOC" | grep -qE '\bS[0-9]+\b'; then
                CONCLUSIONS_WITH_CITES=$((CONCLUSIONS_WITH_CITES + 1))
              fi
            fi
          done

          {
            echo "h2_present=$H2_PRESENT"
            echo "h3_present=$H3_PRESENT"
            echo "conclusions=$CONCLUSIONS"
            echo "conclusions_with_cites=$CONCLUSIONS_WITH_CITES"
            echo "missing_h2=${MISSING_H2%; }"
            echo "missing_h3=${MISSING_H3%; }"
          } >> "$GITHUB_OUTPUT"

      - name: Pocket Watch alignment (v2 contrastive rank/margin)
        id: pocket
        if: steps.gate.outputs.skip != 'true'
        # Pocket Watch v2 — CONTRASTIVE alignment rail. Replaces the brittle
        # absolute-cosine gate (a good on-mission artifact false-degraded at
        # 0.5822 < 0.65; see design/pocket-watch-alignment-rail.md). The research-
        # runner skill reads the OKR objective + Executive-Summary scope + a
        # pinned basket of sibling-OKR objectives, embeds them (GH Models,
        # models:read via GITHUB_TOKEN), and scores by RANK + margin. ADVISORY
        # while calibrating: records its verdict but Decide-verdict does NOT
        # degrade on it; the legacy absolute cosine is logged-only, never gates.
        env:
          OKR_ID: ${{ steps.ctx.outputs.okr_id }}
          RUN_ID: ${{ steps.ctx.outputs.run_id }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e  # advisory — never fail the audit job over Pocket Watch.
          PR_NUM='${{ github.event.pull_request.number }}'; PR_NUM="${PR_NUM:-null}"
          RESULT=$(printf '{"okrId":"%s","runId":"%s","phase":"why","prNumber":%s,"marginBand":0.05}' \
            "$OKR_ID" "$RUN_ID" "$PR_NUM" \
            | npx -y @maintainabilityai/research-runner@~0.1.64 skill-pocket-watch 2>/tmp/pw-err.txt)
          printf '%s' "$RESULT" > /tmp/pocket-watch.json
          python3 <<'PYEOF'
          import json, os
          def out(k, v):
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f: f.write(f'{k}={v}\n')
          try:
              obj = json.load(open('/tmp/pocket-watch.json'))
          except Exception as e:
              print(f'::warning::Pocket Watch v2 skipped (advisory) — unparseable skill output ({e})')
              out('status','skipped'); out('passed','skipped'); out('reason','unparseable-skill-output')
              raise SystemExit(0)
          if not obj.get('ok'):
              reason = obj.get('reason','unknown')
              print(f'::warning::Pocket Watch v2 skipped (advisory, NOT drift) — {reason}')
              out('status','skipped'); out('passed','skipped'); out('reason',reason)
              raise SystemExit(0)
          r = obj['report']
          status, rank, margin = r['status'], r['rank'], r['margin']
          out('status', status); out('passed', 'true' if status == 'pass' else 'false')
          out('rank', rank); out('margin', margin); out('own_score', r['own_score'])
          out('nearest_score', r['nearest_decoy_score'])
          out('nearest_okr', r.get('nearest_decoy_okr_id') or '')
          out('absolute_score', r['absolute_score']); out('reason', r['reason'])
          icon = {'pass':'✓','needs_review':'⚠','fail':'✗'}.get(status,'?')
          print(f"::notice::Pocket Watch v2 {icon} {status} — rank #{rank}, margin {margin:+.4f} "
                f"(own {r['own_score']} vs nearest {r.get('nearest_decoy_okr_id') or 'n/a'} {r['nearest_decoy_score']}); "
                f"ADVISORY (not gating). Legacy absolute {r['absolute_score']} logged-only.")
          PYEOF
          head -3 /tmp/pw-err.txt 2>/dev/null || true
          exit 0

      # ── Oracle & Privacy Rails — PII rail (Hatter-side evidence boundary) ──
      # This is NOT a Red Queen feature. Red Queen governs ACTIONS; this rail
      # governs EVIDENCE (research-doc.md + the source registry) entering the
      # Hatter planning chain. Trusted helpers are fetched from the default
      # branch — PR head is DATA only (same posture as verify-source-table.mjs).
      # Presidio + en_core_web_lg detect PII; the tiered policy hard-fails
      # contact/identity/secret classes and escalates ambiguous PERSON-in-
      # sensitive-context to needs_review (blocking during hardening). PR audit
      # VERIFIES + GATES here; the durable rail-report.json + rail_decision
      # event are written at FINALIZE (Bug-Z model).
      - name: Setup Python (Oracle PII rail)
        if: steps.gate.outputs.skip != 'true' && steps.structure.outputs.doc_found == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache Oracle PII rail deps (pip)
        if: steps.gate.outputs.skip != 'true' && steps.structure.outputs.doc_found == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: oracle-pii-rail-presidio-2.2.362-spacy-3.8.14-${{ runner.os }}

      - name: Oracle PII rail (gate)
        id: pii-rail
        if: steps.gate.outputs.skip != 'true' && steps.structure.outputs.doc_found == 'true'
        env:
          OKR_ID: ${{ steps.ctx.outputs.okr_id }}
          RUN_ID: ${{ steps.ctx.outputs.run_id }}
          DOC_PATH: okrs/${{ steps.ctx.outputs.okr_id }}/why/research-doc.md
          REGISTRY_PATH: okrs/${{ steps.ctx.outputs.okr_id }}/audit/sources/${{ steps.ctx.outputs.run_id }}.source-registry.json
        run: |
          set -uo pipefail
          DIR="$RUNNER_TEMP/oracle-rails"
          mkdir -p "$DIR"
          # Trusted helpers from the default branch — never run PR-head code
          # under pull_request_target. Fail CLOSED if any is missing.
          FETCH_OK=true
          for f in oracle_rail.py pii.json requirements.txt; do
            if ! gh api -H "Accept: application/vnd.github.raw" \
              "repos/${{ github.repository }}/contents/.github/workflows/scripts/oracle-rails/$f?ref=${{ github.event.repository.default_branch }}" \
              > "$DIR/$f"; then
              FETCH_OK=false
            fi
          done
          if [ "$FETCH_OK" != "true" ]; then
            echo "::error::Oracle PII rail helpers not deployed to .github/workflows/scripts/oracle-rails/ on ${{ github.event.repository.default_branch }}. Redeploy mesh workflows from Looking Glass and re-trigger. The PII rail cannot be skipped."
            echo "ok=false"     >> "$GITHUB_OUTPUT"
            echo "missing=true" >> "$GITHUB_OUTPUT"
            echo "reason=PII rail helper scripts missing from mesh (.github/workflows/scripts/oracle-rails/)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Install pinned Presidio + spaCy + the URL-pinned en_core_web_lg
          # model (all in requirements.txt) — no `spacy download`, so the EXACT
          # model artifact is retrieved for replay determinism.
          python3 -m pip install --disable-pip-version-check -r "$DIR/requirements.txt"
          # Config: prefer a mesh-committed policy at
          # .caterpillar/guardrails/oracle/pii.json fetched from the DEFAULT
          # BRANCH (trusted, never PR head); fall back to the bundled default.
          # config_sha256 in the report pins whichever config actually ran.
          CONFIG="$DIR/pii.json"
          if gh api -H "Accept: application/vnd.github.raw" \
            "repos/${{ github.repository }}/contents/.caterpillar/guardrails/oracle/pii.json?ref=${{ github.event.repository.default_branch }}" \
            > "$DIR/pii.override.json" 2>/dev/null; then
            CONFIG="$DIR/pii.override.json"
            echo "::notice::Oracle PII rail using mesh config override (.caterpillar/guardrails/oracle/pii.json)"
          else
            echo "::notice::Oracle PII rail using bundled default config (no mesh override present)"
          fi
          # Inputs as a bash ARRAY — robust against spaces/special chars in paths.
          INPUTS=("$DOC_PATH")
          if [ -f "$REGISTRY_PATH" ]; then INPUTS+=("$REGISTRY_PATH"); fi
          set +e
          OUT=$(python3 "$DIR/oracle_rail.py" run \
            --config "$CONFIG" \
            --report "$RUNNER_TEMP/oracle-pii.rail-report.json" \
            --inputs "${INPUTS[@]}" \
            --okr-id "$OKR_ID" --run-id "$RUN_ID" --phase why 2>/tmp/pii-err.txt)
          CODE=$?
          set -e
          cat /tmp/pii-err.txt || true
          printf 'rail stdout: %s\n' "$OUT"
          # Safe summary for the verdict reason + PR comment — entity TYPE @
          # file:line:col only (no raw value / excerpt). Read from the report file.
          REPORT_FILE="$RUNNER_TEMP/oracle-pii.rail-report.json"
          SUMMARY=$(python3 -c "import json,sys;r=json.load(open(sys.argv[1]));rows=r.get('blocked_entities') or r.get('needs_review_entities') or [];print('; '.join(sorted({e['type']+' @'+(e.get('input') or '?')+':'+str(e.get('line','?'))+':'+str(e.get('col','?')) for e in rows})) or 'none')" "$REPORT_FILE" 2>/dev/null || echo "see workflow log")
          echo "missing=false" >> "$GITHUB_OUTPUT"
          if [ "$CODE" -eq 0 ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "reason=clean (verdict=pass)" >> "$GITHUB_OUTPUT"
            echo "::notice::Oracle PII rail passed (verdict=pass)"
          elif [ "$CODE" -eq 2 ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "reason=blocked PII: $SUMMARY" >> "$GITHUB_OUTPUT"
            echo "::error::Oracle PII rail BLOCKED — hard-fail PII class detected: $SUMMARY"
          elif [ "$CODE" -eq 3 ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "reason=needs_review: $SUMMARY" >> "$GITHUB_OUTPUT"
            echo "::error::Oracle PII rail NEEDS REVIEW (blocking per policy): $SUMMARY"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "reason=rail-not-invoked (Presidio/model/config unloadable, exit $CODE)" >> "$GITHUB_OUTPUT"
            echo "::error::Oracle PII rail could not run (exit $CODE) — fails closed; evidence cannot be certified PII-clean"
          fi

      # ── Oracle & Privacy Rails — INJECTION rail (Phase 3, closes T3-6) ──────
      # Scans the UNTRUSTED external evidence (source registry — the retrieved
      # snippet text) for prompt injection with Llama Prompt Guard 2 86M. Scan
      # target by design = snippets/source-registry ONLY, NOT the agent-authored
      # research-doc (benign security prose). Same trust posture as the PII rail:
      # trusted helper fetched from the default branch; PR head is DATA only;
      # banded policy with a quoted/cited/fenced benign-context carve-out so a
      # security-research corpus does not hard-fail wholesale. Reuses the Python
      # env + pip cache the PII rail set up (transformers/torch are in the shared
      # requirements.txt). PR audit VERIFIES + GATES; finalize RECORDS.
      - name: Oracle injection rail (gate)
        id: inject-rail
        if: steps.gate.outputs.skip != 'true' && steps.structure.outputs.doc_found == 'true'
        env:
          OKR_ID: ${{ steps.ctx.outputs.okr_id }}
          RUN_ID: ${{ steps.ctx.outputs.run_id }}
          REGISTRY_PATH: okrs/${{ steps.ctx.outputs.okr_id }}/audit/sources/${{ steps.ctx.outputs.run_id }}.source-registry.json
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -uo pipefail
          # No untrusted snippet surface (registry absent) → nothing to scan.
          if [ ! -f "$REGISTRY_PATH" ]; then
            echo "::notice::Oracle injection rail: no source registry at $REGISTRY_PATH — no untrusted snippets to scan"
            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "reason=no source registry (nothing to scan)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DIR="$RUNNER_TEMP/oracle-rails"
          mkdir -p "$DIR"
          # Trusted helper + config from the default branch — fail CLOSED if
          # missing. requirements.txt was already fetched + installed by the PII
          # rail step above; re-fetch defensively in case ordering changes.
          FETCH_OK=true
          for f in inject_check.py injection.json requirements.txt; do
            if ! gh api -H "Accept: application/vnd.github.raw" \
              "repos/${{ github.repository }}/contents/.github/workflows/scripts/oracle-rails/$f?ref=${{ github.event.repository.default_branch }}" \
              > "$DIR/$f"; then
              FETCH_OK=false
            fi
          done
          if [ "$FETCH_OK" != "true" ]; then
            echo "::error::Oracle injection rail helpers not deployed to .github/workflows/scripts/oracle-rails/ on ${{ github.event.repository.default_branch }}. Redeploy mesh workflows from Looking Glass. The injection rail cannot be skipped."
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "reason=injection rail helper scripts missing from mesh" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python3 -m pip install --disable-pip-version-check -r "$DIR/requirements.txt"
          # Config override (default branch, trusted) → bundled default.
          CONFIG="$DIR/injection.json"
          if gh api -H "Accept: application/vnd.github.raw" \
            "repos/${{ github.repository }}/contents/.caterpillar/guardrails/oracle/injection.json?ref=${{ github.event.repository.default_branch }}" \
            > "$DIR/injection.override.json" 2>/dev/null; then
            CONFIG="$DIR/injection.override.json"
            echo "::notice::Oracle injection rail using mesh config override"
          else
            echo "::notice::Oracle injection rail using bundled default config"
          fi
          # ADVISORY mode: until the model is pinned + require_pinned_revision is
          # true, the rail runs + records but MUST NOT hard-fail the PR (honesty:
          # do not hard-gate on an unpinned/uncertified model). The rail is a
          # required gate ONLY when BOTH model_revision is set AND
          # require_pinned_revision is true.
          ADVISORY=$(python3 -c "import json,sys; c=json.load(open(sys.argv[1])); print('false' if (c.get('model_revision') and c.get('require_pinned_revision', True)) else 'true')" "$CONFIG" 2>/dev/null || echo "true")
          echo "advisory=$ADVISORY" >> "$GITHUB_OUTPUT"
          if [ "$ADVISORY" = "true" ]; then
            echo "::notice::Oracle injection rail is ADVISORY (model not pinned/certified) — it will run + record but not hard-fail this PR. Pin model_revision + require_pinned_revision:true to promote it to a required gate."
          fi
          set +e
          OUT=$(python3 "$DIR/inject_check.py" run \
            --config "$CONFIG" \
            --report "$RUNNER_TEMP/oracle-injection.rail-report.json" \
            --inputs "$REGISTRY_PATH" \
            --okr-id "$OKR_ID" --run-id "$RUN_ID" --phase why 2>/tmp/inject-err.txt)
          CODE=$?
          set -e
          cat /tmp/inject-err.txt || true
          printf 'injection rail stdout: %s\n' "$OUT"
          REPORT_FILE="$RUNNER_TEMP/oracle-injection.rail-report.json"
          REPORT_VERDICT=$(python3 -c "import json,sys; print(json.load(open(sys.argv[1])).get('verdict','unknown'))" "$REPORT_FILE" 2>/dev/null || echo "unknown")
          SUMMARY=$(python3 -c "import json,sys;r=json.load(open(sys.argv[1]));rows=r.get('blocked_entities') or r.get('needs_review_entities') or [];print('; '.join(sorted({'@'+(e.get('input') or '?')+':'+str(e.get('line','?'))+':'+str(e.get('col','?'))+' ['+str(e.get('shape',''))+']' for e in rows})) or 'none')" "$REPORT_FILE" 2>/dev/null || echo "see workflow log")
          if [ "$CODE" -eq 0 ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            if [ "$REPORT_VERDICT" = "needs_review" ]; then
              echo "reason=needs_review advisory (ambiguous injection signal): $SUMMARY" >> "$GITHUB_OUTPUT"
              echo "::warning::Oracle injection rail NEEDS REVIEW (advisory, not blocking): $SUMMARY"
            else
              echo "reason=clean (verdict=$REPORT_VERDICT)" >> "$GITHUB_OUTPUT"
              echo "::notice::Oracle injection rail passed (verdict=$REPORT_VERDICT)"
            fi
          elif [ "$CODE" -eq 2 ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "reason=prompt injection in retrieved evidence: $SUMMARY" >> "$GITHUB_OUTPUT"
            echo "::error::Oracle injection rail BLOCKED — prompt injection detected in retrieved evidence: $SUMMARY"
          elif [ "$CODE" -eq 3 ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "reason=needs_review (ambiguous injection signal): $SUMMARY" >> "$GITHUB_OUTPUT"
            echo "::error::Oracle injection rail NEEDS REVIEW (blocking per policy): $SUMMARY"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "reason=rail-not-invoked (Prompt Guard 2/model/config unloadable, exit $CODE)" >> "$GITHUB_OUTPUT"
            echo "::error::Oracle injection rail could not run (exit $CODE) — fails closed; evidence cannot be certified injection-clean"
          fi

      # ── Oracle & Privacy Rails — GROUNDEDNESS rail (Phase 4) ────────────────
      # PAIRING rail: checks each Formal Conclusion (C<n>) is entailed by the
      # registry excerpt of the S-tags it cites, with a local NLI cross-encoder.
      # Contradiction = a cited source REFUTES the claim (serious); unsupported =
      # neither entailed nor contradicted (needs_review, not fail — protects
      # cross-source synthesis). Ships ADVISORY first (block_on_contradiction
      # false until cert pins the model). Needs BOTH the research doc + registry.
      - name: Oracle groundedness rail (gate)
        id: grounded-rail
        if: steps.gate.outputs.skip != 'true' && steps.structure.outputs.doc_found == 'true'
        env:
          OKR_ID: ${{ steps.ctx.outputs.okr_id }}
          RUN_ID: ${{ steps.ctx.outputs.run_id }}
          DOC_PATH: okrs/${{ steps.ctx.outputs.okr_id }}/why/research-doc.md
          REGISTRY_PATH: okrs/${{ steps.ctx.outputs.okr_id }}/audit/sources/${{ steps.ctx.outputs.run_id }}.source-registry.json
          SC_PATH: okrs/${{ steps.ctx.outputs.okr_id }}/why/${{ steps.ctx.outputs.run_id }}.support-claims.json
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -uo pipefail
          # Groundedness needs both the conclusions (doc) and the premises
          # (registry). Without the registry there is nothing to ground against.
          if [ ! -f "$DOC_PATH" ] || [ ! -f "$REGISTRY_PATH" ]; then
            echo "::notice::Oracle groundedness rail: doc or source registry absent — nothing to ground"
            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "reason=no doc/registry pair (nothing to ground)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DIR="$RUNNER_TEMP/oracle-rails"
          mkdir -p "$DIR"
          FETCH_OK=true
          for f in groundedness.py groundedness.json requirements.txt; do
            if ! gh api -H "Accept: application/vnd.github.raw" \
              "repos/${{ github.repository }}/contents/.github/workflows/scripts/oracle-rails/$f?ref=${{ github.event.repository.default_branch }}" \
              > "$DIR/$f"; then
              FETCH_OK=false
            fi
          done
          if [ "$FETCH_OK" != "true" ]; then
            echo "::error::Oracle groundedness rail helpers not deployed on ${{ github.event.repository.default_branch }}. Redeploy mesh workflows from Looking Glass."
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "reason=groundedness rail helper scripts missing from mesh" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python3 -m pip install --disable-pip-version-check -r "$DIR/requirements.txt"
          CONFIG="$DIR/groundedness.json"
          if gh api -H "Accept: application/vnd.github.raw" \
            "repos/${{ github.repository }}/contents/.caterpillar/guardrails/oracle/groundedness.json?ref=${{ github.event.repository.default_branch }}" \
            > "$DIR/groundedness.override.json" 2>/dev/null; then
            CONFIG="$DIR/groundedness.override.json"
            echo "::notice::Oracle groundedness rail using mesh config override"
          else
            echo "::notice::Oracle groundedness rail using bundled default config"
          fi
          # ADVISORY mode: a gate only when the model is pinned AND
          # require_pinned_revision is true AND block_on_contradiction is true.
          ADVISORY=$(python3 -c "import json,sys; c=json.load(open(sys.argv[1])); print('false' if (c.get('model_revision') and c.get('require_pinned_revision', True) and c.get('block_on_contradiction', True)) else 'true')" "$CONFIG" 2>/dev/null || echo "true")
          echo "advisory=$ADVISORY" >> "$GITHUB_OUTPUT"
          if [ "$ADVISORY" = "true" ]; then
            echo "::notice::Oracle groundedness rail is ADVISORY — runs + records but does not hard-fail this PR. Pin model_revision + require_pinned_revision:true + block_on_contradiction:true to promote contradiction-blocking."
          fi
          # Phase 4.1: pass the support-claims sidecar when the WHY agent emitted
          # it — the rail prefers atomic-claim scoring and falls back to whole-
          # conclusion when absent. The sidecar is DATA (PR-head), not a helper.
          INPUTS=("$DOC_PATH" "$REGISTRY_PATH")
          if [ -f "$SC_PATH" ]; then INPUTS+=("$SC_PATH"); fi
          set +e
          OUT=$(python3 "$DIR/groundedness.py" run \
            --config "$CONFIG" \
            --report "$RUNNER_TEMP/oracle-groundedness.rail-report.json" \
            --inputs "${INPUTS[@]}" \
            --okr-id "$OKR_ID" --run-id "$RUN_ID" --phase why 2>/tmp/grounded-err.txt)
          CODE=$?
          set -e
          cat /tmp/grounded-err.txt || true
          printf 'groundedness rail stdout: %s\n' "$OUT"
          REPORT_FILE="$RUNNER_TEMP/oracle-groundedness.rail-report.json"
          SUMMARY=$(python3 -c "import json,sys;c=json.load(open(sys.argv[1])).get('counts',{});u=c.get('unresolved',0);print('contradicted='+str(c.get('contradicted',0))+' unsupported='+str(c.get('unsupported',0))+(' unresolved='+str(u) if u else '')+' entailed='+str(c.get('entailed',0)))" "$REPORT_FILE" 2>/dev/null || echo "see workflow log")
          if [ "$CODE" -eq 0 ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "reason=groundedness: $SUMMARY" >> "$GITHUB_OUTPUT"
            echo "::notice::Oracle groundedness rail recorded ($SUMMARY)"
          elif [ "$CODE" -eq 2 ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "reason=conclusion contradicted by its cited source: $SUMMARY" >> "$GITHUB_OUTPUT"
            echo "::error::Oracle groundedness rail BLOCKED — a conclusion is contradicted by a source it cites: $SUMMARY"
          elif [ "$CODE" -eq 3 ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "reason=unsupported conclusion (blocking per policy): $SUMMARY" >> "$GITHUB_OUTPUT"
            echo "::error::Oracle groundedness rail NEEDS REVIEW (blocking per policy): $SUMMARY"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "reason=rail-not-invoked (NLI model/config unloadable, exit $CODE)" >> "$GITHUB_OUTPUT"
            echo "::error::Oracle groundedness rail could not run (exit $CODE) — fails closed; evidence cannot be certified grounded"
          fi

      - name: Decide verdict
        id: verdict
        if: steps.gate.outputs.skip != 'true'
        env:
          # Bug-GG-quote — prose outputs must pass through env:, not
          # inline shell assignments. Query-plan failures can contain
          # literal quotes, e.g. arxiv-search: "recommender systems" -
          # 2 words, expected 3-6. Inlining that inside double quotes
          # makes Bash try to execute `systems`.
          CHAIN_REASON: ${{ steps.chain.outputs.reason }}
          MANIFEST_MISSING_RAW: ${{ steps.manifest.outputs.missing }}
          QUERY_PLAN_BAD_RAW: ${{ steps.query_plan.outputs.bad }}
          STATE_FAIL_OUT: ${{ steps.state_guard.outputs.state_fail }}
          STATE_FAIL_REASON_OUT: ${{ steps.state_guard.outputs.state_reason }}
          CHAIN_ROOT_REASON_OUT: ${{ steps.ctx.outputs.chain_root_reason }}
          ARTIFACT_FORGED: ${{ steps.artifact-expect.outputs.artifact_forged }}
          ARTIFACT_FORGED_REASON: ${{ steps.artifact-expect.outputs.artifact_forged_reason }}
          PII_REASON: ${{ steps.pii-rail.outputs.reason }}
          INJECT_REASON: ${{ steps.inject-rail.outputs.reason }}
          GROUNDED_REASON: ${{ steps.grounded-rail.outputs.reason }}
        run: |
          EVIDENCE_MODE="${{ steps.ctx.outputs.evidence_mode }}"
          FOUND="${{ steps.audit.outputs.found }}"
          TOTAL="${{ steps.counts.outputs.total }}"; TOTAL="${TOTAL:-0}"
          # Bug V (Codex round-6) — sealed gate now keys on raw chain
          # count (steps.chain.outputs.count) not TOTAL. TOTAL is the
          # sum of provider/mesh-skill counts; the sealed-required
          # gate should fire on ANY chain event, not just successful
          # provider calls. Brings WHY into parity with WHAT.
          CHAIN_COUNT="${{ steps.chain.outputs.count }}"; CHAIN_COUNT="${CHAIN_COUNT:-0}"
          DOC_FOUND="${{ steps.structure.outputs.doc_found }}"
          H2="${{ steps.structure.outputs.h2_present }}"
          H3="${{ steps.structure.outputs.h3_present }}"
          CHAIN_OK="${{ steps.chain.outputs.ok }}"
          CHAIN_REASON="${CHAIN_REASON:-}"
          SEALED="${{ steps.chain.outputs.sealed }}"
          SEAL_VERIFIED="${{ steps.chain.outputs.seal_verified }}"
          MANIFEST_OK="${{ steps.manifest.outputs.ok }}"
          MANIFEST_MISSING_RAW="${MANIFEST_MISSING_RAW:-}"
          MANIFEST_MISSING=$(printf '%s' "$MANIFEST_MISSING_RAW" | tr '\n' ';' | sed 's/;$//')
          QUERY_PLAN_OK="${{ steps.query_plan.outputs.ok }}"
          QUERY_PLAN_BAD_RAW="${QUERY_PLAN_BAD_RAW:-}"
          QUERY_PLAN_BAD=$(printf '%s' "$QUERY_PLAN_BAD_RAW" | tr '\n' ';' | sed 's/;$//')

          VERDICT="ok"; REASON=""
          # Discrete failure-kind flags — used by the label-apply step to
          # pick the SPECIFIC failure label (degraded-evidence is for
          # evidence-honesty failures ONLY; drift gates get their own
          # labels). The prior pattern of always applying degraded-evidence
          # on any degraded verdict was misleading: a drift-only failure
          # was tagged "Hatter Tag declared live but 0 skill_calls" even
          # when skill_calls were healthy.
          EVIDENCE_FAIL="false"
          STRUCTURE_FAIL="false"
          DRIFT_FAIL="false"
          CHAIN_FAIL="false"

          # Bug GG-followup (2026-05) — OKR-state tampering is checked
          # BEFORE chain integrity. See prd-agent.yml for full
          # rationale. Net: a state-tampered PR is asking us to trust a
          # card the agent edited; fail fast with the most specific
          # reason.
          STATE_FAIL_OUT="${STATE_FAIL_OUT:-false}"
          STATE_FAIL_REASON_OUT="${STATE_FAIL_REASON_OUT:-}"
          STATE_FAIL="false"
          if [ "$STATE_FAIL_OUT" = "true" ]; then
            VERDICT="degraded"; REASON="$STATE_FAIL_REASON_OUT"
            STATE_FAIL="true"
          fi

          # Chain verification is the HIGHEST-PRIORITY gate AFTER state
          # tampering — a broken chain invalidates every other audit
          # signal. Check it second.
          #
          # Bug CC (2026-05): chain-related branches now set CHAIN_FAIL
          # only, NOT EVIDENCE_FAIL. Pre-Bug-CC, every chain branch
          # also flipped EVIDENCE_FAIL=true as a side effect, which
          # caused the UI to apply the `degraded-evidence` label
          # alongside the chain label and then surface the stock
          # "Hatter Tag declared `live` but no skill_calls" message —
          # actively misleading because the artifact's evidence_mode
          # was usually correct (Bug AA / PR #138 hit this exact
          # mis-attribution on HOW).
          if [ "$FOUND" = "true" ] && [ "$CHAIN_OK" = "false" ]; then
            VERDICT="degraded"; REASON="Audit chain verification failed: $CHAIN_REASON"
            CHAIN_FAIL="true"
          fi

          # Q4 (Bug-Q / Codex audit round 2) — seal-verification is a
          # gold-product gate. If the chain is sealed (any event signed),
          # the runner's per-event Ed25519 verification MUST have passed.
          # A chain that's "sealed but not verified" should never make
          # it to design-pass / prd-pass / research-pass. The runner
          # already fails verification at write-time for this case, but
          # we surface SEAL_VERIFIED here so the audit comment + label
          # logic agree end to end. Bug T (pre-release simplification)
          # removed legacy unsigned-chain tolerance; the unsealed-chain
          # case below this is the universal-rule rejection.
          if [ "$VERDICT" = "ok" ] && [ "$SEALED" = "true" ] && [ "$SEAL_VERIFIED" != "true" ]; then
            VERDICT="degraded"; REASON="Knight's Seal verification failed: chain has signatures but at least one did not verify against its epoch public key"
            CHAIN_FAIL="true"
          fi

          # Bug-S / S1 (Codex round-4 closeout) — chain_root_hash
          # mismatch hard-rejects. extract-okr-context now derives
          # chain_root_hash from JSONL event 1 and emits
          # chain_root_ok=false when the agent's pasted artifact-
          # frontmatter value disagrees. The artifact frontmatter is
          # the agent's claim, the JSONL is ground truth; disagreement
          # means the agent pasted a stale or fabricated hash — OR (Bug
          # AA) put the right hash at the wrong YAML indent. The
          # extract-okr-context fallback accepts top-level now (with a
          # ::notice::) so honest placement errors don't hard-fail, but
          # a real mismatch still lands here as CHAIN_FAIL.
          CHAIN_ROOT_OK_OUT="${{ steps.ctx.outputs.chain_root_ok }}"
          if [ "$VERDICT" = "ok" ] && [ "$CHAIN_ROOT_OK_OUT" = "false" ]; then
            VERDICT="degraded"; REASON="chain_root_hash mismatch: $CHAIN_ROOT_REASON_OUT"
            CHAIN_FAIL="true"
          fi

          # Bug-U / U2 (Codex round-5) + Bug V (Codex round-6) — an
          # agent run with ANY events in the chain MUST be sealed.
          # Round-6 audit found WHY/HOW were keying on TOTAL (sum of
          # mesh-skill counts) instead of raw chain count, so a chain
          # could have unsigned workflow-attributed events without
          # tripping the sealed gate. Bug V switches the gate to
          # CHAIN_COUNT so it matches WHAT's behaviour. Pre-V this
          # passed if TOTAL was 0 but the chain had any other events.
          if [ "$VERDICT" = "ok" ] && [ "${CHAIN_COUNT:-0}" -gt 0 ] && [ "$SEALED" != "true" ]; then
            VERDICT="degraded"; REASON="chain has events but is unsealed — no agent-emitted signed events present. Every agent event MUST sign with its per-epoch keypair (Bug T contract)."
            CHAIN_FAIL="true"
          fi

          # Bug Y (Codex round-9) — artifact_written reproducibility
          # gate. Bug Z (round-10) — step renamed from artifact-emit to
          # artifact-expect; the step no longer mutates the chain, but
          # it still surfaces a forged existing artifact_written if one
          # was hand-rolled into the JSONL. Finalize would refuse to
          # overwrite it; this gate fails the PR pre-merge so the issue
          # is visible to reviewers.
          ARTIFACT_FORGED="${ARTIFACT_FORGED:-}"
          ARTIFACT_FORGED_REASON="${ARTIFACT_FORGED_REASON:-}"
          if [ "$VERDICT" = "ok" ] && [ "$ARTIFACT_FORGED" = "true" ]; then
            VERDICT="degraded"; REASON="forged artifact_written event detected — chain payload does not match current PR head (Bug Y round-9 reproducibility check). ${ARTIFACT_FORGED_REASON}"
            CHAIN_FAIL="true"
          fi

          # Bug Z/2 — source-claim integrity. Every S[N] citation in
          # research-doc.md must match a (title, url) preview from the
          # audited chain. Title-mismatches or URL-fabrications fail the
          # gate as evidence honesty failures. The WHY phase is where
          # this MUST be caught — downstream phases trust the source
          # table to be honest. Bug Z review fix: missing verifier
          # script now fails closed (was a fail-OPEN skip pre-fix).
          SRC_OK='${{ steps.source-verify.outputs.ok }}'
          SRC_MISMATCH='${{ steps.source-verify.outputs.mismatches }}'
          SRC_UNMATCHED='${{ steps.source-verify.outputs.unmatched }}'
          SRC_CONFLICTS='${{ steps.source-verify.outputs.conflicts }}'
          SRC_REGISTRY_ERRORS='${{ steps.source-verify.outputs.registry_errors }}'
          SRC_TOTAL='${{ steps.source-verify.outputs.total }}'
          SRC_MISSING='${{ steps.source-verify.outputs.missing }}'
          if [ "$VERDICT" = "ok" ] && [ "$SRC_MISSING" = "true" ]; then
            VERDICT="degraded"; REASON="source-table verifier script missing from mesh — verify-source-table.mjs not deployed to .github/workflows/scripts/. Redeploy mesh workflows from Looking Glass and re-trigger this audit. WHY-phase evidence-laundering check cannot be skipped."
            EVIDENCE_FAIL="true"
          elif [ "$VERDICT" = "ok" ] && [ "$SRC_OK" != "true" ]; then
            VERDICT="degraded"; REASON="source-table mismatch: ${SRC_MISMATCH:-0} S[N] title(s) disagree with audited source data + ${SRC_UNMATCHED:-0} URL/S[N] value(s) not present in the audited registry/previews + ${SRC_CONFLICTS:-0} conflicting S[N] declaration(s) + ${SRC_REGISTRY_ERRORS:-0} source-registry error(s) (across ${SRC_TOTAL:-0} cited sources). See ::error lines from the source-verify step for per-S detail. This is the evidence-laundering check the WHY phase exists to enforce."
            EVIDENCE_FAIL="true"
          fi

          # Evidence honesty
          if [ "$VERDICT" = "ok" ] && [ -z "$EVIDENCE_MODE" ]; then
            VERDICT="degraded"; REASON="Hatter Tag missing evidence: block — declare evidence_mode (§11.1.7)"
            EVIDENCE_FAIL="true"
          elif [ "$VERDICT" = "ok" ] && [ "$FOUND" != "true" ] && [ "$EVIDENCE_MODE" = "live" ]; then
            VERDICT="degraded"; REASON="evidence_mode=live but audit JSONL not found"
            EVIDENCE_FAIL="true"
          elif [ "$VERDICT" = "ok" ] && [ "$FOUND" = "true" ] && [ "$EVIDENCE_MODE" = "live" ] && [ "$TOTAL" -eq 0 ]; then
            VERDICT="degraded"; REASON="evidence_mode=live but 0 successful provider skill_calls in audit"
            EVIDENCE_FAIL="true"
          fi

          # Task #62 — Required skill_call manifest. If the agent skipped
          # any mandatory skill (cert-run-3: dedupe-and-rank + format-
          # research-issue-update), evidence is incomplete regardless of
          # provider counts. Treated as an evidence-honesty failure since
          # the chain is the contract.
          if [ "$VERDICT" = "ok" ] && [ "$MANIFEST_OK" = "false" ]; then
            VERDICT="degraded"; REASON="Required skill_call manifest incomplete: $MANIFEST_MISSING"
            EVIDENCE_FAIL="true"
          fi

          # Query-plan shape is an evidence-quality gate. Providers can
          # return ok:true with zero results for badly shaped queries; this
          # keeps that from looking like high-quality live evidence.
          if [ "$VERDICT" = "ok" ] && [ "$QUERY_PLAN_OK" = "false" ]; then
            VERDICT="degraded"; REASON="Provider query-plan violation: $QUERY_PLAN_BAD"
            EVIDENCE_FAIL="true"
          fi

          # Structure
          if [ "$VERDICT" = "ok" ]; then
            if [ "$DOC_FOUND" != "true" ]; then
              VERDICT="degraded"; REASON="research-doc.md not committed"
              STRUCTURE_FAIL="true"
            elif [ "$H2" -lt 10 ] || [ "$H3" -lt 4 ]; then
              VERDICT="degraded"; REASON="research-doc.md missing required sections — H2 $H2/10, H3 $H3/4"
              STRUCTURE_FAIL="true"
            fi
          fi

          # Oracle & Privacy Rails — PII rail (Hatter-side evidence boundary).
          # Hard-fail on blocked PII OR needs_review (blocking during the first
          # hardening pass) OR a missing/not-invoked rail (fail-closed). Placed
          # after the structure check so a missing doc degrades on structure,
          # not here. Not a Red Queen check — this governs evidence, not actions.
          PII_OK='${{ steps.pii-rail.outputs.ok }}'
          PII_REASON="${PII_REASON:-}"
          if [ "$VERDICT" = "ok" ] && [ "$DOC_FOUND" = "true" ] && [ "$PII_OK" != "true" ]; then
            VERDICT="degraded"; REASON="Oracle PII rail: ${PII_REASON:-failed}"
            EVIDENCE_FAIL="true"
          fi

          # Oracle & Privacy Rails — INJECTION rail (Phase 3). A blocked or
          # not-invoked injection rail degrades the evidence verdict. The
          # needs_review band is recorded + annotated but not blocking unless a
          # mesh override sets block_on_needs_review:true. Independent of PII so
          # either required rail can fail the PR on its own. ADVISORY guard:
          # until the model is pinned + certified (require_pinned_revision), the
          # rail does NOT hard-fail — it runs + records + comments, but the
          # verdict is not degraded by it.
          INJECT_OK='${{ steps.inject-rail.outputs.ok }}'
          INJECT_REASON="${INJECT_REASON:-}"
          INJECT_ADVISORY='${{ steps.inject-rail.outputs.advisory }}'
          if [ "$VERDICT" = "ok" ] && [ "$DOC_FOUND" = "true" ] && [ "$INJECT_OK" != "true" ]; then
            if [ "$INJECT_ADVISORY" = "true" ]; then
              echo "::warning::Oracle injection rail (ADVISORY, not gating): ${INJECT_REASON:-failed}"
            else
              VERDICT="degraded"; REASON="Oracle injection rail: ${INJECT_REASON:-failed}"
              EVIDENCE_FAIL="true"
            fi
          fi

          # Oracle & Privacy Rails — GROUNDEDNESS rail (Phase 4). Same advisory-
          # aware gate as injection: a non-pass degrades the verdict only when the
          # rail is a required gate; advisory runs warn but do not block.
          GROUNDED_OK='${{ steps.grounded-rail.outputs.ok }}'
          GROUNDED_REASON="${GROUNDED_REASON:-}"
          GROUNDED_ADVISORY='${{ steps.grounded-rail.outputs.advisory }}'
          if [ "$VERDICT" = "ok" ] && [ "$DOC_FOUND" = "true" ] && [ "$GROUNDED_OK" != "true" ]; then
            if [ "$GROUNDED_ADVISORY" = "true" ]; then
              echo "::warning::Oracle groundedness rail (ADVISORY, not gating): ${GROUNDED_REASON:-failed}"
            else
              VERDICT="degraded"; REASON="Oracle groundedness rail: ${GROUNDED_REASON:-failed}"
              EVIDENCE_FAIL="true"
            fi
          fi

          # Drift — Pocket Watch v2 is ADVISORY while its contrastive signal
          # calibrates (design/pocket-watch-alignment-rail.md): it records its
          # verdict but does NOT degrade the audit verdict, and the legacy
          # absolute cosine is logged-only and never gates. fail/needs_review
          # surface as a warning only; promotes to a blocking drift gate after
          # cert data confirms the per-mesh margin band. `status` is an enum
          # (pass/needs_review/fail/skipped) so it is safe to inline.
          POCKET_STATUS="${{ steps.pocket.outputs.status }}"
          if [ "$POCKET_STATUS" = "fail" ] || [ "$POCKET_STATUS" = "needs_review" ]; then
            echo "::warning::Pocket Watch v2 alignment=$POCKET_STATUS (ADVISORY, not gating — see the Pocket Watch step notice + audit comment for the rank/margin detail)"
          fi

          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON"   >> "$GITHUB_OUTPUT"
          echo "evidence_fail=$EVIDENCE_FAIL"   >> "$GITHUB_OUTPUT"
          echo "structure_fail=$STRUCTURE_FAIL" >> "$GITHUB_OUTPUT"
          echo "drift_fail=$DRIFT_FAIL"         >> "$GITHUB_OUTPUT"
          echo "chain_fail=$CHAIN_FAIL"         >> "$GITHUB_OUTPUT"
          echo "state_fail=$STATE_FAIL"         >> "$GITHUB_OUTPUT"
          echo "::notice::verdict=$VERDICT reason=$REASON (state_fail=$STATE_FAIL chain_fail=$CHAIN_FAIL evidence_fail=$EVIDENCE_FAIL structure_fail=$STRUCTURE_FAIL drift_fail=$DRIFT_FAIL)"

      - name: Upsert correctness summary comment
        if: steps.gate.outputs.skip != 'true'
        env:
          REASON: ${{ steps.verdict.outputs.reason }}
          POCKET_REASON: ${{ steps.pocket.outputs.reason }}
          MANIFEST_MISSING_DISPLAY: ${{ steps.manifest.outputs.missing }}
          QUERY_PLAN_BAD_DISPLAY: ${{ steps.query_plan.outputs.bad }}
        run: |
          VERDICT='${{ steps.verdict.outputs.verdict }}'
          REASON="${REASON:-}"
          BODY=/tmp/audit-body.md
          : > "$BODY"
          printf '%s\n' '<!-- market-research-agent-audit -->' >> "$BODY"
          if [ "$VERDICT" = "ok" ]; then
            printf '%s\n\n' '✓ **Market Research Audit — pass**' >> "$BODY"
          else
            printf '%s\n\n' '⚠️ **Market Research Audit — degraded**' >> "$BODY"
            printf '**Reason:** %s\n\n' "$REASON" >> "$BODY"
          fi
          if [ '${{ steps.audit.outputs.found }}' = 'true' ]; then
            printf '**Provider skill_calls** (`%s`):\n\n' '${{ steps.audit.outputs.path }}' >> "$BODY"
            printf '| Provider | Successful calls | Distinct queries |\n|---|---:|---:|\n' >> "$BODY"
            printf '| tavily-search | %s | %s |\n' '${{ steps.counts.outputs.tavily }}' '${{ steps.counts.outputs.tavily_q }}' >> "$BODY"
            printf '| arxiv-search | %s | %s |\n'  '${{ steps.counts.outputs.arxiv }}'  '${{ steps.counts.outputs.arxiv_q }}'  >> "$BODY"
            printf '| uspto-search | %s | %s |\n'  '${{ steps.counts.outputs.uspto }}'  '${{ steps.counts.outputs.uspto_q }}'  >> "$BODY"
            printf '| hackernews-search | %s | %s |\n' '${{ steps.counts.outputs.hn }}' '${{ steps.counts.outputs.hn_q }}' >> "$BODY"
            printf '| **Total** | **%s** | — |\n\n' '${{ steps.counts.outputs.total }}' >> "$BODY"
          fi
          printf '**Structural correctness** (`%s`):\n\n' '${{ steps.structure.outputs.doc_path }}' >> "$BODY"
          printf '| Check | Result |\n|---|---|\n' >> "$BODY"
          printf '| `research-doc.md` written | %s |\n' "$( [ '${{ steps.structure.outputs.doc_found }}' = 'true' ] && echo '✓' || echo '✗' )" >> "$BODY"
          printf '| 10 H2 sections | %s/10 |\n' '${{ steps.structure.outputs.h2_present }}' >> "$BODY"
          printf '| 4 H3 sub-sections | %s/4 |\n' '${{ steps.structure.outputs.h3_present }}' >> "$BODY"
          printf '| Formal Conclusions cite ≥1 S[N] | %s/%s |\n' '${{ steps.structure.outputs.conclusions_with_cites }}' '${{ steps.structure.outputs.conclusions }}' >> "$BODY"
          # Pocket Watch v2 row — contrastive rank/margin (ADVISORY, not gating).
          # status/rank/margin/own/nearest are enums+numbers (safe to inline);
          # the prose reason travels through env (POCKET_REASON).
          POCKET_STATUS='${{ steps.pocket.outputs.status }}'
          POCKET_RANK='${{ steps.pocket.outputs.rank }}'
          POCKET_MARGIN='${{ steps.pocket.outputs.margin }}'
          POCKET_OWN='${{ steps.pocket.outputs.own_score }}'
          POCKET_NEAREST='${{ steps.pocket.outputs.nearest_okr }}'
          POCKET_NEAREST_SCORE='${{ steps.pocket.outputs.nearest_score }}'
          POCKET_ABS='${{ steps.pocket.outputs.absolute_score }}'
          POCKET_REASON="${POCKET_REASON:-}"
          case "$POCKET_STATUS" in
            pass)         printf '| Pocket Watch alignment (advisory) | ✓ rank #%s, margin %s (own %s vs nearest %s %s) |\n' "$POCKET_RANK" "$POCKET_MARGIN" "$POCKET_OWN" "${POCKET_NEAREST:-n/a}" "$POCKET_NEAREST_SCORE" >> "$BODY" ;;
            needs_review) printf '| Pocket Watch alignment (advisory) | ⚠ rank #%s, margin %s — %s |\n' "$POCKET_RANK" "$POCKET_MARGIN" "${POCKET_REASON:-narrow margin / similar sibling}" >> "$BODY" ;;
            fail)         printf '| Pocket Watch alignment (advisory) | ✗ rank #%s — %s |\n' "$POCKET_RANK" "${POCKET_REASON:-another OKR matched better}" >> "$BODY" ;;
            skipped)      printf '| Pocket Watch alignment (advisory) | — skipped (`%s`) — does NOT block research-pass |\n' "${POCKET_REASON:-no reason}" >> "$BODY" ;;
            *)            printf '| Pocket Watch alignment (advisory) | `%s` |\n' "$POCKET_STATUS" >> "$BODY" ;;
          esac
          if [ -n "$POCKET_ABS" ] && [ "$POCKET_STATUS" != "skipped" ]; then
            printf '| Pocket Watch absolute cosine | logged-only: %s (retired 0.65 threshold, no longer gates) |\n' "$POCKET_ABS" >> "$BODY"
          fi
          printf '| Hatter Tag `evidence_mode` | `%s` |\n' '${{ steps.ctx.outputs.evidence_mode }}' >> "$BODY"
          # Task #62 — Required skill_call manifest row.
          MANIFEST_OK_DISPLAY='${{ steps.manifest.outputs.ok }}'
          MANIFEST_MISSING_DISPLAY="${MANIFEST_MISSING_DISPLAY:-}"
          case "$MANIFEST_OK_DISPLAY" in
            true)  printf '| Required skill_call manifest | ✓ all 10 required skills invoked |\n' >> "$BODY" ;;
            false) printf '| Required skill_call manifest | ✗ incomplete — missing: %s |\n' "$(echo "$MANIFEST_MISSING_DISPLAY" | tr '\n' ',' | sed 's/,$//' | sed 's/,/, /g')" >> "$BODY" ;;
            *)     printf '| Required skill_call manifest | — n/a (no chain) |\n' >> "$BODY" ;;
          esac
          QUERY_PLAN_OK_DISPLAY='${{ steps.query_plan.outputs.ok }}'
          QUERY_PLAN_BAD_DISPLAY="${QUERY_PLAN_BAD_DISPLAY:-}"
          case "$QUERY_PLAN_OK_DISPLAY" in
            true)  printf '| Provider query-plan shape | ✓ Tavily / arXiv / USPTO / HN query shapes valid |\n' >> "$BODY" ;;
            false) printf '| Provider query-plan shape | ✗ bad queries: %s |\n' "$(echo "$QUERY_PLAN_BAD_DISPLAY" | tr '\n' ',' | sed 's/,$//' | sed 's/,/, /g')" >> "$BODY" ;;
            *)     printf '| Provider query-plan shape | — n/a (no chain) |\n' >> "$BODY" ;;
          esac
          # Knight's Seal v1 (B27): per-run Ed25519 sealing.
          SEALED='${{ steps.chain.outputs.sealed }}'
          case "$SEALED" in
            true)  printf "| Knight's Seal (Ed25519) | ✓ Sealed |\n\n" >> "$BODY" ;;
            false) printf "| Knight's Seal (Ed25519) | ✗ Unsealed — no signed agent events (Bug T contract: every agent event must sign) |\n\n" >> "$BODY" ;;
            *)    printf "| Knight's Seal (Ed25519) | — n/a (no chain) |\n\n" >> "$BODY" ;;
          esac
          printf '_market-research-agent.yml · run `%s`_\n' '${{ github.run_id }}' >> "$BODY"

          BODY_CONTENT=$(cat "$BODY")
          EXISTING=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" --jq '.[] | select(.body | startswith("<!-- market-research-agent-audit -->")) | .id' | head -1)
          if [ -n "$EXISTING" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/$EXISTING" -f body="$BODY_CONTENT" >/dev/null
          else
            # --repo is REQUIRED here — under pull_request_target with
            # persist-credentials:false the gh CLI can't auto-detect repo
            # context from the checkout's .git/config. Observed on PR #85
            # run 26180609548: "GraphQL: Could not resolve to a Repository".
            gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body "$BODY_CONTENT"
          fi

      - name: Apply research-pass on clean verdict
        if: >-
          steps.gate.outputs.skip != 'true' &&
          steps.verdict.outputs.verdict == 'ok' &&
          !contains(github.event.pull_request.labels.*.name, 'research-pass')
        run: |
          # Self-heal: `gh pr edit --add-label` requires the label to
          # exist on the repo. If Looking Glass's provisionMeshLabels
          # never ran (or skipped this one), create it inline. `gh label
          # create` exits 0 even if the label already exists, so this is
          # idempotent — we don't need the `|| true` dance.
          gh label create research-pass \
            --repo ${{ github.repository }} \
            --color 43A047 \
            --description "WHY-phase research doc passed the audit gate. Merge unlocked (subject to branch protection)." 2>/dev/null || true
          gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --add-label research-pass

      - name: Apply specific failure labels based on failure kind
        if: steps.gate.outputs.skip != 'true' && steps.verdict.outputs.verdict == 'degraded'
        run: |
          # Apply ONLY the label(s) matching the specific failure kind.
          # Prior behavior — applying degraded-evidence on ANY degraded
          # verdict — was misleading: a drift-only failure ended up
          # labeled "Hatter Tag declared live but 0 skill_calls" even
          # when skill_calls were healthy. Now each label maps to its
          # actual cause.
          # Bug GG-followup — state-integrity-failed applied FIRST so it
          # surfaces as the primary label when the agent edited okr.yaml.
          if [ "${{ steps.verdict.outputs.state_fail }}" = "true" ]; then
            gh label create state-integrity-failed --repo ${{ github.repository }} --color AD1457 --description "Agent PR modified okrs/<id>/okr.yaml. OKR state is owned by Looking Glass dispatch/reset and finalize-okr-action, not the agent (Bug GG-followup). Merge blocked." 2>/dev/null || true
            gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --add-label state-integrity-failed || true
          fi
          if [ "${{ steps.verdict.outputs.chain_fail }}" = "true" ]; then
            # Bug CC — renamed from chain-forgery-detected. The
            # "forgery" framing falsely implied malicious intent for
            # honest mistakes (Bug AA's chain_root_hash YAML-placement
            # error). chain-integrity-failed covers the same set of
            # causes (chain verification / Knight's Seal / chain_root_
            # hash / unsealed-gate / forged artifact_written) without
            # the accusation. The audit comment carries the specific
            # reason via parseAuditCommentReason.
            gh label create chain-integrity-failed --repo ${{ github.repository }} --color B71C1C --description "Audit JSONL chain failed verification (hash chain / Knight's Seal / chain_root_hash / unsealed / forged artifact_written). See audit comment Reason. Merge blocked." 2>/dev/null || true
            gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --add-label chain-integrity-failed || true
          fi
          if [ "${{ steps.verdict.outputs.evidence_fail }}" = "true" ]; then
            gh label create degraded-evidence --repo ${{ github.repository }} --color D32F2F --description "Hatter Tag evidence_mode contradicts the audit log. Blocks the pass label." 2>/dev/null || true
            gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --add-label degraded-evidence || true
          fi
          if [ "${{ steps.verdict.outputs.structure_fail }}" = "true" ]; then
            gh label create structure-invalid --repo ${{ github.repository }} --color D32F2F --description "Artifact missing required sections / citations. Blocks the pass label." 2>/dev/null || true
            gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --add-label structure-invalid || true
          fi
          if [ "${{ steps.verdict.outputs.drift_fail }}" = "true" ]; then
            gh label create goal-drift-detected --repo ${{ github.repository }} --color D32F2F --description "Pocket Watch — objective drift (cosine below threshold). Merge blocked." 2>/dev/null || true
            gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --add-label goal-drift-detected || true
          fi

      - name: Remove stale labels when verdict flips to ok
        if: >-
          steps.gate.outputs.skip != 'true' &&
          steps.verdict.outputs.verdict == 'ok'
        run: |
          # Bug CC — remove both new chain-integrity-failed AND legacy
          # chain-forgery-detected (old PRs may carry the old name).
          # Bug GG-followup — also remove state-integrity-failed when
          # the agent reverts the okr.yaml edit and verdict flips.
          gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --remove-label state-integrity-failed 2>/dev/null || true
          gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --remove-label chain-integrity-failed 2>/dev/null || true
          gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --remove-label chain-forgery-detected 2>/dev/null || true
          gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --remove-label degraded-evidence 2>/dev/null || true
          gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --remove-label structure-invalid 2>/dev/null || true
          gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --remove-label goal-drift-detected 2>/dev/null || true

  # ════════════════════════════════════════════════════════════════════
  # JOB 3 — Finalize on PR merge: emit run_complete + flip action status
  # ════════════════════════════════════════════════════════════════════
  finalize:
    name: "Finalize WHY action on PR merge"
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'research-synthesis') &&
      github.event.pull_request.base.repo.full_name == github.event.pull_request.head.repo.full_name
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract OKR context
        id: ctx
        uses: ./.github/actions/extract-okr-context
        with:
          pr-number: ${{ github.event.pull_request.number }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # ── Oracle & Privacy Rails — WHY finalize OWNS rail execution ──────────
      # This job re-runs the trusted rail over the MERGED WHY bytes and writes
      # the durable report; the shared finalize action only RECORDS the
      # rail_decision pointer (generic recorder, never a rail runner). On the
      # main checkout the rail scripts are trusted (not PR head), so they run
      # in place — no gh-api fetch needed.
      - name: Setup Python (Oracle PII rail — finalize)
        if: steps.ctx.outputs.okr_id != '' && steps.ctx.outputs.run_id != ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache Oracle PII rail deps (pip)
        if: steps.ctx.outputs.okr_id != '' && steps.ctx.outputs.run_id != ''
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: oracle-pii-rail-presidio-2.2.362-spacy-3.8.14-${{ runner.os }}

      - name: Produce durable Oracle PII rail report
        id: pii-rail-finalize
        if: steps.ctx.outputs.okr_id != '' && steps.ctx.outputs.run_id != ''
        env:
          OKR_ID: ${{ steps.ctx.outputs.okr_id }}
          RUN_ID: ${{ steps.ctx.outputs.run_id }}
          DOC_PATH: okrs/${{ steps.ctx.outputs.okr_id }}/why/research-doc.md
          REGISTRY_PATH: okrs/${{ steps.ctx.outputs.okr_id }}/audit/sources/${{ steps.ctx.outputs.run_id }}.source-registry.json
        run: |
          set -uo pipefail
          SCRIPTS=".github/workflows/scripts/oracle-rails"
          if [ ! -f "$SCRIPTS/oracle_rail.py" ]; then
            echo "::error::Oracle PII rail helpers missing on main ($SCRIPTS) — redeploy mesh workflows from Looking Glass."
            exit 1
          fi
          if [ ! -f "$DOC_PATH" ]; then
            echo "::notice::no research-doc.md at $DOC_PATH — nothing to record"
            echo "report_path=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python3 -m pip install --disable-pip-version-check -r "$SCRIPTS/requirements.txt"
          # Config: mesh override if committed, else the bundled default
          # (both live on the trusted main checkout). config_sha256 pins it.
          CONFIG="$SCRIPTS/pii.json"
          if [ -f ".caterpillar/guardrails/oracle/pii.json" ]; then CONFIG=".caterpillar/guardrails/oracle/pii.json"; fi
          REPORT="okrs/${OKR_ID}/audit/rails/${RUN_ID}.rail-report.json"
          INPUTS=("$DOC_PATH")
          if [ -f "$REGISTRY_PATH" ]; then INPUTS+=("$REGISTRY_PATH"); fi
          set +e
          python3 "$SCRIPTS/oracle_rail.py" run \
            --config "$CONFIG" --report "$REPORT" \
            --inputs "${INPUTS[@]}" \
            --okr-id "$OKR_ID" --run-id "$RUN_ID" --phase why
          CODE=$?
          set -e
          # Phase 2: finalize REQUIRES a pass. The PR-audit gate already blocks
          # block/needs_review pre-merge, so a merged run should be clean — a
          # non-pass here means a bypass/override or a policy/model change.
          # Fail finalize rather than complete the phase with a non-pass (or
          # un-recordable) rail. (0=pass, 2=blocked, 3=needs_review, 5=not-invoked.)
          if [ "$CODE" -ne 0 ] || [ ! -f "$REPORT" ]; then
            echo "::error::Oracle PII rail did not PASS at finalize (exit $CODE) — finalize aborts. The PR-audit gate should have blocked any non-pass pre-merge; investigate the bypass/override or policy/model change before finalizing."
            exit 1
          fi
          echo "report_path=$REPORT" >> "$GITHUB_OUTPUT"
          echo "::notice::Oracle PII rail PASS at finalize — report written to $REPORT"

      - name: Produce durable Oracle injection rail report
        id: inject-rail-finalize
        if: steps.ctx.outputs.okr_id != '' && steps.ctx.outputs.run_id != ''
        env:
          OKR_ID: ${{ steps.ctx.outputs.okr_id }}
          RUN_ID: ${{ steps.ctx.outputs.run_id }}
          REGISTRY_PATH: okrs/${{ steps.ctx.outputs.okr_id }}/audit/sources/${{ steps.ctx.outputs.run_id }}.source-registry.json
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -uo pipefail
          SCRIPTS=".github/workflows/scripts/oracle-rails"
          # No untrusted snippet surface → no injection report (no-op; the PII
          # report still finalizes). The finalize recorder simply skips a path
          # that does not exist on disk.
          if [ ! -f "$REGISTRY_PATH" ]; then
            echo "::notice::no source registry at $REGISTRY_PATH — no injection evidence to record"
            echo "report_path=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ ! -f "$SCRIPTS/inject_check.py" ]; then
            echo "::error::Oracle injection rail helpers missing on main ($SCRIPTS) — redeploy mesh workflows from Looking Glass."
            exit 1
          fi
          python3 -m pip install --disable-pip-version-check -r "$SCRIPTS/requirements.txt"
          CONFIG="$SCRIPTS/injection.json"
          if [ -f ".caterpillar/guardrails/oracle/injection.json" ]; then CONFIG=".caterpillar/guardrails/oracle/injection.json"; fi
          # ADVISORY until model pinned + certified — see PR-gate step. When
          # advisory, a non-pass does NOT abort finalize; the report is still
          # written + recorded so the rollup shows the rail honestly.
          ADVISORY=$(python3 -c "import json,sys; c=json.load(open(sys.argv[1])); print('false' if (c.get('model_revision') and c.get('require_pinned_revision', True)) else 'true')" "$CONFIG" 2>/dev/null || echo "true")
          REPORT="okrs/${OKR_ID}/audit/rails/${RUN_ID}.injection.rail-report.json"
          set +e
          python3 "$SCRIPTS/inject_check.py" run \
            --config "$CONFIG" --report "$REPORT" \
            --inputs "$REGISTRY_PATH" \
            --okr-id "$OKR_ID" --run-id "$RUN_ID" --phase why
          CODE=$?
          set -e
          # Same finalize contract as the PR gate: blocked/not-invoked are fatal
          # when the rail is required; needs_review may be advisory (exit 0 under
          # the default config). No report on disk is always fatal (we cannot
          # record what we did not produce).
          if [ ! -f "$REPORT" ]; then
            echo "::error::Oracle injection rail produced no report (exit $CODE) — finalize aborts; cannot record a rail that did not run."
            exit 1
          fi
          if [ "$CODE" -ne 0 ]; then
            if [ "$ADVISORY" = "true" ]; then
              echo "::warning::Oracle injection rail non-pass (exit $CODE) but ADVISORY — recording the report; not aborting finalize."
            else
              echo "::error::Oracle injection rail did not PASS at finalize (exit $CODE) — finalize aborts. Investigate a bypass/override or policy/model change before finalizing."
              exit 1
            fi
          fi
          echo "report_path=$REPORT" >> "$GITHUB_OUTPUT"
          echo "::notice::Oracle injection rail finalize (exit $CODE, advisory=$ADVISORY) — report written to $REPORT"

      - name: Produce durable Oracle groundedness rail report
        id: grounded-rail-finalize
        if: steps.ctx.outputs.okr_id != '' && steps.ctx.outputs.run_id != ''
        env:
          OKR_ID: ${{ steps.ctx.outputs.okr_id }}
          RUN_ID: ${{ steps.ctx.outputs.run_id }}
          DOC_PATH: okrs/${{ steps.ctx.outputs.okr_id }}/why/research-doc.md
          REGISTRY_PATH: okrs/${{ steps.ctx.outputs.okr_id }}/audit/sources/${{ steps.ctx.outputs.run_id }}.source-registry.json
          SC_PATH: okrs/${{ steps.ctx.outputs.okr_id }}/why/${{ steps.ctx.outputs.run_id }}.support-claims.json
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -uo pipefail
          SCRIPTS=".github/workflows/scripts/oracle-rails"
          # Needs both doc + registry; absent either → no-op (no report to record).
          if [ ! -f "$DOC_PATH" ] || [ ! -f "$REGISTRY_PATH" ]; then
            echo "::notice::no doc/registry pair — no groundedness evidence to record"
            echo "report_path=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ ! -f "$SCRIPTS/groundedness.py" ]; then
            echo "::error::Oracle groundedness rail helpers missing on main ($SCRIPTS) — redeploy mesh workflows from Looking Glass."
            exit 1
          fi
          python3 -m pip install --disable-pip-version-check -r "$SCRIPTS/requirements.txt"
          CONFIG="$SCRIPTS/groundedness.json"
          if [ -f ".caterpillar/guardrails/oracle/groundedness.json" ]; then CONFIG=".caterpillar/guardrails/oracle/groundedness.json"; fi
          ADVISORY=$(python3 -c "import json,sys; c=json.load(open(sys.argv[1])); print('false' if (c.get('model_revision') and c.get('require_pinned_revision', True) and c.get('block_on_contradiction', True)) else 'true')" "$CONFIG" 2>/dev/null || echo "true")
          REPORT="okrs/${OKR_ID}/audit/rails/${RUN_ID}.groundedness.rail-report.json"
          # Phase 4.1: include the support-claims sidecar when present (atomic
          # claim scoring); fall back to whole-conclusion when absent.
          INPUTS=("$DOC_PATH" "$REGISTRY_PATH")
          if [ -f "$SC_PATH" ]; then INPUTS+=("$SC_PATH"); fi
          set +e
          python3 "$SCRIPTS/groundedness.py" run \
            --config "$CONFIG" --report "$REPORT" \
            --inputs "${INPUTS[@]}" \
            --okr-id "$OKR_ID" --run-id "$RUN_ID" --phase why
          CODE=$?
          set -e
          if [ ! -f "$REPORT" ]; then
            echo "::error::Oracle groundedness rail produced no report (exit $CODE) — finalize aborts; cannot record a rail that did not run."
            exit 1
          fi
          if [ "$CODE" -ne 0 ]; then
            if [ "$ADVISORY" = "true" ]; then
              echo "::warning::Oracle groundedness rail non-pass (exit $CODE) but ADVISORY — recording the report; not aborting finalize."
            else
              echo "::error::Oracle groundedness rail did not PASS at finalize (exit $CODE) — finalize aborts. Investigate a bypass/override or policy/model change before finalizing."
              exit 1
            fi
          fi
          echo "report_path=$REPORT" >> "$GITHUB_OUTPUT"
          echo "::notice::Oracle groundedness rail finalize (exit $CODE, advisory=$ADVISORY) — report written to $REPORT"

      # Refactor 3c — delegate to the canonical finalize composite action.
      # PHASE SPEC — see vscode-extension/src/types/phaseSpec.ts.
      # If you rename a label / agent / phase here, update phaseSpec.ts too.
      - name: Finalize OKR action
        if: steps.ctx.outputs.okr_id != '' && steps.ctx.outputs.run_id != ''
        uses: ./.github/actions/finalize-okr-action
        with:
          phase: why
          okr-id: ${{ steps.ctx.outputs.okr_id }}
          run-id: ${{ steps.ctx.outputs.run_id }}
          chain-root-hash: ${{ steps.ctx.outputs.chain_root_hash }}
          current-meta-status: researching
          next-meta-status: prd-pending
          # WHY is the first phase — parent_intent_thread falls back to
          # the OKR's root thread (composite handles empty prior-phase).
          prior-phase: ""
          pr-number: ${{ github.event.pull_request.number }}
          pr-merge-commit-sha: ${{ github.event.pull_request.merge_commit_sha }}
          # Bug Z: finalize is the durable workflow-event writer. Pass
          # the phase artifact path so finalize can hash + append
          # artifact_written with idempotency + verify-before-commit.
          artifact-path: okrs/${{ steps.ctx.outputs.okr_id }}/why/research-doc.md
          # Oracle & Privacy Rails: hand the durable rail report(s) this WHY job
          # just produced to the generic recorder, which emits one unsigned
          # workflow-origin rail_decision pointer per report (empty → no-op).
          # PII via the single-path input (back-compat); injection + groundedness
          # via the multi-path input (newline-separated; the recorder splits on
          # newlines, de-duplicates, and skips empty/absent paths).
          rail-report-path: ${{ steps.pii-rail-finalize.outputs.report_path }}
          rail-report-paths: |
            ${{ steps.inject-rail-finalize.outputs.report_path }}
            ${{ steps.grounded-rail-finalize.outputs.report_path }}

      # ── Oracle & Privacy Rails — trigger the model-replay leg ──────────────
      # The finalize action commits the durable rail-report.json to main with the
      # default GITHUB_TOKEN. GitHub will NOT auto-trigger oracle-rails-replay.yml
      # from that push (default-token pushes don't fire workflows — recursion
      # guard). workflow_dispatch is the explicit exception and runs with this
      # token, so we dispatch the replay explicitly. It re-runs the pinned model
      # over the committed report + cited bytes and records match / replay-
      # mismatch / not-invoked — the authoritative third leg of "replay, not sign".
      - name: Dispatch Oracle rails model-replay
        if: steps.pii-rail-finalize.outputs.report_path != '' || steps.inject-rail-finalize.outputs.report_path != '' || steps.grounded-rail-finalize.outputs.report_path != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          # Best-effort: a missing/again-renamed replay workflow must not fail an
          # otherwise-complete finalize. The replay's own push trigger + manual
          # dispatch remain as fallbacks.
          if gh workflow run oracle-rails-replay.yml --repo "${{ github.repository }}" --ref main; then
            echo "::notice::dispatched oracle-rails-replay.yml (model replay) on main"
          else
            echo "::warning::could not dispatch oracle-rails-replay.yml — run it manually (Actions → Oracle Rails — model replay → Run workflow) to record the replay verdict"
          fi
