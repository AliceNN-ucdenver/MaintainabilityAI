name: "Design Bus — per-repo fan-out on code-design merge"

# Fires when a code-design PR merges with governance-pass. Reads the
# OKR's `target_code_repos[]`, opens one `oraculum-design-landing` issue
# per target code repo with OKR + PRD + code-design context inlined.
# From there each target repo's coding agent picks up the slice.
#
# Per §9: "design-bus.yml fans out per target_code_repos[]". This is a
# pure orchestration workflow — no LLM call, no code generation. Each
# spawned issue carries the canonical HTML-comment markers (okr_id,
# intent_thread_uuid, parent_intent_thread, run_id) so each per-repo
# coding-agent run continues the audit chain.
#
# Cross-repo write requires the workflow to have a token with `issues:
# write` on the target repos. Phase B+ uses Queen's Keyring per-task
# tokens (B15) — until that ships, the workflow uses `secrets.GH_TOKEN_FANOUT`
# (a fine-grained PAT scoped to the target repos), falling back to
# `${{ secrets.GITHUB_TOKEN }}` for same-org repos where workflow tokens
# can cross-repo.
#
# Phase tracking: §13 C3.

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: design-bus-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  fanout:
    name: "Fan out per target_code_repos[]"
    if: >-
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'design-draft') &&
      contains(github.event.pull_request.labels.*.name, 'governance-pass')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN_FANOUT || secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout mesh repo
        uses: actions/checkout@v4

      - name: Extract okr_id + run_id from PR body Hatter Tag
        id: ctx
        run: |
          BODY=$(gh pr view ${{ github.event.pull_request.number }} --json body --jq .body --repo ${{ github.repository }})
          OKR_ID=$(printf '%s' "$BODY" | grep -oE 'okr_id:\s*[A-Za-z0-9._-]+' | head -1 | sed -E 's/^okr_id:\s*//')
          RUN_ID=$(printf '%s' "$BODY" | grep -oE 'run_id:\s*[A-Za-z0-9._-]+' | head -1 | sed -E 's/^run_id:\s*//')
          INTENT_THREAD=$(printf '%s' "$BODY" | grep -oE 'intent_thread_uuid:\s*[A-Za-z0-9-]+' | head -1 | sed -E 's/^intent_thread_uuid:\s*//')
          if [ -z "$OKR_ID" ]; then
            echo "::error::No okr_id in PR body — cannot fan out"
            exit 1
          fi
          echo "okr_id=$OKR_ID" >> "$GITHUB_OUTPUT"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "intent_thread=$INTENT_THREAD" >> "$GITHUB_OUTPUT"
          echo "pr_url=${{ github.event.pull_request.html_url }}" >> "$GITHUB_OUTPUT"
          echo "objective=$(yq '.objective.name' okrs/$OKR_ID/okr.yaml)" >> "$GITHUB_OUTPUT"

      - name: Read target_code_repos[] from okr.yaml
        id: repos
        run: |
          OKR_FILE="okrs/${{ steps.ctx.outputs.okr_id }}/okr.yaml"
          if [ ! -f "$OKR_FILE" ]; then
            echo "::error::$OKR_FILE not found"
            exit 1
          fi
          REPOS=$(yq -r '.objectiveAlignment.targetCodeRepos[]' "$OKR_FILE")
          if [ -z "$REPOS" ]; then
            echo "::warning::No targetCodeRepos in OKR — nothing to fan out to"
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Convert newline-separated list to space-separated for the loop.
          # Stash via heredoc + GITHUB_OUTPUT multi-line syntax.
          {
            echo "list<<EOF"
            echo "$REPOS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          COUNT=$(printf '%s\n' "$REPOS" | grep -c .)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Open one landing issue per target repo
        if: steps.repos.outputs.count != '0'
        env:
          OKR_ID: ${{ steps.ctx.outputs.okr_id }}
          INTENT_THREAD: ${{ steps.ctx.outputs.intent_thread }}
          DESIGN_PR_URL: ${{ steps.ctx.outputs.pr_url }}
          OBJECTIVE: ${{ steps.ctx.outputs.objective }}
          REPOS: ${{ steps.repos.outputs.list }}
        run: |
          # Use a heredoc body so the inlined OKR context is readable.
          # The HTML-comment markers carry the canonical anchors the
          # coding agent reads (§5.5.4).
          while IFS= read -r REPO_URL; do
            [ -z "$REPO_URL" ] && continue
            # Normalize org/repo from URL
            SLUG=$(echo "$REPO_URL" | sed -E 's|^https?://github\.com/||; s|/$||')
            if [ -z "$SLUG" ]; then
              echo "::warning::Skipping unparseable target: $REPO_URL"
              continue
            fi
            # Compose body with canonical markers + readable context.
            BODY=$(cat <<EOM
<!-- okr_id: ${OKR_ID} -->
<!-- phase: what -->
<!-- intent_thread_uuid: ${INTENT_THREAD} -->
<!-- parent_intent_thread: ${INTENT_THREAD} -->
<!-- design_pr_url: ${DESIGN_PR_URL} -->

## Code Design Landing — ${OBJECTIVE}

**Anchor OKR:** \`${OKR_ID}\`
**Merged code-design PR:** ${DESIGN_PR_URL}

This issue is the per-repo landing for the cross-cutting code-design merged
above. The coding agent in this repo picks up the slice that applies to
this repo's interface boundary.

To dispatch the coding agent: comment \`@copilot use agent design-agent\`
(or whichever coding-agent persona is registered in this repo's
\`.github/agents/\` directory).

_Auto-generated by \`design-bus.yml\` in the mesh repo on code-design merge._
EOM
)
            TITLE="[OKR] What landing: ${OBJECTIVE} → ${SLUG}"
            ISSUE_URL=$(gh issue create \
              --repo "$SLUG" \
              --title "$TITLE" \
              --body "$BODY" \
              --label "oraculum-design-landing,okr-anchor" 2>/dev/null || true)
            if [ -z "$ISSUE_URL" ]; then
              echo "::warning::Failed to open issue in $SLUG (permissions? repo missing? rate limit?)"
            else
              echo "::notice::Opened: $ISSUE_URL"
            fi
          done <<< "$REPOS"

      - name: Comment fanout summary on the design PR
        if: success() && steps.repos.outputs.count != '0'
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "**design-bus** fanned out **${{ steps.repos.outputs.count }}** landing issue(s) — one per \`target_code_repos[]\` entry. Each carries the OKR context + a link back to this code-design PR. Coding agents in each target repo pick up the slice from there."
