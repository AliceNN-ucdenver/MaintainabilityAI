name: "OKR Bus — agent dispatch on labeled issues"

# Fires on any `oraculum-*` phase label landing on an issue. Reads the
# canonical `<!-- okr_id: ... -->` HTML comment marker (§5.5.4) from the
# issue body, looks up the right agent for the phase, and posts the
# `@copilot use agent <name>` comment that triggers GitHub Copilot
# Coding Agent. Also updates the OKR card's top-level `status` field.
#
# Phase tracking: §13 C1. The legacy `oraculum-research.yml` /
# `prd.yml` workflows stay deployed alongside this one until Phase B is
# verified end-to-end (per the design doc's deprecation sequence in
# Settings → Mesh Provisioning).

on:
  issues:
    types: [labeled]

# Per-issue serialization so two simultaneous label adds (rare but
# possible during automated retries) don't race on the same okr.yaml.
concurrency:
  group: okr-bus-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  dispatch:
    name: "Dispatch agent for OKR phase"
    if: >-
      github.event.label.name == 'oraculum-research' ||
      github.event.label.name == 'oraculum-prd' ||
      github.event.label.name == 'oraculum-design'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      pull-requests: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout mesh repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so updates to okr.yaml can be committed back

      # Extract the okr_id from the body's HTML-comment marker. Per
      # §5.5.4 the marker is the source of truth; never parse human-
      # readable text. We treat a missing marker as a workflow failure
      # AND surface it as a comment so the human investigating sees why.
      - name: Extract okr_id marker
        id: parse
        env:
          BODY: ${{ github.event.issue.body }}
        run: |
          OKR_ID=$(printf '%s' "$BODY" | grep -oE '<!-- okr_id: [A-Za-z0-9._-]+ -->' | sed -E 's/<!-- okr_id: ([A-Za-z0-9._-]+) -->/\1/' | head -1)
          if [ -z "$OKR_ID" ]; then
            echo "::error::No <!-- okr_id: ... --> marker in issue body"
            gh issue comment ${{ github.event.issue.number }} \
              --body "**okr-bus**: could not locate \`<!-- okr_id: ... -->\` marker in the issue body. Agent not dispatched. Re-open the issue from Looking Glass → OKR detail → Start Why/How."
            exit 1
          fi
          echo "okr_id=$OKR_ID" >> "$GITHUB_OUTPUT"

      - name: Resolve agent name from label
        id: agent
        run: |
          case "${{ github.event.label.name }}" in
            oraculum-research) AGENT=market-research-agent; NEW_STATUS=researching ;;
            oraculum-prd)      AGENT=prd-agent;             NEW_STATUS=prd-pending ;;
            oraculum-design)   AGENT=code-design-agent;     NEW_STATUS=design-pending ;;
            *) echo "::error::Unexpected phase label"; exit 1 ;;
          esac
          echo "name=$AGENT" >> "$GITHUB_OUTPUT"
          echo "new_status=$NEW_STATUS" >> "$GITHUB_OUTPUT"

      # Defense-in-depth: refuse to dispatch an agent whose .agent.md
      # isn't on disk. AgentDeploymentService.deployAgents (B-PR2)
      # writes these files; this catches the "user clicked Start Why
      # without first deploying agents" footgun BEFORE we leave a
      # cryptic Copilot error in the issue.
      - name: Verify agent file is deployed
        run: |
          AGENT="${{ steps.agent.outputs.name }}"
          if [ ! -f ".github/agents/${AGENT}.agent.md" ]; then
            gh issue comment ${{ github.event.issue.number }} \
              --body "**okr-bus**: \`.github/agents/${AGENT}.agent.md\` is not deployed. Open Looking Glass → Settings → Phase B — Mesh Provisioning → \"Deploy Agents + Skills\" then re-trigger."
            echo "::error::Agent file ${AGENT}.agent.md not deployed"
            exit 1
          fi

      - name: Dispatch agent via Copilot mention
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "@copilot use agent ${{ steps.agent.outputs.name }}"

      # Status update is best-effort. If okr.yaml is missing on disk
      # (e.g. the OKR was created from another mesh checkout), log a
      # warning but don't fail — the dispatch itself already happened.
      - name: Update OKR status field
        if: success()
        run: |
          OKR_FILE="okrs/${{ steps.parse.outputs.okr_id }}/okr.yaml"
          NEW_STATUS="${{ steps.agent.outputs.new_status }}"
          if [ ! -f "$OKR_FILE" ]; then
            echo "::warning::$OKR_FILE not found — status not updated"
            exit 0
          fi
          CURRENT_STATUS=$(grep -E '^  status: ' "$OKR_FILE" | head -1 | sed -E 's/^  status: //')
          if [ "$CURRENT_STATUS" = "$NEW_STATUS" ]; then
            echo "::notice::OKR already in status=$NEW_STATUS; nothing to commit"
            exit 0
          fi
          sed -i.bak -E "s/^(  status: ).*/\1${NEW_STATUS}/" "$OKR_FILE"
          rm -f "${OKR_FILE}.bak"
          # Also bump updatedAt so the OKR list view picks up the change.
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          sed -i.bak -E "s|^(  updatedAt: ).*|\1${NOW}|" "$OKR_FILE"
          rm -f "${OKR_FILE}.bak"
          git config user.name "maintainabilityai-bot"
          git config user.email "noreply@maintainability.ai"
          git add "$OKR_FILE"
          git commit -m "chore(okr): ${{ steps.parse.outputs.okr_id }} status -> ${NEW_STATUS}

Auto-update by okr-bus.yml on phase label add (issue #${{ github.event.issue.number }}).
Phase tracking: agentic-sdlc §13 C1."
          git push

      - name: Comment dispatch confirmation on the issue
        if: success()
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "**okr-bus** dispatched \`${{ steps.agent.outputs.name }}\` for OKR \`${{ steps.parse.outputs.okr_id }}\`. OKR status → \`${{ steps.agent.outputs.new_status }}\`. The agent will open a PR; \`reviewer-bus.yml\` will auto-fire reviewers on PR open."
