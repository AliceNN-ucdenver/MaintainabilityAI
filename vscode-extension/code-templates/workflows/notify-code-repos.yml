name: "Notify Code Repos (open PRD landing-issue)"

# When a PRD PR in the mesh is labeled `spec-ready`, this workflow opens an
# issue in each target code repo containing the full PRD markdown + manifest
# JSON so engineers can read the spec without leaving GitHub. Assignment
# happens manually through the Looking Glass Rabbit Hole flow afterward.
#
# This replaces an earlier design that fired `repository_dispatch` events
# at each code repo and required a `spec-ready-handler.yml` workflow on the
# code-repo side. That older design needed `Contents:write` on every code
# repo and a second workflow surface; the current design needs only
# `Issues:write` (much narrower scope) and zero workflow files on the
# code repo side.
#
# Required mesh repo secret:
#   GOVERNANCE_MESH_TOKEN — fine-grained PAT with `Issues: write` on every
#                            linked code repo. Mint via Looking Glass →
#                            Settings → Research → Create.

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      prd_path:
        required: true
        description: "Path to the published PRD doc (e.g. platforms/imdb-lite/bars/APP-IMDB-002/prds/celeb-following-2026-05.md)"
      target_repos:
        required: true
        description: "Comma-separated owner/repo list (e.g. AliceN-ucdenver/celeb-api,AliceN-ucdenver/celeb-web)"

permissions:
  contents: read
  pull-requests: read

jobs:
  notify:
    if: |
      (github.event_name == 'pull_request' && github.event.label.name == 'spec-ready') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mesh repo
        uses: actions/checkout@v4

      - name: Load PRD markdown + manifest, resolve target repos
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const evt = context.eventName;

            let prd_path = '';
            let target_repos = [];
            let prd_pr_url = '';
            let prd_pr_number = '';

            if (evt === 'workflow_dispatch') {
              prd_path = context.payload.inputs.prd_path;
              target_repos = context.payload.inputs.target_repos.split(',').map(s => s.trim()).filter(Boolean);
            } else {
              const pr = context.payload.pull_request;
              prd_pr_url = pr.html_url;
              prd_pr_number = String(pr.number);
              const filesResp = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100,
              });
              const manifestFile = filesResp.data.find(f => f.filename.endsWith('.manifest.json'));
              if (!manifestFile) {
                core.setFailed('No .manifest.json file found in PRD PR — cannot resolve target repos.');
                return;
              }
              const raw = fs.readFileSync(manifestFile.filename, 'utf8');
              const parsed = JSON.parse(raw);
              target_repos = (parsed.target_repos || []).map(String);
              prd_path = manifestFile.filename.replace(/\.manifest\.json$/, '.md');
            }

            const manifestPath = prd_path.replace(/\.md$/, '.manifest.json');
            const manifestRaw = fs.readFileSync(manifestPath, 'utf8');
            const manifest = JSON.parse(manifestRaw);

            // The PRD markdown is the human-readable spec; embed verbatim.
            const prdMarkdown = fs.existsSync(prd_path) ? fs.readFileSync(prd_path, 'utf8') : '';

            core.setOutput('prd_path', prd_path);
            core.setOutput('prd_pr_url', prd_pr_url);
            core.setOutput('prd_pr_number', prd_pr_number);
            core.setOutput('target_repos', JSON.stringify(target_repos));
            core.setOutput('run_id', manifest.run_id || '');
            core.setOutput('prd_topic', manifest.prd_topic || 'PRD');
            core.setOutput('manifest_json', JSON.stringify(manifest, null, 2));
            core.setOutput('prd_markdown', prdMarkdown);

      - name: Open landing-issue in each target code repo
        if: success()
        env:
          GOVERNANCE_MESH_TOKEN: ${{ secrets.GOVERNANCE_MESH_TOKEN }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GOVERNANCE_MESH_TOKEN }}
          script: |
            const target_repos = JSON.parse(`${{ steps.resolve.outputs.target_repos }}`);
            const prd_path = `${{ steps.resolve.outputs.prd_path }}`;
            const prd_pr_url = `${{ steps.resolve.outputs.prd_pr_url }}`;
            const run_id = `${{ steps.resolve.outputs.run_id }}`;
            const prd_topic = `${{ steps.resolve.outputs.prd_topic }}`;
            const meshRepo = `${context.repo.owner}/${context.repo.repo}`;

            // Issue body — manifest JSON, then full PRD markdown, then a
            // footer pointing at the Rabbit Hole / IssueCreatorPanel for
            // assignment. Audit pointers (run_id, mesh sha, source PR) at
            // the top so a `gh search issues "derived_from_prd_run_id:..."`
            // joins the chain across repos.
            const body = [
              `## Source`,
              ``,
              prd_pr_url ? `- **PRD PR**: ${prd_pr_url}` : `- **PRD path**: \`${prd_path}\` (mesh repo \`${meshRepo}\`)`,
              `- **Mesh repo**: ${meshRepo}`,
              `- **derived_from_prd**: ${prd_pr_url || `https://github.com/${meshRepo}/blob/main/${prd_path}`}`,
              `- **derived_from_prd_run_id**: \`${run_id}\``,
              ``,
              `## PRD Manifest`,
              ``,
              '```json',
              `${{ steps.resolve.outputs.manifest_json }}`,
              '```',
              ``,
              `## PRD Document`,
              ``,
              `${{ steps.resolve.outputs.prd_markdown }}`,
              ``,
              `---`,
              ``,
              `### Next step`,
              ``,
              `Open this in the **MaintainabilityAI Looking Glass → Rabbit Hole** flow to convert into an RCTRO-formatted implementation assignment with prompt packs.`,
              ``,
              `Or comment \`@claude please implement\` directly to invoke the existing alice-remediation.yml workflow against the manifest above.`,
            ].join('\n');

            const title = `Implement PRD: ${prd_topic}`.slice(0, 200);

            for (const slug of target_repos) {
              const [owner, repo] = slug.split('/');
              if (!owner || !repo) {
                core.warning(`Skipping malformed target repo: ${slug}`);
                continue;
              }
              try {
                // Idempotency: search for an existing open issue containing
                // this run_id before creating a duplicate. A re-merge of
                // the same PRD PR (or a manual workflow_dispatch with the
                // same path) should comment, not duplicate.
                const search = await github.rest.search.issuesAndPullRequests({
                  q: `repo:${slug} is:issue is:open in:body "${run_id}"`,
                  per_page: 5,
                });
                const existing = search.data.items.find(i => i.body && i.body.includes(run_id));
                if (existing) {
                  await github.rest.issues.createComment({
                    owner, repo,
                    issue_number: existing.number,
                    body: `Received another spec-ready signal for the same PRD run_id \`${run_id}\` — no duplicate issue opened. Original landing-issue still tracks this PRD.`,
                  });
                  core.info(`Skipped duplicate for ${slug} (existing issue #${existing.number}).`);
                  continue;
                }

                const created = await github.rest.issues.create({
                  owner, repo,
                  title,
                  body,
                  labels: ['prd-landing', 'spec-ready'],
                });
                core.info(`Opened landing-issue ${slug}#${created.data.number}: ${created.data.html_url}`);
              } catch (err) {
                core.warning(`Failed to open landing-issue in ${slug}: ${err.message}`);
              }
            }
