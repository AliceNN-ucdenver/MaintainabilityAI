name: "PR Auto-Label — apply artifact-phase labels by file path"

# Server-side label application for artifact PRs. The agent's prompt
# asks it to apply `research-synthesis` / `prd-draft` / `design-draft`
# when it opens the PR, but that step is easy to skip (the agent did
# skip it on the first agentic-SDLC live-evidence run — PR #73 on the
# IMDB-Lite mesh opened with zero labels, blocking the audit-validate
# gate from firing).
#
# This workflow inspects the changed files on every PR event and
# applies the matching label deterministically. Cannot be bypassed by
# the agent; also works for human-authored PRs.
#
# Path → label mapping (anchored so per-run dirs like
# `okrs/<id>/why/runs/<run-id>/research-doc.md` don't trigger by
# accident — the canonical merged doc is the labeling target):
#
#   okrs/<id>/why/research-doc.md     → research-synthesis
#   okrs/<id>/how/prd.md              → prd-draft
#   okrs/<id>/what/code-design.md     → design-draft
#
# Idempotent: `gh pr edit --add-label` is a no-op when the label is
# already present. Re-fires on `synchronize` so re-pushes that add the
# artifact file gain the label.
#
# Phase tracking: §13 B-PR1f.

on:
  # pull_request_target (not pull_request) so workflows aren't blocked by
  # the "Require approval for first-time contributors" Actions policy that
  # treats `copilot-swe-agent[bot]` as an outside collaborator. The fix
  # closes the gap we hit on PR #75 where pr-auto-label ran for 0s with
  # `conclusion: action_required` and never applied the label.
  #
  # SAFETY: pull_request_target runs the workflow as-defined on the BASE
  # branch (not the PR head), so a malicious PR cannot modify this
  # workflow's logic. We never execute code FROM the PR — we only call
  # the GitHub API (`gh pr diff --name-only`) to read the file paths the
  # PR touches. No checkout, no eval, no sourcing PR-supplied scripts.
  pull_request_target:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-auto-label-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  pull-requests: write
  contents: read

jobs:
  apply-labels:
    # Same-repo PRs only. Fork PRs would still be in scope under
    # pull_request_target but our agentic-SDLC use case only opens
    # branches in the same repo (Copilot's `copilot/...` branches).
    # Skipping fork PRs avoids any future ambiguity about untrusted refs.
    if: github.event.pull_request.base.repo.full_name == github.event.pull_request.head.repo.full_name
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Detect artifact paths + apply labels
        run: |
          PR=${{ github.event.pull_request.number }}
          # gh pr diff --name-only returns one path per line.
          PATHS=$(gh pr diff "$PR" --name-only)
          echo "Changed files in PR #$PR:"
          echo "$PATHS"
          echo ""

          to_apply=()
          # Anchor each regex so we don't match per-run subdirectories.
          if echo "$PATHS" | grep -qE '^okrs/[^/]+/why/research-doc\.md$'; then
            to_apply+=("research-synthesis")
          fi
          if echo "$PATHS" | grep -qE '^okrs/[^/]+/how/prd\.md$'; then
            to_apply+=("prd-draft")
          fi
          if echo "$PATHS" | grep -qE '^okrs/[^/]+/what/code-design\.md$'; then
            to_apply+=("design-draft")
          fi

          if [ ${#to_apply[@]} -eq 0 ]; then
            echo "::notice::No artifact paths matched; no labels applied."
            exit 0
          fi

          # gh pr edit accepts repeated --add-label flags or comma-separated values.
          for lbl in "${to_apply[@]}"; do
            echo "::notice::Applying label: $lbl"
            gh pr edit "$PR" --add-label "$lbl"
          done
