name: "PRD Agent"

# The PRD Agent runs the PRD pipeline on top of a published research doc:
#   gather_mesh_context -> ask_experts (optional) -> synthesize_prd ->
#   [architecture_review + security_review] (parallel) -> verify_grounding ->
#   (loop on FAIL until threshold met or max_iterations) -> generate_manifest -> publish
#
# Inputs come from a merged research PR, a prd-request label, or workflow_dispatch.
#
# Prompt packs read by the runner (from this mesh repo):
#   .caterpillar/prompts/prd/synthesis.md
#   .caterpillar/prompts/prd/ask-experts.md
#   .caterpillar/prompts/prd/architecture-review.md
#   .caterpillar/prompts/prd/security-review.md

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      research_pr:
        required: false
        description: "URL of merged research PR (or path to research doc in this repo)"
      scope_level:
        type: choice
        options: [portfolio, platform, bar]
        default: bar
      scope_id:
        required: false
        description: "BAR id or platform slug"
      mode:
        type: choice
        description: "PRD mode: shallow (no ask_experts) or deep"
        options: [shallow, deep]
        default: deep
      grounding:
        type: choice
        description: "Grounding mode"
        options: [strict, default, lenient]
        default: default
      max_iterations:
        required: false
        description: "Max refinement loop iterations (1-5)"
        default: "3"

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  prd:
    name: "PRD pipeline"
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'prd-request') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout mesh repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Parse trigger
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const evt = context.eventName;
            let research_pr = '';
            let scope_level = 'bar';
            let scope_id = '';
            let mode = 'deep';
            let grounding = 'default';
            let max_iterations = '3';
            let issue_number = '';

            if (evt === 'workflow_dispatch') {
              const i = context.payload.inputs;
              research_pr = i.research_pr || '';
              scope_level = i.scope_level || 'bar';
              scope_id = i.scope_id || '';
              mode = i.mode || 'deep';
              grounding = i.grounding || 'default';
              max_iterations = i.max_iterations || '3';
            } else if (evt === 'issues') {
              const issue = context.payload.issue;
              issue_number = String(issue.number);
              const body = issue.body || '';
              const prMatch = body.match(/research_pr:\s*(\S+)/i);
              if (prMatch) { research_pr = prMatch[1]; }
              const scopeMatch = body.match(/scope:\s*(portfolio|platform|bar)\s*\n\s*scope_id:\s*([\w-]+)/i);
              if (scopeMatch) { scope_level = scopeMatch[1].toLowerCase(); scope_id = scopeMatch[2]; }
              const modeMatch = body.match(/mode:\s*(shallow|deep)/i);
              if (modeMatch) { mode = modeMatch[1].toLowerCase(); }
            }

            core.setOutput('research_pr', research_pr);
            core.setOutput('scope_level', scope_level);
            core.setOutput('scope_id', scope_id);
            core.setOutput('mode', mode);
            core.setOutput('grounding', grounding);
            core.setOutput('max_iterations', max_iterations);
            core.setOutput('issue_number', issue_number);

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install research runner
        run: npm install --no-save @maintainabilityai/research-runner@latest

      - name: Run PRD pipeline
        id: prd
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx research-runner prd \
            --research-pr "${{ steps.parse.outputs.research_pr }}" \
            --scope-level "${{ steps.parse.outputs.scope_level }}" \
            --scope-id "${{ steps.parse.outputs.scope_id }}" \
            --mode "${{ steps.parse.outputs.mode }}" \
            --grounding "${{ steps.parse.outputs.grounding }}" \
            --max-iterations "${{ steps.parse.outputs.max_iterations }}" \
            --output prds/ \
            --audit .research-audit/ \
            --emit-pr-body /tmp/pr-body.md

      - name: Open PR with PRD output
        if: success()
        uses: peter-evans/create-pull-request@v6
        with:
          branch: prd/${{ steps.prd.outputs.run_id }}
          title: "PRD: ${{ steps.prd.outputs.topic }}"
          body-path: /tmp/pr-body.md
          labels: |
            prd
            ai-assisted
          commit-message: |
            prd: ${{ steps.prd.outputs.topic }}

            Run ID: ${{ steps.prd.outputs.run_id }}
            Grounding: ${{ steps.prd.outputs.final_score }}/1.0 after ${{ steps.prd.outputs.iterations }} iteration(s)

      - name: Comment on triggering issue
        if: success() && steps.parse.outputs.issue_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = parseInt('${{ steps.parse.outputs.issue_number }}', 10);
            if (!issue_number) return;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body: `PRD run complete. Opened PRD PR for review. Run ID: \`${{ steps.prd.outputs.run_id }}\`, grounding: ${{ steps.prd.outputs.final_score }}/1.0.`
            });
