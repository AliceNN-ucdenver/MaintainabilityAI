name: "OKR State Machine — governance-pass + revision escalation"

# Implements the §6.1 state diagram on artifact PRs:
#   ReviewPending → (both scores ≥ THRESHOLD, severity ≤ MEDIUM) → GovPass
#   ReviewPending → (either fail) → RevisionNeeded → ReviewPending (round++)
#   round >= MAX_AUTO_ROUNDS → HumanGate
#
# Tier-aware bounds (§6.2):
#   Autonomous  MAX=1
#   Supervised  MAX=2
#   Restricted  MAX=0  (every artifact requires human approval BEFORE assignment)
#
# Round counter is tracked via PR labels `round-N` rather than a body
# marker — labels are easier to manipulate via gh CLI, visible in the
# PR list at a glance, and don't risk confusing the Copilot session
# (editing the PR body can trigger spurious "user wants changes" reads).
#
# Reviewer agents apply `governance-pass-architecture` /
# `governance-pass-security` per §5.5.2; this workflow promotes the
# master `governance-pass` label when both are present.
#
# Phase tracking: §13 C4 + C5.

on:
  pull_request:
    types: [labeled]

concurrency:
  group: state-machine-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  pull-requests: write
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Step A — promote master governance-pass when both reviewers approve.
  # ──────────────────────────────────────────────────────────────────
  promote-govpass:
    name: "Promote governance-pass"
    # Both reviewers approved AND the evidence-honesty gate did not flag
    # the artifact (§11.1.7). degraded-evidence is applied by
    # audit-validate.yml when the Hatter Tag's evidence_mode contradicts
    # the audit JSONL; we refuse to promote while that label is present.
    if: >-
      contains(github.event.pull_request.labels.*.name, 'governance-pass-architecture') &&
      contains(github.event.pull_request.labels.*.name, 'governance-pass-security') &&
      !contains(github.event.pull_request.labels.*.name, 'governance-pass') &&
      !contains(github.event.pull_request.labels.*.name, 'degraded-evidence')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Apply master governance-pass label
        run: |
          gh pr edit ${{ github.event.pull_request.number }} --add-label "governance-pass"
      - name: Post merge-unlocked comment
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "✓ **governance-pass** — both architect-reviewer and security-reviewer approved. Merge unlocked (subject to branch protection)."

  # Inform the user when both reviewer approvals are in but degraded-evidence
  # is blocking promotion — otherwise the PR sits silently with two green
  # reviews and no master label, looking stuck.
  blocked-by-evidence:
    name: "Block governance-pass on degraded-evidence"
    if: >-
      contains(github.event.pull_request.labels.*.name, 'governance-pass-architecture') &&
      contains(github.event.pull_request.labels.*.name, 'governance-pass-security') &&
      !contains(github.event.pull_request.labels.*.name, 'governance-pass') &&
      contains(github.event.pull_request.labels.*.name, 'degraded-evidence') &&
      github.event.action == 'labeled' &&
      (github.event.label.name == 'governance-pass-architecture' || github.event.label.name == 'governance-pass-security')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Post evidence-blocked comment
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "⛔ **governance-pass blocked by \`degraded-evidence\`** — both reviewer agents approved, but the evidence-honesty gate (§11.1.7) flagged this PR. Resolve the \`degraded-evidence\` label (update the Hatter Tag or re-run the agent with live skill backends) and the master \`governance-pass\` label will be applied automatically."

  # ──────────────────────────────────────────────────────────────────
  # Step B — when a reviewer applies `revision-required`, check the
  # tier's MAX_AUTO_ROUNDS and either let the agent revise or escalate
  # to HumanGate.
  # ──────────────────────────────────────────────────────────────────
  revision-escalation:
    name: "Tier-aware revision gate"
    if: github.event.action == 'labeled' && github.event.label.name == 'revision-required'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout mesh repo
        uses: actions/checkout@v4

      - name: Resolve round + tier from PR + OKR
        id: ctx
        run: |
          # Round label format: round-N. Default to 1 if absent (PR open
          # without a prior reviewer-bus dispatch — shouldn't happen but
          # we don't want to crash on it).
          LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
          ROUND=$(printf '%s' "$LABELS" | grep -oE 'round-[0-9]+' | grep -oE '[0-9]+' | sort -n | tail -1)
          ROUND="${ROUND:-1}"

          # Pull okr_id from PR body's Hatter Tag block.
          BODY=$(gh pr view ${{ github.event.pull_request.number }} --json body --jq .body)
          OKR_ID=$(printf '%s' "$BODY" | grep -oE 'okr_id:\s*[A-Za-z0-9._-]+' | head -1 | sed -E 's/^okr_id:\s*//')

          # Tier — prefer the frozen governanceTier on the latest action
          # for this PR's run, falling back to the OKR-wide computed
          # tier (read from the last `governanceTier:` in okr.yaml). If
          # the OKR file isn't on disk, fall through to supervised as
          # the safe default.
          TIER=""
          if [ -n "$OKR_ID" ] && [ -f "okrs/$OKR_ID/okr.yaml" ]; then
            TIER=$(grep -E '^[[:space:]]+governanceTier:[[:space:]]*' "okrs/$OKR_ID/okr.yaml" | tail -1 | sed -E 's/^[[:space:]]+governanceTier:[[:space:]]*//; s/^["'"'"']?(autonomous|supervised|restricted)["'"'"']?$/\1/')
          fi
          TIER="${TIER:-supervised}"

          case "$TIER" in
            autonomous) MAX=1 ;;
            supervised) MAX=2 ;;
            restricted) MAX=0 ;;
            *) MAX=2 ;;
          esac

          echo "round=$ROUND" >> "$GITHUB_OUTPUT"
          echo "max=$MAX" >> "$GITHUB_OUTPUT"
          echo "tier=$TIER" >> "$GITHUB_OUTPUT"
          echo "okr_id=$OKR_ID" >> "$GITHUB_OUTPUT"
          echo "::notice::round=$ROUND max=$MAX tier=$TIER okr_id=$OKR_ID"

      - name: Escalate to HumanGate when round >= MAX
        if: ${{ fromJSON(steps.ctx.outputs.round) >= fromJSON(steps.ctx.outputs.max) }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} --add-label "needs-human-review"
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "⛔ **HumanGate** — round **${{ steps.ctx.outputs.round }}** hit MAX_AUTO_ROUNDS=**${{ steps.ctx.outputs.max }}** for tier=\`${{ steps.ctx.outputs.tier }}\`. Auto-revision cycle exhausted; OKR owner must Approve / Re-run / Reject from Looking Glass → OKR detail."

      # Flip the matching action's status to `human_gate` on the OKR YAML so
      # Looking Glass surfaces the Approve / Re-run / Reject controls on
      # the detail page without round-tripping to GitHub for labels. Match
      # by runId, which the PR body's Hatter Tag carries (§5.5.6 step 3).
      - name: Update action.status to human_gate
        if: ${{ fromJSON(steps.ctx.outputs.round) >= fromJSON(steps.ctx.outputs.max) }}
        run: |
          OKR_ID="${{ steps.ctx.outputs.okr_id }}"
          OKR_FILE="okrs/$OKR_ID/okr.yaml"
          if [ -z "$OKR_ID" ] || [ ! -f "$OKR_FILE" ]; then
            echo "::warning::OKR file missing — skipping action.status update"
            exit 0
          fi
          BODY=$(gh pr view ${{ github.event.pull_request.number }} --json body --jq .body)
          RUN_ID=$(printf '%s' "$BODY" | grep -oE 'run_id:\s*[A-Za-z0-9._-]+' | head -1 | sed -E 's/^run_id:\s*//')
          if [ -z "$RUN_ID" ]; then
            echo "::warning::No run_id in PR body Hatter Tag — cannot match action; skipping"
            exit 0
          fi
          # yq is pre-installed on ubuntu-latest runners. The expression
          # finds the action whose runId matches and flips its status.
          if ! yq --version >/dev/null 2>&1; then
            echo "::warning::yq not on PATH — skipping action.status update (will be applied on next render)"
            exit 0
          fi
          yq -i "(.actions[] | select(.runId == \"$RUN_ID\") | .status) = \"human_gate\"" "$OKR_FILE"
          # Bump updatedAt so the OKR list view reflects the state change.
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          yq -i ".meta.updatedAt = \"$NOW\"" "$OKR_FILE"
          git config user.name "maintainabilityai-bot"
          git config user.email "noreply@maintainability.ai"
          git add "$OKR_FILE"
          git commit -m "chore(okr): $OKR_ID action $RUN_ID -> human_gate (round=${{ steps.ctx.outputs.round }}, max=${{ steps.ctx.outputs.max }}, tier=${{ steps.ctx.outputs.tier }})

Auto-update by okr-state-machine.yml on revision-required label.
Phase tracking: agentic-sdlc §13 C5."
          git push

      - name: Note remaining round budget when round < MAX
        if: ${{ fromJSON(steps.ctx.outputs.round) < fromJSON(steps.ctx.outputs.max) }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "Revision requested. **Round ${{ steps.ctx.outputs.round }} / ${{ steps.ctx.outputs.max }}** at tier=\`${{ steps.ctx.outputs.tier }}\`. Author agent will revise and push; reviewer-bus will re-fire on the new commit (round bumps automatically)."
