name: "Archeologist (Research Agent)"

# The Archeologist runs the research pipeline:
#   validate_brief -> gather_mesh_context -> plan_queries -> tavily/arxiv/uspto/hn ->
#   dedupe_and_rank -> synthesize_report -> publish -> verify_and_trigger
#
# Path (research | archaeology) is chosen by the brief.
# Outputs land in <scope>/research/ and audit JSONL in .research-audit/.
# Triggers: research-request label, @claude please research comment, workflow_dispatch.
#
# Prompt packs read by the runner (from this mesh repo):
#   .caterpillar/prompts/research/query-plan.md
#   .caterpillar/prompts/research/synthesis.md
#   .caterpillar/prompts/research/synthesis-archaeology.md
#   .caterpillar/prompts/research/gap-analysis.md

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      brief:
        required: true
        description: "Plain-English research brief"
      scope_level:
        type: choice
        description: "Scope: platform / bar (portfolio scope was removed)"
        options: [platform, bar]
        default: bar
      scope_id:
        required: true
        description: "BAR id (e.g. APP-IMDB-002) or platform slug (e.g. imdb-lite)"
      path:
        type: choice
        description: "Research path: market research | repo archaeology"
        options: [research, archaeology]
        default: research
      target_repo:
        required: false
        description: "Archaeology path only: owner/repo to clone and analyze"
      guardrails:
        type: choice
        description: "Guardrails mode"
        options: [strict, default, lenient]
        default: default
      llm_provider:
        type: choice
        description: "LLM inference backend"
        options: [github-models, anthropic, openai, azure-openai]
        default: github-models

permissions:
  contents: write
  issues: write
  pull-requests: write
  # `models: read` enables routing LLM hops through GitHub Models / Copilot
  # when llm_provider == github-models. No-op for the other providers.
  models: read

jobs:
  research:
    name: "Archeologist pipeline"
    # Mirrors the oraculum-review.yml pattern: the issue_comment branch requires
    # BOTH the `research-request` label AND a `@claude please research` mention
    # so that comments on oraculum-review (or any other) issues cannot fire the
    # research agent. The `labeled` branch fires only on the specific label.
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'research-request') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.state == 'open' &&
       contains(github.event.issue.labels.*.name, 'research-request') &&
       (contains(github.event.comment.body, '@claude please research') ||
        contains(github.event.comment.body, '@archeologist'))) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout mesh repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Parse trigger
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const evt = context.eventName;
            let brief = '';
            let scope_level = 'bar';
            let scope_id = '';
            let path = 'research';
            let target_repo = '';
            let guardrails = 'default';
            let llm_provider = 'github-models';
            let issue_number = '';

            if (evt === 'workflow_dispatch') {
              const i = context.payload.inputs;
              brief = i.brief;
              scope_level = i.scope_level || 'bar';
              scope_id = i.scope_id || '';
              path = i.path || 'research';
              target_repo = i.target_repo || '';
              guardrails = i.guardrails || 'default';
              llm_provider = i.llm_provider || 'github-models';
            } else if (evt === 'issues') {
              const issue = context.payload.issue;
              brief = issue.title + '\n\n' + (issue.body || '');
              issue_number = String(issue.number);
              const scopeMatch = (issue.body || '').match(/scope:\s*(platform|bar)\s*\n\s*scope_id:\s*([\w-]+)/i);
              if (scopeMatch) { scope_level = scopeMatch[1].toLowerCase(); scope_id = scopeMatch[2]; }
              const pathMatch = (issue.body || '').match(/path:\s*(research|archaeology)/i);
              if (pathMatch) { path = pathMatch[1].toLowerCase(); }
              const repoMatch = (issue.body || '').match(/target_repo:\s*([\w./-]+)/i);
              if (repoMatch) { target_repo = repoMatch[1]; }
            } else if (evt === 'issue_comment') {
              const body = context.payload.comment.body || '';
              // Accept either mention form: `@claude please research <brief>` OR `@archeologist <brief>`.
              const m = body.match(/(?:@claude please research|@archeologist)\s+(.+)/is);
              brief = m ? m[1].trim() : body;
              issue_number = String(context.payload.issue.number);
            }

            core.setOutput('brief', brief);
            core.setOutput('scope_level', scope_level);
            core.setOutput('scope_id', scope_id);
            core.setOutput('path', path);
            core.setOutput('target_repo', target_repo);
            core.setOutput('guardrails', guardrails);
            core.setOutput('llm_provider', llm_provider);
            core.setOutput('issue_number', issue_number);

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install research runner
        run: npm install --no-save @maintainabilityai/research-runner@latest

      - name: Run Archeologist pipeline
        id: research
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          # USPTO_API_KEY is optional; when absent the runner emits a
          # node_error envelope and continues without patent coverage.
          # Get a key at https://patentsview.org/apis/keyrequest
          USPTO_API_KEY: ${{ secrets.USPTO_API_KEY }}
          # When provider=github-models, research-runner reads GITHUB_TOKEN to
          # authenticate against models.github.ai. Prefer GOVERNANCE_MESH_TOKEN
          # if set — that's a user PAT with `Models: Read`, so calls go
          # through the token-owner's Copilot tier instead of the
          # `github-actions[bot]` free tier (which is capped at 8K input
          # tokens per request). Falls back to the Actions GITHUB_TOKEN
          # when GMT is absent — same as before this change.
          GITHUB_TOKEN: ${{ secrets.GOVERNANCE_MESH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          npx research-runner archeologist \
            --brief "${{ steps.parse.outputs.brief }}" \
            --scope-level "${{ steps.parse.outputs.scope_level }}" \
            --scope-id "${{ steps.parse.outputs.scope_id }}" \
            --path "${{ steps.parse.outputs.path }}" \
            --target-repo "${{ steps.parse.outputs.target_repo }}" \
            --guardrails "${{ steps.parse.outputs.guardrails }}" \
            --llm-provider "${{ steps.parse.outputs.llm_provider }}" \
            --output research/ \
            --audit .research-audit/ \
            --emit-issue-body /tmp/issue-body.md

      - name: Commit data-collection artifact + audit log to mesh
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add research/ .research-audit/
          if git diff --cached --quiet; then
            echo "no artifact changes"
          else
            git commit -m "research: data collection for run ${{ steps.research.outputs.run_id }}"
            for attempt in 1 2 3 4 5; do
              if git push; then break; fi
              if [ "$attempt" = "5" ]; then exit 1; fi
              git pull --rebase || { git rebase --abort; exit 1; }
              sleep 2
            done
          fi

      - name: Post data-collection comment + flip labels on triggering issue
        if: success() && steps.parse.outputs.issue_number != ''
        uses: actions/github-script@v7
        with:
          # The runner stopped at data-collection. We post the structured
          # comment to the originating issue, swap `research-request` →
          # `research-ready`, and prompt the user to assign Copilot/Claude
          # for the synthesis step. The assigned agent reads this comment,
          # opens a PR with the synthesis markdown.
          script: |
            const fs = require('fs');
            const issue_number = parseInt('${{ steps.parse.outputs.issue_number }}', 10);
            if (!issue_number) return;
            const body = fs.readFileSync('/tmp/issue-body.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body
            });
            // Swap labels to two purposes:
            //   - `oraculum-research`  → fires oraculum-research.yml when
            //                            the assignee comments @claude
            //                            (mirrors the oraculum-review pattern)
            //   - `maintainabilityai`  → Oraculum panel filters issues by
            //                            this label; without it the issue
            //                            never appears in the hub
            // Remove `research-request` — the data-collection phase is
            // complete and the label would confuse downstream automation.
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                name: 'research-request'
              });
            } catch (_) { /* label may not exist on issue_comment-triggered runs */ }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              labels: ['oraculum-research', 'maintainabilityai']
            });
