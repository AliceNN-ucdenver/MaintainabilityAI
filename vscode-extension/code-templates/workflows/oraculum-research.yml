name: "Oraculum Research Synthesis"

# Mirrors oraculum-review.yml but routes to the research/synthesis.md
# prompt pack instead of the architecture-review one. Fires when:
#   - the issue carries the `oraculum-research` label (applied by the
#     archeologist runner after data collection), AND
#   - a new comment mentions `@claude` (the explicit go-ahead from the
#     human assignee).
#
# The runner already gathered + ranked the sources and posted the
# structured data as the most recent issue comment. Claude reads the
# issue body + every comment, follows .caterpillar/prompts/research/
# synthesis.md, writes the synthesis markdown to research/<run-id>/,
# and opens a PR for review.

on:
  issue_comment:
    types: [created]

jobs:
  research-synthesis:
    name: "Research Synthesis"
    if: >-
      github.event.issue.state == 'open' &&
      contains(github.event.issue.labels.*.name, 'oraculum-research') &&
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      pull-requests: write

    steps:
      - name: Checkout mesh repo
        uses: actions/checkout@v4

      # Pull the run_id from the data-collection comment so the
      # synthesis lands in the same research/<run-id>/ folder.
      - name: Extract run metadata
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            // Pull comments off the issue (latest first).
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              per_page: 100,
            });
            // Find the most recent data-collection comment (has the
            // archeologist's signature block) and extract its run id.
            let runId = '';
            for (const c of comments.reverse()) {
              const m = c.body?.match(/Run id:\s*`?(RES-[A-Za-z0-9-]+)`?/);
              if (m) { runId = m[1]; break; }
            }
            if (!runId) {
              core.setFailed('Could not locate a `RES-…` run id in any issue comment. Has the archeologist data-collection step run?');
              return;
            }
            core.setOutput('run_id', runId);
            core.setOutput('issue_number', String(context.payload.issue.number));

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run synthesis with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          track_progress: true
          prompt: |
            # Oraculum Research Synthesis

            ## Workspace
            - Mesh repo (this repo) is checked out at workspace root.
            - Issue: #${{ steps.parse.outputs.issue_number }}
            - Run id: `${{ steps.parse.outputs.run_id }}`
            - Data-collection artifact: `research/issue-update-${{ steps.parse.outputs.run_id }}.md`
              (also reproduced verbatim as an issue comment — read whichever is easier)

            ## Instructions
            Read and follow the prompt pack: `.caterpillar/prompts/research/synthesis.md`.

            That prompt pack defines:
              - the 10 canonical H2 sections in the exact order required,
              - the citation rules (every claim S[N], every Conclusion C[N] ≥2 sources / ≥1 LOW, every Recommendation cites ≥1 Conclusion),
              - the markdown shape the downstream PRD agent expects.

            The ranked sources, query plan, JTBD/gap analysis, and mesh
            context are all already in the data-collection artifact —
            do NOT re-run the searches.

            ## Output
            After completing the synthesis, you MUST:

            1. Write the synthesis to `research/${{ steps.parse.outputs.run_id }}/synthesis.md`.
            2. Create a branch + commit + push:
               ```bash
               git checkout -b research/synthesis-${{ steps.parse.outputs.run_id }}
               git add research/${{ steps.parse.outputs.run_id }}/
               git commit -m "research: synthesis for ${{ steps.parse.outputs.run_id }} (closes #${{ steps.parse.outputs.issue_number }})"
               git push origin research/synthesis-${{ steps.parse.outputs.run_id }}
               ```

          claude_args: |
            --allowedTools "Read,Write,Glob,Grep,Bash"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open synthesis PR
        if: success()
        id: create-pr
        uses: actions/github-script@v7
        with:
          script: |
            const runId = '${{ steps.parse.outputs.run_id }}';
            const issueNumber = parseInt('${{ steps.parse.outputs.issue_number }}', 10);
            const branch = `research/synthesis-${runId}`;
            try {
              await github.rest.repos.getBranch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                branch,
              });
            } catch {
              core.warning(`Branch ${branch} not found — Claude may not have pushed it. Skipping PR creation.`);
              return;
            }
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Research synthesis: ${runId}`,
              body: `Closes #${issueNumber}\n\nResearch synthesis generated by the Oraculum research workflow against the data collected in the linked issue.`,
              head: branch,
              base: 'main',
            });
            core.setOutput('pr_url', pr.html_url);
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['research-synthesis', 'ai-assisted'],
            });

      - name: Post synthesis-complete comment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const prUrl = '${{ steps.create-pr.outputs.pr_url }}' || '';
            const body = prUrl
              ? `✅ Research synthesis drafted — see ${prUrl} for review.`
              : `Research synthesis ran but no PR was opened (Claude did not push a branch). Check the action logs.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body,
            });

      - name: Label issue as synthesis-complete
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ['research-synthesis-complete']
            });
